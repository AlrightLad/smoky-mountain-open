<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SMO Golf">
<meta name="theme-color" content="#0a1a0f">
<title>The Smoky Mountain Open</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a1a0f;color:#e8ead3;min-height:100vh;min-height:100dvh;max-width:500px;margin:0 auto;overflow-x:hidden;-webkit-font-smoothing:antialiased}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
select{-webkit-appearance:none;appearance:none}
.hd{background:linear-gradient(135deg,#1a3a1f,#0d2614);padding:24px 16px 14px;border-bottom:2px solid #2a5a30;text-align:center}
.hd h1{font-size:21px;font-weight:800;color:#c5a55a;letter-spacing:1px}
.hd .sub{font-size:10px;color:#7a9a6a;margin-top:4px;letter-spacing:3px;text-transform:uppercase}
.vt{display:flex;border-bottom:1px solid #1a3a1f}
.vt button{flex:1;padding:11px 0;background:0 0;color:#5a7a5a;border:none;font:600 13px/1 -apple-system,sans-serif;text-transform:uppercase;letter-spacing:1px;cursor:pointer}
.vt button.a{background:#1a3a1f;color:#c5a55a}
.ct{display:flex;overflow-x:auto;border-bottom:1px solid #1a3a1f;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.ct::-webkit-scrollbar{display:none}
.ct button{flex:0 0 auto;padding:10px 16px;background:0 0;color:#4a6a4a;border:none;border-bottom:2px solid transparent;font:600 11px/1.4 -apple-system,sans-serif;cursor:pointer;white-space:nowrap}
.ct button.a{background:#1a3a1f;color:#c5a55a;border-bottom-color:#c5a55a}
.ct .ts{font-size:10px;font-weight:400;opacity:.65}
.ci{padding:10px 16px;background:#111f14;border-bottom:1px solid #1a3a1f;display:flex;justify-content:space-between;align-items:center}
.ci .nm{font-size:15px;font-weight:700}
.ci .dt{font-size:11px;color:#5a7a5a}
.ci .bd{padding:4px 12px;background:#2a5a30;border-radius:20px;font-size:11px;font-weight:700;color:#c5a55a}
.mg{padding:12px 16px;border-bottom:1px solid #1a3a1f}
.mg h3{font-size:13px;font-weight:700;color:#c5a55a;margin-bottom:10px}
.mgr{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mgi{display:flex;align-items:center;gap:6px}
.mgi label{font-size:10px;color:#7a9a6a;width:78px;flex-shrink:0;line-height:1.2}
.mgi select{flex:1;background:#1a3a1f;border:1px solid #2a5a30;border-radius:5px;color:#e8ead3;padding:6px 8px;font:12px -apple-system,sans-serif;min-width:0}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:8px 6px;text-align:center;font:600 10px/1 -apple-system,sans-serif;color:#7a9a6a;background:#1a3a1f}
th:first-child{text-align:left;padding-left:10px;position:sticky;left:0;z-index:2;background:#1a3a1f}
th.g{color:#c5a55a}
.r0{background:#0d1f12}.r1{background:#0a1a0f}
.r0 td:first-child{background:#0d1f12}.r1 td:first-child{background:#0a1a0f}
td{padding:3px 4px;text-align:center;border-bottom:1px solid #12261a}
td:first-child{padding:6px 10px;font-weight:700;position:sticky;left:0;z-index:1}
.sr{background:#1a3a1f!important}.sr td{padding:7px 6px;font-weight:700;font-size:12px;color:#7a9a6a}.sr td:first-child{background:#1a3a1f!important;font-size:11px}
.tr{background:#1a3a1f!important;border-top:2px solid #2a5a30}.tr td{padding:8px 6px;font-weight:800;font-size:15px;color:#c5a55a}.tr td:first-child{background:#1a3a1f!important;font-size:13px}
.pr{background:#0d2614!important}.pr td{padding:8px 6px;font-weight:800;font-size:15px;color:#c5a55a}.pr td:first-child{background:#0d2614!important;font-size:11px}
.p3{color:#e8685a;font-weight:700}.p5{color:#5aaa6a;font-weight:700}.p4{color:#7a9a6a;font-weight:600}
input.s{width:42px;height:36px;text-align:center;border-radius:6px;font:600 15px -apple-system,sans-serif;outline:0;background:#1a2a1a;border:1px solid #2a4a30;color:#e8ead3;transition:all .15s}
input.s:focus{border-color:#c5a55a;box-shadow:0 0 0 2px #c5a55a30}
input.s.w{width:48px}
input.s.bi{background:#1a3a20;border:1px solid #5aea7a;border-radius:50%;color:#5aea7a}
input.s.ea{background:#1a3a20;border:2px solid #c5a55a;border-radius:50%;color:#c5a55a}
input.s.bo{background:#2a1a1a;border:1px solid #5a2a2a;color:#ea6a5a}
input.s.db{background:#2a1a1a;border:1px solid #5a2a2a;color:#ea6a5a}
.lg{padding:10px 16px;background:#111f14;border-top:1px solid #1a3a1f;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.lg .i{display:flex;align-items:center;gap:3px;font-size:10px;color:#5a7a5a}
.lg .d{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;font-size:9px;font-weight:800;border-radius:4px;background:#1a2a1a;border:1px solid #2a4a30}
.lg .d.c{border-radius:50%}
.ls{padding:16px}
.lt{font-size:18px;font-weight:800;color:#c5a55a;margin-bottom:14px}
.lc{display:flex;align-items:center;justify-content:space-between;padding:14px;margin-bottom:8px;background:#111f14;border-radius:10px;border:1px solid #1a3a1f}
.lc.f1{background:linear-gradient(135deg,#2a4a20,#1a3a1f);border-color:#c5a55a40}
.lp{font-size:22px;font-weight:800;color:#c5a55a}
.rc{background:#111f14;border-radius:10px;padding:14px;margin-bottom:8px;border:1px solid #1a3a1f}
.rh{font-size:13px;font-weight:700;color:#7a9a6a;margin-bottom:8px}
.rw{display:flex;justify-content:space-between;padding:5px 0;font-size:14px}
.bc{background:#111f14;border-radius:10px;padding:14px;margin-bottom:8px;border:1px solid #1a3a1f;display:flex;justify-content:space-between;align-items:center}
.bc select{background:#1a3a1f;border:1px solid #2a5a30;border-radius:6px;color:#c5a55a;padding:7px 28px 7px 10px;font:13px -apple-system,sans-serif}
.rb{width:100%;padding:14px;background:#3a1515;border:1px solid #5a2020;border-radius:10px;color:#cc6666;font:600 13px -apple-system,sans-serif;cursor:pointer;margin-top:12px}
.bk{padding:12px 16px;background:#111f14;border-top:1px solid #1a3a1f;display:flex;gap:8px}
.bk button{flex:1;padding:10px;border-radius:8px;font:600 11px -apple-system,sans-serif;cursor:pointer;border:none}
.bk .exp{background:#2a5a30;color:#c5a55a}
.bk .imp{background:#1a3a1f;color:#7a9a6a;border:1px solid #2a5a30}
.sn{text-align:center;padding:16px 0 32px;font-size:10px;color:#3a5a3a}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#2a5a30;color:#c5a55a;padding:10px 20px;border-radius:20px;font:600 13px -apple-system,sans-serif;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="hd"><h1>⛳ THE SMOKY MOUNTAIN OPEN</h1><div class="sub">April 2026 · Asheville, NC</div></div>
<div class="vt"><button id="vsc" class="a" onclick="sv('sc')">Scorecards</button><button id="vlb" onclick="sv('lb')">Leaderboard</button></div>
<div id="scv"><div class="ct" id="ct"></div><div class="ci" id="ci"></div><div id="mg"></div><div style="overflow-x:auto;-webkit-overflow-scrolling:touch" id="tc"></div><div id="lgc"></div>
<div class="bk"><button class="exp" onclick="doExport()">📋 Copy Backup</button><button class="imp" onclick="doImport()">📥 Restore Backup</button></div></div>
<div id="lbv" style="display:none"></div>
<div class="sn">Scores auto-saved to this device</div>
<div class="toast" id="toast"></div>
<script>
var P=["Zach","Kayvan","Kiyan","Nick"],
C={scramble:{n:"Sequoyah National",d:"Thursday",t:"1:20 PM",p:[4,4,3,5,4,4,3,4,5,4,4,3,5,4,4,3,4,5],f:"Scramble",s:1},
springdale:{n:"Springdale Resort",d:"Friday AM",t:"8:30 AM",p:[4,4,3,4,5,4,4,3,5,3,4,4,4,3,4,4,5,5],f:"Stableford (1x)",m:1},
maggie:{n:"Maggie Valley",d:"Friday PM",t:"4:00 PM",p:[4,4,3,5,4,3,4,5,4,4,3,4,5,4,3,4,4,5],f:"Stableford (1x)",m:1},
connestee:{n:"Connestee Falls",d:"Saturday",t:"TBD",p:[4,4,3,4,5,4,3,4,5,4,3,4,5,4,4,3,4,5],f:"Stableford (1.5x)",m:1.5}},
BC=[{i:"sandman",l:"Sandman",d:"Most pars-or-better from bunkers",p:5},{i:"shortgame",l:"Short Game King",d:"Most up-and-downs",p:5},{i:"coldblooded",l:"Cold Blooded",d:"Most one-putts",p:5},{i:"phoenix",l:"Phoenix",d:"Best single hole vs group",p:3}],
SM=[{i:"ctp1",l:"CTP #1",p:2},{i:"ctp2",l:"CTP #2",p:2},{i:"ctp3",l:"CTP #3",p:2},{i:"ctp4",l:"CTP #4",p:2},{i:"ld_f",l:"Long Drive (F9)",p:2},{i:"ld_b",l:"Long Drive (B9)",p:2},{i:"pred",l:"Score Predict",p:3}],
K="smo-v6",ct="scramble",cv="sc";

function df(){var s={};for(var k in C){s[k]={};if(C[k].s)s[k].team=Array(18).fill("");else P.forEach(function(p){s[k][p]=Array(18).fill("")})}var mi={};SM.forEach(function(g){mi[g.i]=""});var bo={};BC.forEach(function(b){bo[b.i]=""});return{s:s,mi:mi,bo:bo}}
function ld(){try{var r=localStorage.getItem(K);if(r){var d=JSON.parse(r);if(d.s)return d}}catch(e){}return df()}
function sv2(){try{D._t=Date.now();localStorage.setItem(K,JSON.stringify(D))}catch(e){}}
var D=ld();

function stb(sc,pa){if(!sc||sc<=0)return 0;var d=sc-pa;return d<=-2?6:d===-1?4:d===0?2:d===1?1:0}
function gsb(co,pl){var c=C[co],a=D.s[co]&&D.s[co][pl]||[],t=0;a.forEach(function(v,i){if(v&&v>0)t+=stb(parseInt(v),c.p[i])});return Math.round(t*(c.m||1)*10)/10}
function gst(co,pl){return(D.s[co]&&D.s[co][pl]||[]).reduce(function(a,v){return a+(parseInt(v)||0)},0)}
function gsr(){return(D.s.scramble&&D.s.scramble.team||[]).reduce(function(a,v){return a+(parseInt(v)||0)},0)}
function gmp(pl){return SM.reduce(function(t,g){return t+(D.mi[g.i]===pl?g.p:0)},0)}
function gbp(pl){return BC.reduce(function(t,b){return t+(D.bo[b.i]===pl?b.p:0)},0)}
function gtp(pl){var t=gmp(pl)+gbp(pl);["springdale","maggie","connestee"].forEach(function(c){t+=gsb(c,pl)});return Math.round(t*10)/10}

function toast(msg){var el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");setTimeout(function(){el.classList.remove("show")},2000)}

function sv(v){cv=v;document.getElementById("vsc").className=v==="sc"?"a":"";document.getElementById("vlb").className=v==="lb"?"a":"";document.getElementById("scv").style.display=v==="sc"?"":"none";document.getElementById("lbv").style.display=v==="lb"?"":"none";if(v==="lb")rlb()}
function stab(t){ct=t;rsc()}
function ic(v,pa){if(!v||v==="")return"";var d=parseInt(v)-pa;return d<=-2?"ea":d===-1?"bi":d===0?"":d===1?"bo":"db"}

function ssc(co,pl,h,val){var v=val===""?"":Math.max(1,Math.min(15,parseInt(val)||0));if(co==="scramble")D.s.scramble.team[h]=v;else{if(!D.s[co])D.s[co]={};if(!D.s[co][pl])D.s[co][pl]=Array(18).fill("");D.s[co][pl][h]=v}sv2();rsc()}
function smi(id,val){D.mi[id]=val;sv2();rsc()}
function sbo(id,val){D.bo[id]=val;sv2();rlb()}

function doExport(){var code=btoa(JSON.stringify(D));navigator.clipboard.writeText(code).then(function(){toast("✅ Backup copied to clipboard!")}).catch(function(){prompt("Copy this backup code:",code)})}
function doImport(){var code=prompt("Paste your backup code:");if(code){try{var d=JSON.parse(atob(code));if(d.s){D=d;sv2();rsc();toast("✅ Scores restored!")}}catch(e){toast("❌ Invalid backup code")}}}

function rsc(){
var h='';for(var k in C){h+='<button class="'+(ct===k?'a':'')+'" onclick="stab(\''+k+'\')"><div>'+C[k].d+'</div><div class="ts">'+C[k].n.split(' ')[0]+'</div></button>'}
document.getElementById("ct").innerHTML=h;
var c=C[ct],iS=c.s,pT=c.p.reduce(function(a,b){return a+b},0);
document.getElementById("ci").innerHTML='<div><div class="nm">'+c.n+'</div><div class="dt">'+c.d+' · '+c.t+' · Par '+pT+'</div></div><div class="bd">'+c.f+'</div>';

if(iS){var mg='<div class="mg"><h3>Mini-Game Winners</h3><div class="mgr">';SM.forEach(function(g){mg+='<div class="mgi"><label>'+g.l+' ('+g.p+')</label><select onchange="smi(\''+g.i+'\',this.value)"><option value="">—</option>';P.forEach(function(p){mg+='<option value="'+p+'"'+(D.mi[g.i]===p?' selected':'')+'>'+p+'</option>'});mg+='</select></div>'});mg+='</div></div>';document.getElementById("mg").innerHTML=mg}
else document.getElementById("mg").innerHTML='';

var t='<table style="min-width:'+(iS?'300':'430')+'px"><thead><tr><th>Hole</th><th>Par</th>';
if(iS)t+='<th class="g">Team</th>';else P.forEach(function(p){t+='<th class="g">'+p+'</th>'});t+='</tr></thead><tbody>';

for(var i=0;i<18;i++){
if(i===9){var fp=c.p.slice(0,9).reduce(function(a,b){return a+b},0);t+='<tr class="sr"><td>OUT</td><td>'+fp+'</td>';
if(iS){t+='<td>'+(D.s.scramble.team.slice(0,9).reduce(function(a,x){return a+(parseInt(x)||0)},0)||'—')+'</td>'}
else P.forEach(function(p){t+='<td>'+(((D.s[ct]&&D.s[ct][p])||[]).slice(0,9).reduce(function(a,x){return a+(parseInt(x)||0)},0)||'—')+'</td>'});t+='</tr>'}

var pa=c.p[i],pc=pa===3?'p3':pa===5?'p5':'p4';
t+='<tr class="r'+(i%2)+'"><td>'+(i+1)+'</td><td class="'+pc+'">'+pa+'</td>';

if(iS){var v=D.s.scramble.team[i],cl=ic(v,pa);t+='<td><input type="number" inputmode="numeric" class="s w '+cl+'" value="'+(v||'')+'" onchange="ssc(\'scramble\',\'team\','+i+',this.value)" onfocus="this.select()"></td>'}
else P.forEach(function(p){var v=D.s[ct]&&D.s[ct][p]&&D.s[ct][p][i]||"",cl=ic(v,pa);t+='<td><input type="number" inputmode="numeric" class="s '+cl+'" value="'+(v||'')+'" onchange="ssc(\''+ct+"','"+p+"',"+i+',this.value)" onfocus="this.select()"></td>'});t+='</tr>'}

var bp=c.p.slice(9,18).reduce(function(a,b){return a+b},0);t+='<tr class="sr"><td>IN</td><td>'+bp+'</td>';
if(iS){t+='<td>'+(D.s.scramble.team.slice(9,18).reduce(function(a,x){return a+(parseInt(x)||0)},0)||'—')+'</td>'}
else P.forEach(function(p){t+='<td>'+(((D.s[ct]&&D.s[ct][p])||[]).slice(9,18).reduce(function(a,x){return a+(parseInt(x)||0)},0)||'—')+'</td>'});t+='</tr>';

t+='<tr class="tr"><td>TOT</td><td>'+pT+'</td>';
if(iS)t+='<td>'+(gsr()||'—')+'</td>';else P.forEach(function(p){t+='<td>'+(gst(ct,p)||'—')+'</td>'});t+='</tr>';

if(!iS){t+='<tr class="pr"><td colspan="2">STBL PTS</td>';P.forEach(function(p){t+='<td>'+gsb(ct,p)+'</td>'});t+='</tr>'}
t+='</tbody></table>';document.getElementById("tc").innerHTML=t;

if(!iS)document.getElementById("lgc").innerHTML='<div class="lg"><div class="i"><span class="d c" style="border:2px solid #c5a55a;color:#c5a55a">6</span>Eagle+</div><div class="i"><span class="d c" style="border:1px solid #5aea7a;color:#5aea7a;background:#1a3a20">4</span>Birdie</div><div class="i"><span class="d" style="color:#e8ead3">2</span>Par</div><div class="i"><span class="d" style="color:#ea6a5a;background:#2a1a1a">1</span>Bogey</div><div class="i"><span class="d" style="color:#ea6a5a;background:#2a1a1a">0</span>Dbl+</div></div>';
else document.getElementById("lgc").innerHTML=''}

function rlb(){
var so=P.slice().sort(function(a,b){return gtp(b)-gtp(a)}),md=["🥇","🥈","🥉",""];
var h='<div class="ls"><div class="lt">Overall Standings</div>';
so.forEach(function(p,i){var tot=gtp(p),stl=["springdale","maggie","connestee"].reduce(function(a,c){return a+gsb(c,p)},0);
h+='<div class="lc'+(i===0?' f1':'')+'"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:22px">'+md[i]+'</span><div><div style="font-weight:700;font-size:15px">'+p+'</div><div style="font-size:11px;color:#5a7a5a;margin-top:2px">Mini: '+gmp(p)+' · Stbl: '+stl+' · Bonus: '+gbp(p)+'</div></div></div><div class="lp">'+tot+'</div></div>'});h+='</div>';

h+='<div class="ls"><div class="lt">Round Breakdown</div>';
var st=gsr();h+='<div class="rc"><div class="rh">THU · Sequoyah National · Scramble</div><div style="font-size:14px">Team: '+(st||'—')+(st>0?' ('+(st-72>=0?'+':'')+(st-72)+')':'')+'</div></div>';
["springdale","maggie","connestee"].forEach(function(c){h+='<div class="rc"><div class="rh">'+C[c].d+' · '+C[c].n+' · '+C[c].f+'</div>';P.forEach(function(p){h+='<div class="rw"><span>'+p+'</span><span><span style="color:#5a7a5a;margin-right:10px">'+(gst(c,p)||'—')+'</span><span style="color:#c5a55a;font-weight:700">'+gsb(c,p)+' pts</span></span></div>'});h+='</div>'});h+='</div>';

h+='<div class="ls"><div class="lt">Bonus Awards</div>';
BC.forEach(function(b){h+='<div class="bc"><div><div style="font-size:14px;font-weight:700">🏆 '+b.l+'</div><div style="font-size:11px;color:#5a7a5a">'+b.d+' · '+b.p+' pts</div></div><select onchange="sbo(\''+b.i+'\',this.value)"><option value="">—</option>';P.forEach(function(p){h+='<option value="'+p+'"'+(D.bo[b.i]===p?' selected':'')+'>'+p+'</option>'});h+='</select></div>'});h+='</div>';

h+='<div class="ls"><button class="rb" onclick="ra()">Reset All Scores</button></div>';
document.getElementById("lbv").innerHTML=h}

function ra(){if(confirm("Reset ALL scores? This cannot be undone.")){D=df();localStorage.removeItem(K);sv2();rsc();rlb();toast("Scores reset")}}
rsc();
</script>
</body>
</html>
