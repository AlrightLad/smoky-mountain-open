  function daysUntil(dateStr) {
    if (!dateStr) return 999;
    var parts = dateStr.split("-");
    var target = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
    var today = new Date();
    today.setHours(0, 0, 0, 0);
    return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
  }

  /* ---------- AI COMMENTARY ---------- */
  function generateRoundCommentary(round) {
    var score = round.score;
    var diff = score - (round.rating || 72);
    var highlights = [];
    var roasts = [];
    var seed = (score * 7 + (round.slope || 113)) % 100; // pseudo-random from score for variety

    // Score-based tiers
    if (diff <= -3) {
      var elite = ["Absolute clinic. Save some birdies for the rest of us.","Playing like you have a sponsorship deal nobody told us about.","The course owes you an apology for being too easy.","Someone call the PGA, we found their missing player."];
      highlights.push(elite[seed % elite.length]);
    } else if (diff <= 0) {
      var great = ["Shot at or below course rating. The Parbaughs bow before you.","This is the round you'll bring up in every conversation for 6 months.","Tell your playing partners to bring sunglasses, your game is blinding.","You peaked today. It's all downhill from here. Enjoy it."];
      highlights.push(great[seed % great.length]);
    } else if (diff <= 5) {
      var solid = ["Solid round. Not embarrassing at all.","Respectable. Your mom would frame this scorecard.","Kept it together out there. Growth.","The kind of round that makes you think you're getting good. You're not. But it felt nice."];
      highlights.push(solid[seed % solid.length]);
    } else if (diff <= 10) {
      var mid = ["The course won, but you put up a fight.","A few bad holes away from a good round. So close yet so far.","Your short game carried your long game's dead weight today.","Average by Parbaugh standards. Which is still questionable by everyone else's."];
      roasts.push(mid[seed % mid.length]);
    } else if (diff <= 15) {
      var rough = ["The course fought back and won. At least you got exercise.","Your scorecard looks like a phone number.","Some holes were good. The rest were character building.","Golf is hard. You proved that today.","The ball spent more time in the rough than on the fairway."];
      roasts.push(rough[seed % rough.length]);
    } else if (diff <= 25) {
      var bad = ["Were you playing golf or hiking? You saw every part of that course.","The course ranger asked if you needed a search party.","Your caddie would've quit if you had one.","Legend says you're still looking for your ball on the 7th.","The golf cart got more of a workout than your clubs."];
      roasts.push(bad[seed % bad.length]);
    } else {
      var brutal = ["We're not sure that counts as golf. More of an outdoor adventure experience.","Your ball spent more time in the woods than a Boy Scout.","That wasn't a round of golf, that was a nature walk with anger issues.","The course is pressing charges.","Triple digits? In this economy?","Someone check if the course is okay after what you just did to it."];
      roasts.push(brutal[seed % brutal.length]);
    }

    // Special score Easter eggs
    if (score === 69) highlights.push("Nice.");
    if (score === 42) highlights.push("The answer to life, the universe, and your golf game.");
    if (score === 77) highlights.push("Lucky 77. The golf gods smiled today.");
    if (score === 100) roasts.push("A perfect hundo. At least you're consistent.");
    if (score === 99) highlights.push("So close to triple digits. The golf gods showed mercy.");
    if (score === 111) roasts.push("Triple ones. A score so bad it's almost a PIN number.");
    if (score === 88) highlights.push("Double eights. Infinity on its side. Poetic.");
    if (score < 80) highlights.push("Sub-80 club. Welcome to the elite.");
    if (score > 120) roasts.push("At this point just tell people you played 27 holes.");
    if (score > 130) roasts.push("Did you count every practice swing too?");

    // Course-specific humor
    if (round.course && round.course.indexOf("Sequoyah") !== -1) {
      if (diff > 10) roasts.push("Sequoyah claims another victim. That 142 slope is undefeated.");
      else highlights.push("You survived Sequoyah. That alone deserves a trophy.");
    }

    // Improvement tracking
    var playerRounds = state.rounds.filter(function(r) { return r.player === round.player; });
    if (playerRounds.length >= 3) {
      var lastThree = playerRounds.slice(-3);
      var avgLast3 = Math.round(lastThree.reduce(function(a, r) { return a + r.score; }, 0) / 3);
      if (score < avgLast3 - 5) highlights.push("That's " + (avgLast3 - score) + " strokes better than your recent average. Trending up.");
      if (score > avgLast3 + 10) roasts.push("That's " + (score - avgLast3) + " strokes worse than your recent average. What happened out there?");
    }

    // Personal best detection
    if (playerRounds.length > 1) {
      var prevBest = Math.min.apply(null, playerRounds.slice(0, -1).map(function(r) { return r.score; }));
      if (score < prevBest) highlights.push("NEW PERSONAL BEST. Previous was " + prevBest + ". The grind is paying off.");
    }

    return { highlights: highlights, roasts: roasts };
  }

  /* ---------- ACTIVITY FEED ---------- */
  function getActivity(limit) {
    if (!state.activity) state.activity = [];
    return state.activity.slice().sort(function(a,b){return(b.ts||0)-(a.ts||0)}).slice(0, limit || 15);
  }

  /* ---------- ACHIEVEMENTS & XP SYSTEM ---------- */

  // Titles unlock every 5 levels up to 100
  var LEVEL_TITLES = {
    1:"Rookie",5:"Weekend Warrior",10:"Range Rat",15:"Fairway Finder",20:"Club Member",
    25:"Course Regular",30:"Low Handicapper",35:"Scratch Aspirant",40:"Ironman",
    45:"Birdie Hunter",50:"Eagle Eye",55:"Tour Wannabe",60:"Golf Addict",
    65:"Links Legend",70:"Course Conqueror",75:"The Professor",80:"Hall of Famer",
    85:"Living Legend",90:"Immortal",95:"Transcendent",100:"G.O.A.T."
  };

  function xpForLevel(level) {
    // Progressive curve: Level 100 ~30K XP, reachable in ~1 year of active play
    // No level cap — players can keep going past 100
    if (level <= 1) return 0;
    return Math.floor(120 * Math.pow(level - 1, 1.2));
  }

  function getPlayerLevel(pid) {
    if (!pid) return {level:1,name:"Rookie",xp:0,currentLevelXp:0,nextLevelXp:500,titleLevel:1};
    var xp = getPlayerXP(pid);
    var level = 1;
    while (xpForLevel(level + 1) <= xp) level++;
    var currentLevelXp = xpForLevel(level);
    var nextLevelXp = xpForLevel(level + 1);
    // Find the most recent title unlock
    var titleLevel = 1;
    var keys = Object.keys(LEVEL_TITLES).map(Number).sort(function(a,b){return a-b});
    for (var i = keys.length - 1; i >= 0; i--) {
      if (level >= keys[i]) { titleLevel = keys[i]; break; }
    }
    return {
      level: level,
      name: LEVEL_TITLES[titleLevel] || "Rookie",
      xp: xp,
      currentLevelXp: currentLevelXp,
      nextLevelXp: nextLevelXp,
      titleLevel: titleLevel
    };
  }

  function getPlayerXP(pid) {
    if (!pid) return 0;
    var rounds = getPlayerRounds(pid);
    var player = getPlayer(pid);
    // Resolve from Firebase cache, currentProfile, or claimedFrom
    if (!player && typeof fbMemberCache !== "undefined" && fbMemberCache[pid]) player = fbMemberCache[pid];
    if (!player && currentProfile && currentProfile.id === pid) player = currentProfile;
    if (!player) {
      var all = getPlayers();
      for (var xi = 0; xi < all.length; xi++) {
        if (all[xi].claimedFrom === pid || all[xi].id === pid) { player = all[xi]; break; }
      }
    }
    if (!player) return 0;
    // Also check rounds under claimedFrom
    if (!rounds.length && player.claimedFrom) {
      rounds = getPlayerRounds(player.claimedFrom);
    }
    var xp = 0;

    // Rounds XP
    rounds.forEach(function(r) {
      xp += r.holeScores ? 150 : 100; // Play Now bonus
      if (r.scorecardPhoto) xp += 25;
    });

    // New course bonus
    var seenCourses = {};
    rounds.forEach(function(r) {
      if (!seenCourses[r.course]) { xp += 75; seenCourses[r.course] = 1; }
    });

    // New state bonus
    var seenStates = {};
    rounds.forEach(function(r) {
      var c = getCourseByName(r.course);
      if (c && c.region && !seenStates[c.region]) { xp += 150; seenStates[c.region] = 1; }
    });

    // Personal best bonus
    if (rounds.length >= 2) {
      var sorted = rounds.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date)});
      var bestSoFar = sorted[0].score;
      for (var i = 1; i < sorted.length; i++) {
        if (sorted[i].score < bestSoFar) { xp += 200; bestSoFar = sorted[i].score; }
      }
    }

    // H2H wins
    var players = getPlayers();
    players.forEach(function(opp) {
      if (opp.id === pid) return;
      var oppRounds = getPlayerRounds(opp.id);
      rounds.forEach(function(r) {
        var match = oppRounds.find(function(o){return o.course===r.course&&o.date===r.date});
        if (match && r.score < match.score) xp += 50;
      });
    });

    // Event wins
    if (player) xp += (player.wins || 0) * 500;

    // Aces
    var rec = getRecords();
    if (rec.holeInOnes && player) {
      rec.holeInOnes.forEach(function(a) { if (a.by === player.name) xp += 1000; });
    }

    // Reviews
    var courses = getCourses();
    courses.forEach(function(c) {
      if (c.reviews) c.reviews.forEach(function(r) { if (r.by === (player?player.name:"")) xp += 25; });
    });

    // Achievement XP — calculated from the same conditions, not from getAchievements (avoids circular call)
    // Round milestones
    if (rounds.length >= 1) xp += 100;
    if (rounds.length >= 5) xp += 50;
    if (rounds.length >= 10) xp += 100;
    if (rounds.length >= 25) xp += 250;
    if (rounds.length >= 50) xp += 500;
    if (rounds.length >= 100) xp += 1000;
    if (rounds.length >= 200) xp += 2000;
    if (rounds.length >= 500) xp += 5000;
    // Score achievements
    if (rounds.some(function(r){return r.score<=120})) xp += 50;
    if (rounds.some(function(r){return r.score<100})) xp += 100;
    if (rounds.some(function(r){return r.score<90})) xp += 200;
    if (rounds.some(function(r){return r.score<85})) xp += 300;
    if (rounds.some(function(r){return r.score<80})) xp += 500;
    if (rounds.some(function(r){return r.score<75})) xp += 750;
    if (rounds.some(function(r){return r.score<70})) xp += 1000;
    // Explore achievements
    var achCourseCount = Object.keys(seenCourses).length;
    if (achCourseCount >= 3) xp += 50;
    if (achCourseCount >= 5) xp += 100;
    if (achCourseCount >= 10) xp += 200;
    if (achCourseCount >= 25) xp += 500;
    if (achCourseCount >= 50) xp += 1000;
    var achStateCount = Object.keys(seenStates).length;
    if (achStateCount >= 2) xp += 75;
    if (achStateCount >= 3) xp += 150;
    if (achStateCount >= 5) xp += 300;
    if (achStateCount >= 8) xp += 500;
    // Play Now rounds
    var playNowRounds = rounds.filter(function(r){return r.holeScores});
    if (playNowRounds.length >= 1) xp += 50;
    if (playNowRounds.length >= 10) xp += 150;
    // Attested rounds
    var attestedRounds = rounds.filter(function(r){return r.attestedBy});
    if (attestedRounds.length >= 1) xp += 50;
    if (attestedRounds.length >= 10) xp += 150;
    // Home course
    var coursePlays = {};
    rounds.forEach(function(r){coursePlays[r.course]=(coursePlays[r.course]||0)+1});
    var maxPlays = Math.max.apply(null, Object.values(coursePlays).concat([0]));
    if (maxPlays >= 5) xp += 75;
    if (maxPlays >= 10) xp += 150;
    if (maxPlays >= 25) xp += 300;
    // Streaks
    if (rounds.length >= 3) {
      var weekSet = {};
      rounds.forEach(function(r){if(r.date){var d=new Date(r.date+"T12:00:00");var wk=d.getFullYear()+"-"+Math.floor((d.getTime()-new Date(d.getFullYear(),0,1).getTime())/604800000);weekSet[wk]=1;}});
      var weeks = Object.keys(weekSet).sort();
      var maxStreak = 1, curStreak = 1;
      for (var si = 1; si < weeks.length; si++) {
        var prev = weeks[si-1].split("-"), curr = weeks[si].split("-");
        if (parseInt(curr[0]) === parseInt(prev[0]) && parseInt(curr[1]) === parseInt(prev[1]) + 1) { curStreak++; if (curStreak > maxStreak) maxStreak = curStreak; }
        else curStreak = 1;
      }
      if (maxStreak >= 3) xp += 100;
      if (maxStreak >= 6) xp += 200;
    }
    // Back to back days
    if (rounds.length >= 2) {
      var sortedDates = rounds.map(function(r){return r.date}).filter(Boolean).sort();
      for (var di = 1; di < sortedDates.length; di++) {
        var d1 = new Date(sortedDates[di-1]+"T12:00:00"), d2 = new Date(sortedDates[di]+"T12:00:00");
        if ((d2-d1) <= 86400000) { xp += 75; break; }
      }
    }
    // Social
    var chatCount = 0;
    try { if (typeof liveChat !== "undefined") chatCount = liveChat.filter(function(m){return m.authorId===pid}).length; } catch(e){}
    if (chatCount >= 1) xp += 25;
    if (chatCount >= 25) xp += 75;
    if (chatCount >= 100) xp += 200;
    // Invites — also check fbMemberCache for recruited member count
    var inviteCount = player ? (player.invitesUsed || 0) : 0;
    if (player && player.role === "commissioner" && typeof fbMemberCache !== "undefined") {
      var recruited = Object.values(fbMemberCache).filter(function(m) { return m.invitedBy === pid; });
      if (recruited.length > inviteCount) inviteCount = recruited.length;
    }
    if (inviteCount >= 1) xp += 100;
    if (inviteCount >= 3) xp += 250;
    // Special achievement XP
    if (player && (player.founding || player.isFoundingFour)) xp += 500;
    if (player) xp += 250; // Beta tester — all current members qualify
    if (player && player.role === "commissioner") xp += 500;
    if (player && player.email === "jopinksalot@msn.com") xp += 250;

    return xp;
  }

  /* ---------- H2H CHALLENGES ---------- */
  function createChallenge(fromId, toId, courseId, stakes) {
    if (!state.challenges) state.challenges = [];
    var challenge = {
      id: Date.now().toString(36),
      from: fromId,
      to: toId,
      course: courseId,
      stakes: stakes || "",
      status: "pending", // pending, accepted, declined, completed
      created: new Date().toISOString().split("T")[0],
      result: null
    };
    state.challenges.push(challenge);
    addNotification(toId, {type:"h2h_challenge",from:fromId,challengeId:challenge.id,text:(getPlayer(fromId)||{}).username+" challenged you!"});
    save();
    return challenge;
  }

  function getChallenges(pid) {
    if (!state.challenges) return [];
    return state.challenges.filter(function(c) { return c.from === pid || c.to === pid; });
  }

  function updateChallenge(id, updates) {
    if (!state.challenges) return;
    var c = state.challenges.find(function(ch) { return ch.id === id; });
    if (c) { Object.keys(updates).forEach(function(k) { c[k] = updates[k]; }); save(); }
  }

  /* ---------- NOTIFICATIONS ---------- */
  function addNotification(pid, notif) {
    if (!state.notifications) state.notifications = {};
    if (!state.notifications[pid]) state.notifications[pid] = [];
    notif.id = Date.now().toString(36);
    notif.read = false;
    notif.ts = Date.now();
    notif.date = new Date().toISOString().split("T")[0];
    state.notifications[pid].push(notif);
    save();
  }

  function getNotifications(pid) {
    if (!state.notifications || !state.notifications[pid]) return [];
    return state.notifications[pid].slice().sort(function(a,b){return(b.ts||0)-(a.ts||0)});
  }

  function markNotificationRead(pid, notifId) {
    if (!state.notifications || !state.notifications[pid]) return;
    var n = state.notifications[pid].find(function(x){return x.id===notifId});
    if (n) { n.read = true; save(); }
  }

  function getUnreadCount(pid) {
    if (!state.notifications || !state.notifications[pid]) return 0;
    return state.notifications[pid].filter(function(n){return !n.read}).length;
  }

  /* ---------- SEASON STANDINGS (Point System) ---------- */
  // Points per round: based on differential (score - handicap - par)
  // Better than expected = more points. Levels the playing field.
  // Base 100pts per round, +/- 5pts per stroke vs expected
  // Bonus: personal best = 50pts, new course = 25pts, attested = 15pts
  function getSeasonStandings(year) {
    year = year || new Date().getFullYear();
    var seasonStart = year + "-03-01";
    var seasonEnd = year + "-09-30";
    var players = getPlayers();
    var standings = players.map(function(p) {
      var allRounds = getPlayerRounds(p.id);
      var rounds = allRounds.filter(function(r) {
        return r.date >= seasonStart && r.date <= seasonEnd && r.visibility !== "private";
      });
      if (!rounds.length) return null;
      var hcap = p.manualHandicap || calcHandicap(allRounds) || 36;
      var points = 0;
      var bestSoFar = 999;
      var seenCourses = {};
      rounds.forEach(function(r) {
        var coursePar = 72;
        var c = getCourseByName(r.course);
        if (c && c.par) coursePar = c.par;
        var expected = coursePar + hcap;
        var diff = r.score - expected;
        var roundPts = Math.max(10, 100 - (diff * 5));
        // Personal best bonus
        if (r.score < bestSoFar) { roundPts += 50; bestSoFar = r.score; }
        else if (bestSoFar === 999) bestSoFar = r.score;
        // New course bonus
        if (!seenCourses[r.course]) { roundPts += 25; seenCourses[r.course] = 1; }
        // Attested bonus
        if (r.attestedBy) roundPts += 15;
        points += Math.round(roundPts);
      });
      var avg = Math.round(rounds.reduce(function(a,r){return a+r.score},0) / rounds.length * 10) / 10;
      var best = Math.min.apply(null, rounds.map(function(r){return r.score}));
      var uniqueCourses = {};
      rounds.forEach(function(r) { uniqueCourses[r.course] = 1; });
      var courseNames = Object.keys(uniqueCourses);
      return {
        id: p.id,
        username: p.username || p.name,
        name: p.name,
        rounds: rounds.length,
        points: points,
        avg: avg,
        best: best,
        hcap: calcHandicap(rounds),
        courses: courseNames
      };
    }).filter(function(s) { return s !== null; });
    standings.sort(function(a, b) { return b.points - a.points; });
    return { year: year, standings: standings };
  }

  /* ---------- PROFILE POSTS ---------- */
  function addPost(pid, post) {
    var p = getPlayer(pid);
    if (!p) return null;
    if (!p.posts) p.posts = [];
    var newPost = {
      id: Date.now().toString(36),
      type: post.type || "text", // text, photo, round, h2h
      text: post.text || "",
      photo: post.photo || "",
      roundId: post.roundId || null,
      visibility: post.visibility || "public",
      ts: Date.now(),
      date: new Date().toISOString().split("T")[0]
    };
    p.posts.unshift(newPost);
    if (newPost.visibility === "public") {
      if (!state.activity) state.activity = [];
      state.activity.push({type:"post",playerName:p.username||p.name,text:newPost.text,date:newPost.date,ts:Date.now()});
    }
    save();
    return newPost;
  }

  function getPlayerPosts(pid) {
    var p = getPlayer(pid);
    return p && p.posts ? p.posts : [];
  }

  /* ---------- INIT ---------- */
  state = load();
  if (!state.activity) state.activity = [];
  if (!state.challenges) state.challenges = [];
  if (!state.notifications) state.notifications = {};

  /* ---------- PUBLIC API ---------- */
  return {
    getPlayer:getPlayer, getPlayers:getPlayers, addPlayer:addPlayer, updatePlayer:updatePlayer, removePlayer:removePlayer,

    getRounds:getRounds, getPlayerRounds:getPlayerRounds, getCourseRounds:getCourseRounds, addRound:addRound, deleteRound:deleteRound,

    getScrambleTeams:getScrambleTeams, addScrambleTeam:addScrambleTeam, addScrambleMatch:addScrambleMatch,
    getRecords:getRecords, setRecord:setRecord,
    calcStableford:calcStableford, calcHandicap:calcHandicap,
    getPlayerAvg:getPlayerAvg, getPlayerBest:getPlayerBest, getDisplayName:getDisplayName, getUniqueCourses:getUniqueCourses,
    getTripStableford:getTripStableford, getTripTotal:getTripTotal,
    getMiniPoints:getMiniPoints, getBonusPoints:getBonusPoints, getTripPoints:getTripPoints,
    daysUntil:daysUntil, generateRoundCommentary:generateRoundCommentary, getActivity:getActivity, getAchievements:getAchievements, getPlayerXP:getPlayerXP, getPlayerLevel:getPlayerLevel,

    addNotification:addNotification, getNotifications:getNotifications, markNotificationRead:markNotificationRead, getUnreadCount:getUnreadCount,
    getSeasonStandings:getSeasonStandings,
    addPost:addPost, getPlayerPosts:getPlayerPosts,
    exportBackup:exportBackup, importBackup:importBackup, reset:reset, save:save, load:load, setScoreSilent:setScoreSilent
  };

var Router = (function() {
  var current = { page: "home", params: {} };

  function register(name, renderFn) {
    pages[name] = renderFn;
  }

  function go(page, params) {
    current = { page: page, params: params || {} };
    renderNav();
    var containers = document.querySelectorAll("#mainApp [data-page]");
    containers.forEach(function(el) { el.classList.add("hidden"); });
    var target = document.querySelector('#mainApp [data-page="' + page + '"]');
    if (target) {
      target.classList.remove("hidden");
      if (pages[page]) pages[page](current.params);
    }
    window.scrollTo(0, 0);
    // Hide footer on pages with sticky input (chat, DMs)
    var footer = document.querySelector(".footer");
    if (footer) footer.style.display = (page === "chat" || page === "dms" || page === "dm-thread") ? "none" : "";
  }

  function getPage() { return current.page; }
  function getParams() { return current.params; }

  function renderNav() {
    var tabs = [
      { p: "home", l: "Home", match: ["home"] },
      { p: "teetimes", l: "Tee Times", match: ["teetimes","tee-create"] },
      { p: "members", l: "Members", match: ["members","profile-edit"] },
      { p: "trips", l: "Events", match: ["trips","scorecard"] },
      { p: "rounds", l: "Rounds", match: ["rounds","playnow"] },
      { p: "records", l: "Records", match: ["records","aces","scramble","courses","standings","challenges"] },
      { p: "chat", l: "Clubhouse", match: ["chat","dms","dm-thread"] }
    ];
    var h = "";
    tabs.forEach(function(t) {
      var active = t.match.indexOf(current.page) !== -1;
      h += '<button class="' + (active ? "a" : "") + '" onclick="Router.go(\'' + t.p + '\')">' + t.l + '</button>';
    });
    document.getElementById("nav").innerHTML = h;
  }

  function toast(msg) {
    var el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    setTimeout(function() { el.classList.remove("show"); }, 3200);
  }

  var STOCK_AVATARS = ["stock_profile_gold.jpg","stock_profile_green.jpg","stock_profile_navy.jpg","stock_profile_charcoal.jpg","stock_profile_red.jpg","stock_profile_teal.jpg"];

  function getAvatar(player, fallback) {
    var imgSrc = '';
    // Check Firestore photo cache — try by id, claimedFrom, and username
    var cached = photoCache["member:" + player.id];
    if (!cached && player.claimedFrom) cached = photoCache["member:" + player.claimedFrom];
    if (!cached && player.username) cached = photoCache["member:" + player.username];
    if (cached) {
      imgSrc = cached;
    } else if (player.photoUrl) {
      imgSrc = player.photoUrl;
    } else if (player.photo) {
      imgSrc = player.photo;
    } else if (player.stockAvatar) {
      imgSrc = player.stockAvatar;
    } else {
      var hash = 0;
      for (var i = 0; i < (player.username||player.name).length; i++) hash = ((hash << 5) - hash) + (player.username||player.name).charCodeAt(i);
      var idx = Math.abs(hash) % STOCK_AVATARS.length;
      imgSrc = STOCK_AVATARS[idx];
    }
    var initial = (player.username||player.name).charAt(0).toUpperCase();
    return '<img alt="" src="' + imgSrc + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'" style="width:100%;height:100%;object-fit:cover;border-radius:inherit"><div style="display:none;width:100%;height:100%;align-items:center;justify-content:center;color:var(--gold);font-weight:700;font-size:18px;background:var(--bg3);border-radius:inherit">' + initial + '</div>';
  }

  function handlePhotoUpload(callback, maxW, maxH, quality) {
    maxW = maxW || 200;
    maxH = maxH || 200;
    quality = quality || 0.7;
    var input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";
    input.onchange = function() {
      var file = input.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        var img = new Image();
        img.onload = function() {
          var canvas = document.createElement("canvas");
          if (maxW === maxH) {
            canvas.width = maxW; canvas.height = maxH;
            var ctx = canvas.getContext("2d");
            var min = Math.min(img.width, img.height);
            var sx = (img.width - min) / 2, sy = (img.height - min) / 2;
            ctx.drawImage(img, sx, sy, min, min, 0, 0, maxW, maxH);
          } else {
            canvas.width = maxW; canvas.height = maxH;
            var ctx = canvas.getContext("2d");
            var ratio = Math.max(maxW / img.width, maxH / img.height);
            var w = img.width * ratio, h = img.height * ratio;
            ctx.drawImage(img, (maxW - w) / 2, (maxH - h) / 2, w, h);
          }
          callback(canvas.toDataURL("image/jpeg", quality));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    };
    input.click();
  }

  return {
    register: register,
    go: go,
    getPage: getPage,
    getParams: getParams,
    toast: toast,
    getAvatar: getAvatar,
    handlePhotoUpload: handlePhotoUpload
  };
})();

function startNotificationListener() {

function showRivalryDetail(p1id, p2id) {
  var p1 = PB.getPlayer(p1id), p2 = PB.getPlayer(p2id);
  if (!p1 || !p2) return;
  var h2h = calcH2H(p1id, p2id);
  
  // Find shared rounds for match history
  var p1rounds = PB.getPlayerRounds(p1id);
  var p2rounds = PB.getPlayerRounds(p2id);
  var matches = [];
  p1rounds.forEach(function(r1) {
    var match = p2rounds.find(function(r2) { return r2.course === r1.course && r2.date === r1.date; });
    if (match) matches.push({ date: r1.date, course: r1.course, p1score: r1.score, p2score: match.score, winner: r1.score < match.score ? p1id : match.score < r1.score ? p2id : "tie" });
  });
  matches.sort(function(a,b) { return b.date > a.date ? 1 : -1; });

  var h = '<div class="sh"><h2>' + escHtml(p1.name) + ' vs ' + escHtml(p2.name) + '</h2><button class="back" onclick="Router.go(\'home\')">← Back</button></div>';
  
  // Big score display
  h += '<div style="text-align:center;padding:20px">';
  h += '<div class="rivalry-vs">';
  h += '<div class="rv-player"><div class="rv-av" style="width:56px;height:56px;font-size:22px">' + Router.getAvatar(p1) + '</div><div class="rv-name">' + escHtml(p1.name) + '</div></div>';
  h += '<div class="rv-x">vs</div>';
  h += '<div class="rv-player"><div class="rv-av" style="width:56px;height:56px;font-size:22px">' + Router.getAvatar(p2) + '</div><div class="rv-name">' + escHtml(p2.name) + '</div></div>';
  h += '</div>';
  h += '<div class="rv-score" style="margin-top:12px">' + h2h.p1wins + ' — ' + h2h.p2wins + '</div>';
  h += '<div class="rv-label">' + (h2h.ties > 0 ? h2h.ties + ' ties' : 'Head-to-head record') + '</div>';
  h += '</div>';

  // Action buttons
  h += '<div class="section"><div style="display:flex;gap:8px">';
  h += '<button class="btn full green" style="flex:1" onclick="Router.go(\'challenges\',{opponent:\'' + p2id + '\'})">Issue Challenge</button>';
  h += '<button class="btn full outline" style="flex:1" onclick="Router.go(\'tee-create\')">Post Tee Time</button>';
  h += '</div></div>';

  // Match history
  if (matches.length) {
    h += '<div class="section"><div class="sec-head"><span class="sec-title">Match History</span></div>';
    matches.forEach(function(m) {
      var winnerName = m.winner === p1id ? p1.name : m.winner === p2id ? p2.name : "Tie";
      var winColor = m.winner === "tie" ? "var(--muted)" : "var(--gold)";
      h += '<div class="card"><div class="card-body"><div style="display:flex;justify-content:space-between;align-items:center">';
      h += '<div><div style="font-size:12px;font-weight:600">' + escHtml(m.course) + '</div><div style="font-size:10px;color:var(--muted);margin-top:2px">' + m.date + '</div></div>';
      h += '<div style="text-align:right"><div style="font-family:Playfair Display,serif;font-size:18px;font-weight:700;color:' + winColor + '">' + m.p1score + ' — ' + m.p2score + '</div>';
      h += '<div style="font-size:9px;color:var(--muted)">' + escHtml(winnerName) + '</div></div>';
      h += '</div></div></div>';
    });
    h += '</div>';
  } else {
    h += '<div class="section"><div class="card"><div class="empty"><div class="empty-text">No head-to-head matches yet. Time to change that.</div></div></div></div>';
  }

  // Reuse the standings page container for this detail view
  document.querySelector('[data-page="standings"]').innerHTML = h;
  Router.go("standings");
}

function doCopy() {
  var code = PB.exportBackup();
  navigator.clipboard.writeText(code).then(function() { Router.toast("✅ Backup copied!"); }).catch(function() { prompt("Copy this code:", code); });
}
function doRestore() {
  var code = prompt("Paste backup code:");
  if (code && PB.importBackup(code)) { Router.toast("✅ Restored!"); Router.go("home"); }
  else if (code) Router.toast("❌ Invalid code");
}

Router.register("members", function(params) {
  if (params.add) renderAddMemberForm();
  else if (params.edit) renderMemberEdit(params.edit);
  else if (params.id) renderMemberDetail(params.id);
  else renderMemberList();
});

function renderMemberList() {
  var players = PB.getPlayers();
  
  // Show loading while fetching Firebase members
  document.querySelector('[data-page="members"]').innerHTML = '<div class="sh"><h2>Parbaugh members</h2></div>' + skeletonMemberRow() + skeletonMemberRow() + skeletonMemberRow() + skeletonMemberRow();
  
  if (db) {
    db.collection("members").get().then(function(snap) {
      var fbMembers = [];
      var claimedFromIds = [];
      snap.forEach(function(doc) { 
        var d = doc.data();
        d.id = d.id || doc.id; // Ensure id is set
        fbMembers.push(d); 
        if (d.claimedFrom) claimedFromIds.push(d.claimedFrom);
      });
      
      pbLog("[Members] Firebase:", fbMembers.length, "Local:", players.length, "Claimed:", claimedFromIds.length);
      
      // Filter local players: remove any whose ID was claimed by a Firebase account
      var filtered = players.filter(function(p) {
        return claimedFromIds.indexOf(p.id) === -1;
      });
      
      // Add Firebase members not already in filtered list
      var filteredIds = filtered.map(function(p) { return p.id; });
      fbMembers.forEach(function(fm) {
        if (filteredIds.indexOf(fm.id) === -1 && fm.role !== "removed") {
          filtered.push(fm);
        }
      });
      
      pbLog("[Members] Final list:", filtered.length, filtered.map(function(p){return p.name||p.username}).join(", "));
      
      var h2 = '<div class="sh"><h2>Parbaugh members</h2></div>';
      renderMemberListHtml(filtered, h2);
    }).catch(function(e) {
      console.error("[Members] Firebase load failed:", e);
      var h = '<div class="sh"><h2>Parbaugh members</h2></div>';
      renderMemberListHtml(players, h);
    });
  } else {
    var h = '<div class="sh"><h2>Parbaugh members</h2></div>';
    renderMemberListHtml(players, h);
  }
}

function renderMemberListHtml(players, h) {
  players.forEach(function(p) {
    if (p.role === "removed") return;
    var avg = PB.getPlayerAvg(p.id);
    var rounds = PB.getPlayerRounds(p.id);
    var hcap = PB.calcHandicap(rounds) || (p.manualHandicap || p.handicap || null);
    var plvl = {level:1};
    try { plvl = PB.getPlayerLevel(p.id) || {level:1}; } catch(e) {}
    h += '<div class="card" onclick="Router.go(\'members\',{id:\'' + p.id + '\'})">';
    h += '<div class="member-row"><div class="m-av">' + Router.getAvatar(p) + '</div><div class="m-info">';
    h += '<div class="m-name">' + escHtml(p.username || p.name) + ' <span style="font-size:9px;color:var(--gold);font-weight:600">LV' + (plvl.level || 1) + '</span></div>';
    if (p.equippedTitle && p.equippedTitle !== "Member" && p.equippedTitle !== "Rookie") h += '<div class="m-nick">' + escHtml(p.equippedTitle) + '</div>';
    else if (p.role === "commissioner") h += '<div class="m-nick">Commissioner</div>';
    else if (p.role === "suspended") h += '<div class="m-nick" style="color:var(--red)">Suspended</div>';
    h += '<div class="m-stats">' + (hcap !== null ? 'HCP: ' + hcap + ' · ' : '') + (avg ? 'Avg: ' + avg + ' · ' : '') + rounds.length + ' rounds</div>';
    h += '</div><div class="m-arrow">›</div></div></div>';
  });
  h += '<div class="section">' + renderInviteMemberButton() + '</div>';
  document.querySelector('[data-page="members"]').innerHTML = h;
}

function renderMemberDetail(pid) {
  var p = PB.getPlayer(pid);
  
  // If not in local data, try Firebase
  if (!p && db) {
    db.collection("members").doc(pid).get().then(function(doc) {
      if (doc.exists) {
        renderMemberDetailWithData(doc.data());
      } else {
        renderMemberList();
      }
    }).catch(function() { renderMemberList(); });
    // Show loading while we fetch
    document.querySelector('[data-page="members"]').innerHTML = '<div class="loading"><div class="spinner"></div>Loading profile...</div>';
    return;
  }
  if (!p) { renderMemberList(); return; }
  renderMemberDetailWithData(p);
}

  // === CLUB DISTANCES (collapsible) ===

  if (p.clubs && Object.keys(p.clubs).some(function(k) { return p.clubs[k]; })) {

  }
  h += profSection("clubs-" + pid, "Club distances", clubContent, false);

  // === KNOWN FOR (collapsible) ===

      grouped[cat].forEach(function(a) {

        achieveContent += '<div style="font-size:11px;font-weight:700;color:var(--gold)">' + a.icon + ' ' + a.name + '</div>';
        achieveContent += '<div style="font-size:9px;color:var(--muted);margin-top:1px">' + a.desc + '</div></div>';
      });
    });
    achieveContent += '</div>';
  } else {
    achieveContent = '<div style="padding:12px;font-size:12px;color:var(--muted);text-align:center">No achievements yet — log rounds to unlock</div>';
  }
  h += profSection("achieve-" + pid, "Achievements (" + achievements.length + ")", achieveContent, false);

  // === TEAMS (collapsible) ===
  var teams = PB.getScrambleTeams();
  var playerTeams = teams.filter(function(t) { return t.members.indexOf(pid) !== -1; });
  var teamContent = '';
  if (playerTeams.length) {
    playerTeams.forEach(function(t) {
      var w = (t.matches || []).filter(function(m){return m.result==="win"}).length;
      var l = (t.matches || []).filter(function(m){return m.result==="loss"}).length;
      var mates = t.members.filter(function(id){return id !== pid}).map(function(id){var p=PB.getPlayer(id);return p?p.name:id}).join(", ");
      teamContent += '<div class="h2h-row" onclick="Router.go(\'scramble\',{id:\'' + t.id + '\'})" style="cursor:pointer"><div><div style="font-size:13px;font-weight:600">' + t.name + '</div><div style="font-size:10px;color:var(--muted);margin-top:2px">w/ ' + mates + '</div></div><div style="font-size:14px;font-weight:700;color:var(--gold)">' + w + '-' + l + '</div></div>';
    });
  } else {
    teamContent = '<div style="padding:12px;font-size:12px;color:var(--muted);text-align:center">Not on any teams yet</div>';
  }
  h += profSection("teams-" + pid, "Teams (" + playerTeams.length + ")", teamContent, false);

  // === ACCOLADES (collapsible) ===
  var accoladeContent = '';
  var accolades = [];
  // Event wins
  PB.getTrips().forEach(function(t) {
    if (t.champion === pid) accolades.push({type:"Event champion", detail: t.name});
  });
  // Records held
  var rec = PB.getRecords();
  if (rec.longestDrive && rec.longestDrive.by === p.name) accolades.push({type:"Record holder", detail:"Longest drive — " + rec.longestDrive.distance + " yds"});
  if (rec.longestPutt && rec.longestPutt.by === p.name) accolades.push({type:"Record holder", detail:"Longest putt — " + rec.longestPutt.distance + " ft"});
  if (rec.longestHoleOut && rec.longestHoleOut.by === p.name) accolades.push({type:"Record holder", detail:"Longest hole out — " + rec.longestHoleOut.distance + " yds"});
  // Aces
  if (rec.holeInOnes) {
    rec.holeInOnes.forEach(function(a) {
      if (a.by === p.name) accolades.push({type:"Hole-in-one", detail: a.course + " hole " + (a.hole||"?")});
    });
  }
  if (accolades.length) {
    accolades.forEach(function(a) {
      accoladeContent += '<div class="club-row"><span class="club-name" style="color:var(--gold)">' + a.type + '</span><span class="club-yd" style="max-width:200px;text-align:right;font-weight:500">' + a.detail + '</span></div>';
    });
  } else {
    accoladeContent = '<div style="padding:12px;font-size:12px;color:var(--muted);text-align:center">No accolades yet</div>';
  }
  h += profSection("accolades-" + pid, "Accolades", accoladeContent, false);

  // === HEAD TO HEAD (collapsible) ===
  var h2hContent = '';
  PB.getPlayers().forEach(function(opp) {
    if (opp.id === pid) return;
    var h2h = calcH2H(pid, opp.id);
    var record = h2h.p1wins + ' — ' + h2h.p2wins + (h2h.ties ? ' — ' + h2h.ties + 'T' : '');

  });
  h += profSection("h2h-" + pid, "Head to head", h2hContent, false);

  // === ALL ROUNDS (collapsible) ===
  if (rounds.length > 3) {

    });
    h += profSection("allrounds-" + pid, "All rounds (" + rounds.length + ")", allContent, false);
  }

  document.querySelector('[data-page="members"]').innerHTML = h;
}

/* Handicap graph builder */
function buildHandicapGraph(rounds, pid) {
  // Build monthly handicap data
  var sorted = rounds.slice().sort(function(a, b) { return new Date(a.date) - new Date(b.date); });
  if (!sorted.length) return '';

  var startDate = new Date(sorted[0].date);
  var now = new Date();
  var months = [];
  var d = new Date(startDate.getFullYear(), startDate.getMonth(), 1);

  while (d <= now) {
    months.push({ year: d.getFullYear(), month: d.getMonth(), label: ["J","F","M","A","M","J","J","A","S","O","N","D"][d.getMonth()], rounds: [] });
    d.setMonth(d.getMonth() + 1);
  }

  // Assign rounds to months
  sorted.forEach(function(r) {
    var rd = new Date(r.date);
    var m = months.find(function(mo) { return mo.year === rd.getFullYear() && mo.month === rd.getMonth(); });
    if (m) m.rounds.push(r);
  });

  // Calculate running handicap per month with season inactivity rule
  var lastHcap = null;
  var inactiveMonths = 0;
  var needsReactivation = false;
  var reactivationRounds = 0;
  var graphData = [];

  months.forEach(function(m) {
    var isSeason = m.month >= 2 && m.month <= 8; // Mar-Sep
    if (m.rounds.length > 0) {
      if (needsReactivation) {
        reactivationRounds += m.rounds.length;
        if (reactivationRounds >= 3) {
          needsReactivation = false;
          reactivationRounds = 0;
        }
      }
      // Recalculate handicap from all rounds up to this month
      var roundsToDate = sorted.filter(function(r) {
        var rd = new Date(r.date);
        return rd <= new Date(m.year, m.month + 1, 0);
      });
      lastHcap = PB.calcHandicap(roundsToDate);
      inactiveMonths = 0;
    } else {
      if (isSeason) inactiveMonths++;
      if (isSeason && inactiveMonths >= 3 && !needsReactivation) {
        needsReactivation = true;
        reactivationRounds = 0;
      }
    }
    graphData.push({ label: m.label, hcap: needsReactivation ? null : lastHcap, inactive: needsReactivation });
  });

  // Only show last 12 months max
  if (graphData.length > 12) graphData = graphData.slice(-12);

  // Build SVG graph
  var validPts = graphData.filter(function(g) { return g.hcap !== null; });
  if (!validPts.length) return '<div style="padding:12px;font-size:12px;color:var(--muted);text-align:center">Not enough data for graph</div>';

  var minH = Math.floor(Math.min.apply(null, validPts.map(function(g) { return g.hcap; })) - 2);
  var maxH = Math.ceil(Math.max.apply(null, validPts.map(function(g) { return g.hcap; })) + 2);
  if (maxH - minH < 4) { minH -= 2; maxH += 2; }
  var range = maxH - minH;

  var svgW = 300, svgH = 120, padL = 30, padR = 10, padT = 10, padB = 22;
  var chartW = svgW - padL - padR, chartH = svgH - padT - padB;

  var svg = '<svg viewBox="0 0 ' + svgW + ' ' + svgH + '" style="width:100%;height:auto;display:block">';

  // Grid lines
  var gridSteps = 4;
  for (var g = 0; g <= gridSteps; g++) {
    var gy = padT + (chartH / gridSteps) * g;
    var val = maxH - (range / gridSteps) * g;
    svg += '<line x1="' + padL + '" y1="' + gy + '" x2="' + (svgW - padR) + '" y2="' + gy + '" stroke="rgba(34,40,34,.5)" stroke-width=".5"/>';
    svg += '<text x="' + (padL - 4) + '" y="' + (gy + 3) + '" text-anchor="end" fill="rgba(122,125,117,.6)" font-size="7" font-family="Inter">' + val.toFixed(0) + '</text>';
  }

  // Month labels
  graphData.forEach(function(pt, i) {
    var x = padL + (chartW / (graphData.length - 1 || 1)) * i;
    svg += '<text x="' + x + '" y="' + (svgH - 4) + '" text-anchor="middle" fill="rgba(122,125,117,.6)" font-size="7" font-family="Inter">' + pt.label + '</text>';
  });

  // Line path
  var points = [];
  graphData.forEach(function(pt, i) {
    if (pt.hcap === null) return;
    var x = padL + (chartW / (graphData.length - 1 || 1)) * i;
    var y = padT + chartH - ((pt.hcap - minH) / range) * chartH;
    points.push(x + ',' + y);
  });

  if (points.length > 1) {
    svg += '<polyline points="' + points.join(' ') + '" fill="none" stroke="rgba(201,168,76,.7)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>';
  }

  // Dots
  graphData.forEach(function(pt, i) {
    if (pt.hcap === null) return;
    var x = padL + (chartW / (graphData.length - 1 || 1)) * i;
    var y = padT + chartH - ((pt.hcap - minH) / range) * chartH;
    svg += '<circle cx="' + x + '" cy="' + y + '" r="2.5" fill="' + (pt.inactive ? 'var(--red)' : 'var(--gold)') + '"/>';
  });

  // Inactive markers
  graphData.forEach(function(pt, i) {
    if (!pt.inactive) return;
    var x = padL + (chartW / (graphData.length - 1 || 1)) * i;
    svg += '<text x="' + x + '" y="' + (padT + 8) + '" text-anchor="middle" fill="var(--red)" font-size="6" font-family="Inter">!</text>';
  });

  svg += '</svg>';

  var result = '<div style="padding:8px 0">' + svg + '</div>';

  // Current status
  var currentHcap = graphData[graphData.length - 1];
  if (currentHcap.inactive) {
    result += '<div style="padding:8px 12px;background:rgba(212,96,78,.06);border:1px solid rgba(212,96,78,.15);border-radius:var(--radius);font-size:11px;color:var(--red);margin-top:4px">Inactive — log 3 rounds to reactivate handicap</div>';
  } else if (validPts.length >= 2) {
    var first = validPts[0].hcap, last = validPts[validPts.length - 1].hcap;
    var diff = last - first;
    var trend = diff < -1 ? 'Trending down (improving)' : diff > 1 ? 'Trending up' : 'Holding steady';
    var trendColor = diff < -1 ? 'var(--birdie)' : diff > 1 ? 'var(--red)' : 'var(--gold)';
    result += '<div style="text-align:center;font-size:11px;color:' + trendColor + ';margin-top:4px;letter-spacing:.3px">' + trend + '</div>';
  }

  return result;
}

function renderMemberEdit(pid) {
  // Only allow editing your own profile
  if (currentUser && pid !== currentUser.uid) {
    Router.toast("You can only edit your own profile");
    Router.go("members", { id: pid });
    return;
  }
  
  var p = PB.getPlayer(pid);
  
  // If not in local data, try Firebase
  if (!p && db && pid) {
    db.collection("members").doc(pid).get().then(function(doc) {
      if (doc.exists) {
        renderMemberEditForm(doc.data());
      } else {
        Router.toast("Profile not found");
        renderMemberList();
      }
    }).catch(function() { renderMemberList(); });
    document.querySelector('[data-page="members"]').innerHTML = '<div class="loading"><div class="spinner"></div>Loading profile...</div>';
    return;
  }
  if (!p) { renderMemberList(); return; }
  renderMemberEditForm(p);
}

function saveMemberEdit(pid) {
  var clubs = {};
  var clubKeys = ["driver","three_wood","four_wood","five_wood","seven_wood","nine_wood","two_hybrid","three_hybrid","four_hybrid","five_hybrid","six_hybrid","two_iron","three_iron","four_iron","five_iron","six_iron","seven_iron","eight_iron","nine_iron","pw","aw","gw","gap52","sw","gap56","gap58","lw","gap64","putter"];
  clubKeys.forEach(function(k) {
    var v = document.getElementById("edit-club-" + k);
    if (v && v.value) clubs[k] = v.value;
  });
  var bag = {};
  var bagKeys = ["driver","irons","wedges","putter","bag_brand","accessories","fav_ball"];
  bagKeys.forEach(function(k) {
    var v = document.getElementById("edit-bag-" + k);
    if (v && v.value) bag[k] = v.value;
  });
  var facts = [];
  for (var i = 0; i < 5; i++) {
    var v = document.getElementById("edit-fact-" + i);
    if (v && v.value) facts.push(v.value);
  }
  var updates = {
    name: document.getElementById("edit-name").value,
    username: document.getElementById("edit-username").value,
    nick: document.getElementById("edit-nick").value,
    displayPref: document.getElementById("edit-displayPref").value,
    equippedTitle: document.getElementById("edit-title").value,
    range: document.getElementById("edit-range").value,
    bio: document.getElementById("edit-bio").value,
    homeCourse: document.getElementById("edit-homecourse").value,
    favoriteCourse: document.getElementById("edit-favcourse").value,
    clubs: clubs,
    bag: bag,
    funnyFacts: facts
  };

  // Validate username and nickname uniqueness before saving
  if (!updates.username || updates.username.trim().length < 3) {
    Router.toast("Username must be 3+ characters");
    return;
  }

  var checkUniqueness = Promise.resolve();
  if (db) {
    checkUniqueness = db.collection("members").get().then(function(snap) {
      var conflicts = [];
      snap.forEach(function(doc) {
        if (doc.id === pid) return; // Skip self
        var m = doc.data();
        if (m.username && updates.username && m.username.toLowerCase() === updates.username.toLowerCase()) {
          conflicts.push("Username '" + updates.username + "' is already taken by " + (m.name || "another member"));
        }
        if (updates.nick && updates.nick.trim() !== "" && m.nick && m.nick.toLowerCase() === updates.nick.toLowerCase()) {
          conflicts.push("Nickname '" + updates.nick + "' is already taken by " + (m.name || "another member"));
        }
      });
      if (conflicts.length) {
        return Promise.reject(conflicts[0]);
      }
    });
  }

  checkUniqueness.then(function() {
    doSaveMemberEdit(pid, updates);
  }).catch(function(err) {
    if (typeof err === "string") {
      Router.toast(err);
    } else {
      // Firestore error — proceed anyway
      doSaveMemberEdit(pid, updates);
    }
  });
}

function doSaveMemberEdit(pid, updates) {
  // Get old name before saving to detect changes
  var oldPlayer = PB.getPlayer(pid);
  var oldName = oldPlayer ? (oldPlayer.name || oldPlayer.username) : null;
  var oldUsername = oldPlayer ? oldPlayer.username : null;
  var newDisplayName = PB.getDisplayName ? PB.getDisplayName(Object.assign({}, oldPlayer || {}, updates)) : updates.name;
  
  // Check if name actually changed
  var nameChanged = oldName && updates.name && oldName !== updates.name;
  var usernameChanged = oldUsername && updates.username && oldUsername !== updates.username;

  var bagInput = document.getElementById("edit-bagphoto");
  if (bagInput && bagInput.files && bagInput.files[0]) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement("canvas");
        var maxW = 400, maxH = 300;
        var ratio = Math.min(maxW / img.width, maxH / img.height);
        canvas.width = img.width * ratio;
        canvas.height = img.height * ratio;
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        updates.bagPhoto = canvas.toDataURL("image/jpeg", 0.7);
        PB.updatePlayer(pid, updates);
        if (nameChanged) propagateNameChange(pid, oldName, updates.name);
        Router.toast("Profile saved!");
        Router.go("members", { id: pid });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(bagInput.files[0]);
  } else {
    PB.updatePlayer(pid, updates);
    // Also save to Firestore
    if (db && currentUser && pid === currentUser.uid) {
      updates.updatedAt = fsTimestamp();
      db.collection("members").doc(pid).set(updates, { merge: true }).then(function() {
        currentProfile = Object.assign(currentProfile || {}, updates);
      });
    }
    syncMember(Object.assign({id:pid}, updates));
    if (nameChanged) propagateNameChange(pid, oldName, updates.name);
    Router.toast("Profile saved!");
    Router.go("members", { id: pid });
  }
}

// Propagate name changes across all historical Firestore data
function propagateNameChange(uid, oldName, newName) {
  if (!db || !uid || !oldName || !newName || oldName === newName) return;
  pbLog("[Name] Propagating:", oldName, "→", newName);
  
  var updates = 0;
  
  // 1. Chat messages — authorName
  db.collection("chat").where("authorId","==",uid).get().then(function(snap) {
    if (snap.empty) return;
    var batch = db.batch();
    snap.forEach(function(doc) {
      batch.update(doc.ref, { authorName: newName });
      updates++;
    });
    return batch.commit();
  }).then(function() {
    pbLog("[Name] Chat updated");
  }).catch(function(e) { pbWarn("[Name] Chat failed:", e.message); });
  
  // 2. Rounds — playerName
  db.collection("rounds").where("playerId","==",uid).get().then(function(snap) {
    if (snap.empty) return;
    var batch = db.batch();
    snap.forEach(function(doc) {
      batch.update(doc.ref, { playerName: newName });
      updates++;
    });
    return batch.commit();
  }).catch(function(e) { pbWarn("[Name] Rounds failed:", e.message); });
  
  // 3. Tee times — createdByName
  db.collection("teetimes").where("createdBy","==",uid).get().then(function(snap) {
    if (snap.empty) return;
    var batch = db.batch();
    snap.forEach(function(doc) {
      batch.update(doc.ref, { createdByName: newName });
      updates++;
    });
    return batch.commit();
  }).catch(function(e) { pbWarn("[Name] Tee times failed:", e.message); });
  
  // 4. Party games — createdByName and winnerName
  db.collection("partygames").where("createdBy","==",uid).get().then(function(snap) {
    if (snap.empty) return;
    var batch = db.batch();
    snap.forEach(function(doc) { batch.update(doc.ref, { createdByName: newName }); updates++; });
    return batch.commit();
  }).catch(function() {});
  
  db.collection("partygames").where("winner","==",uid).get().then(function(snap) {
    if (snap.empty) return;
    var batch = db.batch();
    snap.forEach(function(doc) { batch.update(doc.ref, { winnerName: newName }); updates++; });
    return batch.commit();
  }).catch(function() {});
  
  // 5. Invites — createdByName
  db.collection("invites").where("createdBy","==",uid).get().then(function(snap) {
    if (snap.empty) return;
    var batch = db.batch();
    snap.forEach(function(doc) { batch.update(doc.ref, { createdByName: newName }); updates++; });
    return batch.commit();
  }).catch(function() {});
  
  // 6. Synced rounds — update player name inside the players map
  db.collection("syncrounds").get().then(function(snap) {
    snap.forEach(function(doc) {
      var data = doc.data();
      if (data.players && data.players[uid]) {
        var update = {};
        update["players." + uid + ".name"] = newName;
        doc.ref.update(update);
        updates++;
      }
      if (data.createdBy === uid) {
        doc.ref.update({ createdByName: newName });
      }
    });
  }).catch(function() {});
  
  // 7. Attestations — update player name inside attestations map
  db.collection("attestations").get().then(function(snap) {
    snap.forEach(function(doc) {
      var data = doc.data();
      if (data.attestations && data.attestations[uid]) {
        var update = {};
        update["attestations." + uid + ".name"] = newName;
        doc.ref.update(update);
        updates++;
      }
      if (data.standings) {
        var newStandings = data.standings.map(function(s) {
          if (s.id === uid) s.name = newName;
          return s;
        });
        doc.ref.update({ standings: newStandings });
      }
    });
  }).catch(function() {});
  
  // 8. Comments in chat — update name in comment arrays
  db.collection("chat").get().then(function(snap) {
    snap.forEach(function(doc) {
      var data = doc.data();
      if (data.comments && data.comments.length) {
        var changed = false;
        var newComments = data.comments.map(function(c) {
          if (c.uid === uid) { c.name = newName; changed = true; }
          return c;
        });
        if (changed) doc.ref.update({ comments: newComments });
      }
    });
  }).catch(function() {});
  
  setTimeout(function() { pbLog("[Name] Propagation complete. ~" + updates + " documents updated."); }, 3000);
}

function uploadMemberPhoto(pid) {
  var input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.onchange = function() {
    var file = input.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) { Router.toast("Photo too large (max 10MB)"); return; }
    Router.toast("Compressing...");
    var reader = new FileReader();
    reader.onload = function(e) {
      compressPhoto(e.target.result, 50, 200, function(compressed) {
        // Save locally
        PB.updatePlayer(pid, { photo: compressed });
        // Also cache under claimedFrom if applicable
        if (currentProfile && currentProfile.claimedFrom) {
          photoCache["member:" + currentProfile.claimedFrom] = compressed;
        }
        photoCache["member:" + pid] = compressed;
        // Save to Firestore photos collection (visible to all members)
        savePhoto("member", pid, compressed).then(function(ok) {
          Router.toast(ok ? "Photo updated!" : "Photo saved locally");
          Router.go("members", { id: pid });
        });
      });
    };
    reader.onerror = function() { Router.toast("Failed to read photo"); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function generateInviteFromMembers() {
  if (!db || !currentUser || !currentProfile) { Router.toast("Not ready"); return; }
  var isComm = currentProfile.role === "commissioner";
  if (!isComm && (currentProfile.invitesUsed||0) >= (currentProfile.maxInvites||3)) { Router.toast("No invites remaining"); return; }
  
  var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; var code = "PB-";
  for (var i=0;i<8;i++) code += chars.charAt(Math.floor(Math.random()*chars.length));
  
  db.collection("invites").doc(code).set({ code:code, createdBy:currentUser.uid, createdByName:currentProfile.name||currentProfile.username, usedBy:null, status:"active", createdAt:fsTimestamp() })
    .then(function() {
      db.collection("members").doc(currentUser.uid).update({invitesUsed:firebase.firestore.FieldValue.increment(1)}); currentProfile.invitesUsed = (currentProfile.invitesUsed||0)+1;
      document.getElementById("memberInviteResult").innerHTML = '<div class="invite-code"><div class="code">' + code + '</div><div class="hint">Share this code with the new member</div></div>';
      Router.toast("Invite created!");
    });
}

  var referral = document.getElementById("add-referral").value;
  var range = document.getElementById("add-range").value;
  var handicap = document.getElementById("add-handicap").value;
  var result = PB.addPlayer(name, referral);
  if (result) {
    var updates = {};
    if (range) updates.range = range;
    if (handicap) updates.manualHandicap = parseFloat(handicap);

    syncMember(result);
    Router.toast(name + " added to the Parbaughs!");
    Router.go("members", { edit: result.id });
  } else {
    Router.toast("Member already exists");
  }
}

/* ================================================
   HEAD-TO-HEAD TRACKING
   ================================================ */

function calcH2H(pid1, pid2) {
  var rounds = PB.getRounds();
  var p1wins = 0, p2wins = 0, ties = 0;

  // Find rounds where both players played the same course on the same date
  var p1rounds = rounds.filter(function(r) { return r.player === pid1; });
  var p2rounds = rounds.filter(function(r) { return r.player === pid2; });

  p1rounds.forEach(function(r1) {
    var match = p2rounds.find(function(r2) {
      return r2.course === r1.course && r2.date === r1.date;
    });
    if (match) {
      if (r1.score < match.score) p1wins++;
      else if (r1.score > match.score) p2wins++;
      else ties++;
    }
  });

  return { p1wins: p1wins, p2wins: p2wins, ties: ties };
}

function submitAce() {
  var player = document.getElementById("ace-player").value;
  var course = document.getElementById("ace-course").value;
  if (!player || !course) { Router.toast("Player and course required"); return; }

  var ace = {
    by: player,
    course: course,
    hole: document.getElementById("ace-hole").value,
    distance: document.getElementById("ace-distance").value,
    club: document.getElementById("ace-club").value,
    date: document.getElementById("ace-date").value,
    description: document.getElementById("ace-desc").value,
    witnesses: document.getElementById("ace-witnesses").value,
    photo: "",
    ts: Date.now()
  };

  var photoInput = document.getElementById("ace-photo");
  if (photoInput && photoInput.files && photoInput.files[0]) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement("canvas");
        var maxW = 600, maxH = 400;
        var ratio = Math.min(maxW / img.width, maxH / img.height);
        canvas.width = img.width * ratio;
        canvas.height = img.height * ratio;
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        ace.photo = canvas.toDataURL("image/jpeg", 0.7);
        saveAce(ace);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(photoInput.files[0]);
  } else {
    saveAce(ace);
  }
}

function saveAce(ace) {
  var rec = PB.getRecords();
  if (!rec.holeInOnes) rec.holeInOnes = [];
  rec.holeInOnes.push(ace);
  PB.setRecord("holeInOnes", rec.holeInOnes);
  Router.toast("Ace immortalized");
  Router.go("aces");
}

function deleteAce(idx) {
  var el = document.getElementById("ace-del-confirm");
  if (el) { el.style.display = "block"; return; }

function confirmDeleteAce(idx) {
  var rec = PB.getRecords();
  if (rec.holeInOnes) {
    rec.holeInOnes.splice(idx, 1);
    PB.setRecord("holeInOnes", rec.holeInOnes);
  }
  Router.toast("Ace removed");
  Router.go("aces");
}

  var h = '<div class="sh"><h2>Play now</h2><button class="back" onclick="Router.go(\'rounds\')">← Back</button></div>';

  h += '<div style="text-align:center;padding:16px"><div style="font-family:Playfair Display,serif;font-size:18px;color:var(--gold)">Start a round</div><div style="font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.3px">Score hole by hole as you play</div>';
  h += '<div style="margin-top:10px"><span style="font-size:11px;color:var(--gold);cursor:pointer;text-decoration:underline" onclick="Router.go(\'scramble-live\')">Or start a Scramble Round →</span></div></div>';

  h += '<div class="form-section">';
  // Player is always the current user — locked
  var myPlayer = currentUser ? PB.getPlayer(currentUser.uid) : null;

  var playAs = myPlayer || myLocalPlayer || PB.getPlayers()[0];

  h += '<div class="ff"><label class="ff-label">Format</label><select class="ff-input" id="pn-format"><option value="stroke">Stroke play</option><option value="parbaugh">Parbaugh Stroke Play (handicap-adjusted)</option><option value="stableford">Stableford</option><option value="match">Match play</option><option value="scramble">Scramble</option><option value="bestball">Best ball</option><option value="skins">Skins</option></select></div>';

function showPlayCourseSearch(input) {
  var val = input.value.trim();
  var results = PB.searchCourses(val);
  var container = document.getElementById("search-pn-course");
  if (!val || val.length < 2) { container.innerHTML = ""; return; }
  var h = '';
  results.forEach(function(c) {
    h += '<div class="search-item" onclick="document.getElementById(\'pn-course\').value=\'' + c.name.replace(/'/g, "\\'") + '\';document.getElementById(\'pn-rating\').value=\'' + c.rating + '\';document.getElementById(\'pn-slope\').value=\'' + c.slope + '\';document.getElementById(\'search-pn-course\').innerHTML=\'\'">' + c.name + ' <span style="color:var(--muted);font-size:11px">' + c.loc + '</span></div>';
  });
  if (!results.length) {
    h += '<div class="search-item" style="display:flex;justify-content:space-between;align-items:center" onclick="quickAddCourse(\'' + val.replace(/'/g, "\\'") + '\')">';
    h += '<div><div style="font-size:12px;color:var(--cream)">' + escHtml(val) + '</div><div style="font-size:10px;color:var(--muted);margin-top:2px">Not found — tap to quick add</div></div>';
    h += '<div style="font-size:10px;color:var(--gold);font-weight:600">+ Add</div></div>';
  }
  container.innerHTML = h;
}

function quickAddCourse(name) {
  var state = prompt("State (e.g. VA, PA, NC):", "");
  if (!state) state = "";
  state = state.trim().toUpperCase().substring(0, 2);
  
  var id = name.toLowerCase().replace(/[^a-z0-9]/g, "").substring(0, 20) + Date.now().toString(36).slice(-4);
  var course = {
    id: id,
    name: name,
    loc: (state ? state : "Unknown"),
    region: state || "US",
    rating: 72.0,
    slope: 113,
    par: 72,
    photo: "",
    reviews: [],
    addedBy: currentUser ? currentUser.uid : "local",
    quickAdd: true
  };
  
  PB.addCourse(course);
  if (db) {
    db.collection("courses").doc(id).set(Object.assign({}, course, {createdAt: fsTimestamp()})).catch(function(){});
  }
  
  // Auto-select the new course
  document.getElementById("pn-course").value = name;
  document.getElementById("pn-rating").value = "72";
  document.getElementById("pn-slope").value = "113";
  document.getElementById("search-pn-course").innerHTML = "";
  Router.toast("Added " + name + "! Rating/slope can be updated later.");
}

function startLiveRound() {
  var player = document.getElementById("pn-player").value;
  var course = document.getElementById("pn-course").value;
  if (!course) { Router.toast("Select a course"); return; }

  liveState = {
    active: true,
    player: player,
    course: course,
    rating: parseFloat(document.getElementById("pn-rating").value) || 72,
    slope: parseInt(document.getElementById("pn-slope").value) || 113,
    format: document.getElementById("pn-format").value,
    startTime: Date.now(),
    currentHole: 0,
    scores: Array(18).fill(""),
    fir: Array(18).fill(false),
    gir: Array(18).fill(false),
    putts: Array(18).fill("")
  };

  Router.toast("Let's go!");
  Router.go("playnow");
}

function renderLiveScoring() {
  var hole = liveState.currentHole;
  var player = PB.getPlayer(liveState.player);
  var defaultPar = [4,4,3,4,5,4,4,3,5,4,3,4,5,4,4,3,4,5];
  var par = defaultPar[hole] || 4;
  var isPar3 = par === 3;

  // Calculate running total
  var totalSoFar = 0, holesPlayed = 0;
  liveState.scores.forEach(function(s) { if (s !== "") { totalSoFar += parseInt(s); holesPlayed++; } });
  var parSoFar = 0;
  for (var pi = 0; pi < holesPlayed; pi++) parSoFar += defaultPar[pi] || 4;

  var h = '';

  // Top bar with course name and running score

  h += '<div style="font-size:10px;color:var(--muted);margin-top:1px">' + (player ? player.name : '') + ' · ' + liveState.format + '</div></div>';
  h += '<div style="text-align:right"><div style="font-family:Playfair Display,serif;font-size:22px;font-weight:700;color:var(--gold)">' + (totalSoFar || "—") + '</div>';

    var diff = totalSoFar - parSoFar;
    h += '<div style="font-size:10px;color:' + (diff > 0 ? 'var(--red)' : diff < 0 ? 'var(--birdie)' : 'var(--muted)') + '">' + (diff > 0 ? '+' : '') + diff + ' thru ' + holesPlayed + '</div>';
  }
  h += '</div></div>';

  // Hole selector dots
  h += '<div style="padding:10px 16px;display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none">';
  for (var d = 0; d < 18; d++) {
    var scored = liveState.scores[d] !== "";
    var isCurrent = d === hole;
    var dotColor = isCurrent ? 'var(--gold)' : scored ? 'var(--birdie)' : 'var(--border)';
    var dotBg = isCurrent ? 'rgba(201,168,76,.15)' : scored ? 'rgba(78,201,122,.08)' : 'transparent';
    h += '<div onclick="liveState.currentHole=' + d + ';Router.go(\'playnow\')" style="min-width:24px;height:24px;border-radius:12px;border:1.5px solid ' + dotColor + ';background:' + dotBg + ';display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:' + dotColor + ';cursor:pointer;flex-shrink:0">' + (d+1) + '</div>';

  h += '<div style="text-align:center;margin-bottom:20px">';
  h += '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px">Hole ' + (hole+1) + '</div>';
  h += '<div style="font-family:Playfair Display,serif;font-size:48px;font-weight:700;color:var(--cream);margin-top:4px">Par ' + par + '</div>';

  // Score input - big buttons
  var currentScore = liveState.scores[hole];
  h += '<div style="text-align:center;margin-bottom:20px">';
  h += '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Score</div>';
  h += '<div style="display:flex;justify-content:center;align-items:center;gap:16px">';
  h += '<div onclick="adjustLiveScore(-1)" style="width:52px;height:52px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--muted);cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent">−</div>';
  h += '<div id="liveScoreNum" style="font-family:Playfair Display,serif;font-size:48px;font-weight:700;color:var(--gold);min-width:60px;text-align:center">' + (currentScore || "—") + '</div>';
  h += '<div onclick="adjustLiveScore(1)" style="width:52px;height:52px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--muted);cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent">+</div>';
  h += '</div>';

  // Score label
  if (currentScore !== "") {

    var label = labels[scoreDiff.toString()] || (scoreDiff > 0 ? '+' + scoreDiff : scoreDiff);

    h += '<div style="width:48px;height:48px;border-radius:10px;border:1.5px solid ' + (liveState.fir[hole] ? 'var(--birdie)' : 'var(--border)') + ';background:' + (liveState.fir[hole] ? 'rgba(78,201,122,.12)' : 'transparent') + ';display:flex;align-items:center;justify-content:center;font-size:14px;color:' + (liveState.fir[hole] ? 'var(--birdie)' : 'var(--muted2)') + ';margin:0 auto 4px">' + (liveState.fir[hole] ? '✓' : '') + '</div>';

  h += '<div style="width:48px;height:48px;border-radius:10px;border:1.5px solid ' + (liveState.gir[hole] ? 'var(--gold)' : 'var(--border)') + ';background:' + (liveState.gir[hole] ? 'rgba(201,168,76,.12)' : 'transparent') + ';display:flex;align-items:center;justify-content:center;font-size:14px;color:' + (liveState.gir[hole] ? 'var(--gold)' : 'var(--muted2)') + ';margin:0 auto 4px">' + (liveState.gir[hole] ? '✓' : '') + '</div>';
  h += '<div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">GIR</div></div>';

  // Putts
  var puttVal = liveState.putts[hole];
  h += '<div style="text-align:center">';
  h += '<div onclick="cyclePutts(' + hole + ')" style="width:48px;height:48px;border-radius:10px;border:1.5px solid ' + (puttVal ? 'var(--cream)' : 'var(--border)') + ';background:' + (puttVal ? 'rgba(234,232,224,.06)' : 'transparent') + ';display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--cream);margin:0 auto 4px;cursor:pointer">' + (puttVal || '') + '</div>';

    h += '<button class="btn outline" style="flex:1" onclick="liveState.currentHole--;Router.go(\'playnow\')">Previous</button>';
  }
  if (hole < 17) {
    h += '<button class="btn green" style="flex:1" onclick="if(liveState.scores[' + hole + ']===\'\'){Router.toast(\'Enter a score\');return;}liveState.currentHole++;Router.go(\'playnow\')">Next hole</button>';
  } else {
    h += '<button class="btn green" style="flex:1" onclick="showFinishOptions()">Finish round</button>';
  }

  h += '<div style="font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Publish round</div>';
  h += '<div style="display:flex;gap:8px;margin-bottom:10px">';
  h += '<div onclick="document.getElementById(\'vis-public\').style.borderColor=\'var(--gold)\';document.getElementById(\'vis-private\').style.borderColor=\'var(--border)\';liveState.visibility=\'public\'" id="vis-public" style="flex:1;padding:10px;text-align:center;border:2px solid var(--gold);border-radius:var(--radius);cursor:pointer;background:rgba(201,168,76,.06)"><div style="font-size:12px;font-weight:600;color:var(--cream)">Public</div><div style="font-size:9px;color:var(--muted);margin-top:2px">Shows in activity feed</div></div>';
  h += '<div onclick="document.getElementById(\'vis-private\').style.borderColor=\'var(--gold)\';document.getElementById(\'vis-public\').style.borderColor=\'var(--border)\';liveState.visibility=\'private\'" id="vis-private" style="flex:1;padding:10px;text-align:center;border:2px solid var(--border);border-radius:var(--radius);cursor:pointer"><div style="font-size:12px;font-weight:600;color:var(--cream)">Private</div><div style="font-size:9px;color:var(--muted);margin-top:2px">Only on your profile</div></div>';
  h += '</div>';
  h += '<button class="btn full green" onclick="finishLiveRound()">Confirm & save</button>';

    for (var bi = 9; bi < 18; bi++) { if (liveState.scores[bi] !== "") { back += parseInt(liveState.scores[bi]); backCount++; } }
    if (frontCount > 0) {

  h += '</div>';

  document.querySelector('[data-page="playnow"]').innerHTML = h;
}

function adjustLiveScore(delta) {
  var hole = liveState.currentHole;
  var current = liveState.scores[hole];
  if (current === "") {
    var defaultPar = [4,4,3,4,5,4,4,3,5,4,3,4,5,4,4,3,4,5];
    liveState.scores[hole] = defaultPar[hole] || 4;
  } else {
    var newVal = parseInt(current) + delta;
    if (newVal >= 1 && newVal <= 15) liveState.scores[hole] = newVal;
  }
  Router.go("playnow");
  // Trigger pop animation
  setTimeout(function() {
    var el = document.getElementById("liveScoreNum");
    if (el) { el.classList.remove("score-pop"); void el.offsetWidth; el.classList.add("score-pop"); }
  }, 20);
}

function cyclePutts(hole) {
  var current = liveState.putts[hole];
  if (!current) liveState.putts[hole] = 1;
  else if (current >= 4) liveState.putts[hole] = "";
  else liveState.putts[hole] = current + 1;
  Router.go("playnow");
}

function finishLiveRound() {
  var totalScore = 0, completed = 0;
  liveState.scores.forEach(function(s) { if (s !== "") { totalScore += parseInt(s); completed++; } });

  if (completed < 9) { Router.toast("Play at least 9 holes"); return; }

  // Save as a local round
  var round = PB.addRound({
    player: liveState.player,
    course: liveState.course,
    score: totalScore,
    date: new Date().toISOString().split("T")[0],
    rating: liveState.rating,
    slope: liveState.slope,
    format: liveState.format,
    holesPlayed: completed,
    holeScores: liveState.scores.slice(),
    firData: liveState.fir.slice(),
    girData: liveState.gir.slice(),
    puttsData: liveState.putts.slice()
  });

  // Calculate stats
  var firCount = 0, girCount = 0, totalPutts = 0;
  var defaultPar = [4,4,3,4,5,4,4,3,5,4,3,4,5,4,4,3,4,5];
  var parTotal = 0;
  for (var i = 0; i < completed; i++) {
    if (defaultPar[i] !== 3 && liveState.fir[i]) firCount++;
    if (liveState.gir[i]) girCount++;
    if (liveState.putts[i]) totalPutts += liveState.putts[i];
    parTotal += defaultPar[i] || 4;
  }
  var firHoles = 0;
  for (var j = 0; j < completed; j++) { if (defaultPar[j] !== 3) firHoles++; }

  liveState.active = false;

  var commentary = PB.generateRoundCommentary(round);
  var msg = commentary.roasts.length ? commentary.roasts[0] : (commentary.highlights.length ? commentary.highlights[0] : "Round complete!");

  // Build share card text
  var diff = totalScore - parTotal;
  var diffStr = diff > 0 ? "+" + diff : diff === 0 ? "E" : diff;
  var playerName = currentProfile ? (currentProfile.name || currentProfile.username) : "A Parbaugh";
  var shareText = "⛳ " + playerName + " shot " + totalScore + " (" + diffStr + ") at " + liveState.course;
  if (firHoles > 0) shareText += " · FIR " + firCount + "/" + firHoles;
  shareText += " · GIR " + girCount + "/" + completed;
  if (totalPutts > 0) shareText += " · " + totalPutts + " putts";
  shareText += "\n🏌️ parbaughs.golf";

  // Show share card modal
  showShareCard(totalScore, diffStr, liveState.course, playerName, firCount, firHoles, girCount, completed, totalPutts, shareText, round.id);
}

function showFinishOptions() {
  var el = document.getElementById("finish-options");
  if (el) el.style.display = "block";
  liveState.visibility = "public";
  window.scrollTo(0, document.body.scrollHeight);
}

Router.register("standings", function() {
  var year = new Date().getFullYear();
  var season = PB.getSeasonStandings(year);
  var now = new Date();
  var month = now.getMonth();
  var inSeason = month >= 2 && month <= 8;

  var h = '<div class="sh"><h2>Season</h2><button class="back" onclick="Router.go(\'records\')">← Back</button></div>';

  h += '<div style="text-align:center;padding:20px 16px 24px;background:linear-gradient(180deg,#111520,var(--bg));border-bottom:1px solid var(--border)">';
  h += '<div style="font-family:Playfair Display,serif;font-size:28px;color:var(--gold);font-weight:700">' + year + ' Parbaugh Season</div>';
  h += '<div style="font-size:11px;color:var(--muted);margin-top:6px;letter-spacing:1.5px;text-transform:uppercase">March 1 — September 30</div>';
  if (inSeason) {
    var seasonEnd = new Date(year, 8, 30);
    var daysLeft = Math.ceil((seasonEnd - now) / (1000*60*60*24));
    h += '<div style="display:inline-block;margin-top:10px;padding:5px 14px;background:rgba(78,201,122,.08);border:1px solid rgba(78,201,122,.15);border-radius:12px;font-size:10px;color:var(--birdie);font-weight:600;letter-spacing:.5px">IN SEASON · ' + daysLeft + ' DAYS LEFT</div>';
  } else {
    var nextSeason = new Date(month >= 9 ? year+1 : year, 2, 1);
    var daysUntil = Math.ceil((nextSeason - now) / (1000*60*60*24));
    h += '<div style="display:inline-block;margin-top:10px;padding:5px 14px;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.12);border-radius:12px;font-size:10px;color:var(--gold);font-weight:600;letter-spacing:.5px">OFFSEASON · ' + daysUntil + ' DAYS UNTIL NEXT</div>';
  }
  h += '</div>';

  if (season.standings.length) {
    var totalRounds = season.standings.reduce(function(a,s){return a+s.rounds},0);
    var bestScore = Math.min.apply(null, season.standings.filter(function(s){return s.best}).map(function(s){return s.best}).concat([999]));
    h += '<div class="stats-grid" style="padding:12px 16px">';
    h += '<div class="stat-box"><div class="stat-val">' + season.standings.length + '</div><div class="stat-label">Active</div></div>';
    h += '<div class="stat-box"><div class="stat-val">' + totalRounds + '</div><div class="stat-label">Rounds</div></div>';
    h += '<div class="stat-box"><div class="stat-val">' + (bestScore < 999 ? bestScore : "—") + '</div><div class="stat-label">Low round</div></div>';
    h += '</div>';
  }

  h += '<div class="section"><div class="sec-head"><span class="sec-title">Standings</span></div>';
  if (season.standings.length) {

function renderChallengeList() {
  var challenges = [];
  try {
    PB.getPlayers().forEach(function(p) {
      var pc = PB.getChallenges(p.id);
      pc.forEach(function(c) {
        if (!challenges.find(function(x){return x.id===c.id})) challenges.push(c);
      });
    });
  } catch(e) {}

  var h = '<div class="sh"><h2>Challenges</h2><div style="display:flex;gap:8px"><button class="back" onclick="Router.go(\'records\')">← Back</button><button class="btn-sm green" onclick="Router.go(\'challenges\',{create:true})">+ New</button></div></div>';

  if (challenges.length) {
    challenges.sort(function(a,b){return (b.ts||0)-(a.ts||0)});
    challenges.forEach(function(c) {
      var from = PB.getPlayer(c.from);
      var to = PB.getPlayer(c.to);
      var statusColor = c.status === "pending" ? "var(--gold)" : c.status === "accepted" ? "var(--birdie)" : c.status === "completed" ? "var(--cream)" : "var(--red)";
      h += '<div class="card"><div style="padding:14px 16px">';
      h += '<div style="display:flex;justify-content:space-between;align-items:center">';
      h += '<div><div style="font-size:13px;font-weight:600">' + (from?from.username||from.name:"?") + ' vs ' + (to?to.username||to.name:"?") + '</div>';
      if (c.course) h += '<div style="font-size:11px;color:var(--muted);margin-top:2px">' + c.course + '</div>';
      if (c.stakes) h += '<div style="font-size:11px;color:var(--gold2);margin-top:2px;font-style:italic">' + c.stakes + '</div>';
      h += '<div style="font-size:9px;color:var(--muted2);margin-top:3px">' + (c.created || "") + '</div>';
      h += '</div>';
      h += '<div style="font-size:10px;font-weight:600;color:' + statusColor + ';text-transform:uppercase;letter-spacing:.5px">' + c.status + '</div>';
      h += '</div></div></div>';
    });
  } else {
    h += '<div class="card"><div class="empty" style="padding:28px"><div class="empty-text">No challenges yet</div>';
    h += '<div style="font-size:10px;color:var(--muted2);margin-top:4px">Challenge a member to a H2H match</div></div></div>';

  document.querySelector('[data-page="challenges"]').innerHTML = h;
}

function submitChallenge() {
  var from = document.getElementById("ch-from").value;
  var to = document.getElementById("ch-to").value;
  if (from === to) { Router.toast("Pick two different players"); return; }
  var course = document.getElementById("ch-course").value;
  var stakes = document.getElementById("ch-stakes").value;
  PB.createChallenge(from, to, course, stakes);
  Router.toast("Challenge sent!");
  Router.go("challenges");
}
