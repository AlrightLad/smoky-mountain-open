<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Parbaughs">
<meta name="theme-color" content="#0e1118">
<meta property="og:title" content="The Parbaughs">
<meta property="og:description" content="Golf league platform · Est. 2026 · York, PA">
<meta property="og:type" content="website">
<title>The Parbaughs</title>
<link rel="apple-touch-icon" href="watermark.jpg">
<link rel="icon" type="image/jpeg" href="watermark.jpg">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;min-height:100dvh;max-width:680px;margin:0 auto;overflow-x:hidden;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
input[type=date]{-webkit-appearance:none;appearance:none;min-width:0;font-size:14px}
input[type=date]::-webkit-date-and-time-value{text-align:left}
input,select,textarea{font-family:inherit}
select{-webkit-appearance:none;appearance:none}
button,[onclick],.btn,.btn-sm,.tee-rsvp-btn{touch-action:manipulation;-webkit-tap-highlight-color:transparent;cursor:pointer}

/* ===== PULL TO REFRESH ===== */
.ptr-indicator{position:fixed;top:-44px;left:50%;transform:translateX(-50%);width:34px;height:34px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;z-index:150;opacity:0;transition:top .15s ease;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.ptr-indicator svg{color:var(--gold)}
@keyframes spin{from{transform:translateX(-50%) rotate(0deg)}to{transform:translateX(-50%) rotate(360deg)}}

:root{--bg:#0e1118;--bg2:#131722;--bg3:#1a1f2c;--bg4:#212738;--gold:#c9a84c;--gold2:#a68b3a;--gold3:#dfc06a;--green:#1a2840;--green2:#253a58;--cream:#eae8e0;--muted:#7a7e8a;--muted2:#484d5c;--red:#d4604e;--birdie:#4ec97a;--card:#121620;--border:#1e2333;--radius:6px}

.hidden{display:none!important}

/* NAV */
.nav{display:flex;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;background:var(--bg);scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav button{flex:1 1 0;padding:14px 4px;background:0 0;color:var(--muted2);border:none;border-bottom:2px solid transparent;font:600 9px/1 'Inter',sans-serif;cursor:pointer;white-space:nowrap;text-transform:uppercase;letter-spacing:.8px;transition:color .1s,border-color .1s;text-align:center;touch-action:manipulation;-webkit-tap-highlight-color:rgba(201,168,76,.1);min-height:44px}
.nav button:hover{color:var(--cream)}
.nav button.a{color:var(--gold);border-bottom-color:var(--gold);background:rgba(201,168,76,.08)}
.nav button.a:hover{color:var(--gold3)}

/* HERO */
.hero{padding:36px 20px 22px;text-align:center;background:linear-gradient(180deg,#111520,var(--bg));border-bottom:1px solid var(--border)}
.hero-logo{width:80px;height:80px;border-radius:20px;margin:0 auto 14px;overflow:hidden;background:var(--bg3);border:1px solid var(--border)}
.hero-logo img{width:100%;height:100%;object-fit:cover}
.hero h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:var(--gold);letter-spacing:3px}
.hero .est{font-size:9px;color:var(--muted);letter-spacing:5px;text-transform:uppercase;margin-top:4px;font-weight:500}

/* SECTIONS */
.section{padding:14px 16px 6px}
.sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sec-title{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase}
.sec-link{font-size:11px;color:var(--muted);cursor:pointer;letter-spacing:.3px}
.sec-link:hover{color:var(--gold)}
.sec-link:active{color:var(--gold)}
.sh{padding:16px 16px 10px;display:flex;justify-content:space-between;align-items:center}
.sh h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--gold)}
.back{background:none;border:none;color:var(--muted);font:600 13px 'Inter',sans-serif;cursor:pointer;padding:6px 10px;border-radius:6px;transition:background .15s}
.back:hover{color:var(--cream);background:var(--bg3)}
.back:active{background:var(--bg3)}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin:0 16px 8px;transition:transform .1s,background .15s,border-color .15s}
.card:hover{background:var(--bg3);border-color:rgba(201,168,76,.12)}
.card:active{transform:scale(.985);background:var(--bg3)}
.card-body{padding:14px 16px}

/* BUTTONS */
.btn{display:inline-block;padding:12px 20px;border-radius:6px;font:600 12px/1 'Inter',sans-serif;cursor:pointer;border:none;text-align:center;transition:transform .1s,opacity .15s;letter-spacing:.3px}
.btn:active{transform:scale(.97);opacity:.85}
.btn.full{width:100%;display:block}
.btn.green{background:var(--gold);color:var(--bg)}
.btn.green:hover{background:var(--gold3);box-shadow:0 0 12px rgba(201,168,76,.15)}
.btn.green:active{background:var(--gold2)}
.btn.outline{background:transparent;border:1px solid var(--border);color:var(--cream)}
.btn.outline:hover{border-color:var(--muted);background:var(--bg3);color:var(--gold)}
.btn.outline:active{background:var(--bg3)}
.btn-sm{padding:8px 14px;border-radius:6px;font:600 11px/1 'Inter',sans-serif;cursor:pointer;border:none;transition:transform .1s;letter-spacing:.3px}
.btn-sm:active{transform:scale(.95)}
.btn-sm.green{background:var(--gold);color:var(--bg)}
.btn-sm.outline{background:transparent;border:1px solid var(--border);color:var(--cream)}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;background:var(--bg3);color:var(--muted)}
.badge.gld{background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.2)}

/* NEXT TRIP */
.next-trip{background:linear-gradient(135deg,#151929,#0f121c);border:1px solid rgba(201,168,76,.15);border-radius:var(--radius);padding:18px;margin-bottom:8px;cursor:pointer;position:relative;overflow:hidden;transition:transform .1s}
.next-trip:hover{border-color:rgba(201,168,76,.35);background:linear-gradient(135deg,#1c2038,#141825);box-shadow:0 0 20px rgba(201,168,76,.04)}
.next-trip:active{transform:scale(.98)}
.next-trip::after{content:'';position:absolute;top:-50%;right:-50%;width:50%;height:200%;background:linear-gradient(135deg,transparent,rgba(201,168,76,.02),transparent);transform:rotate(30deg);pointer-events:none}
.nt-eye{font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:3px;font-weight:700;margin-bottom:6px}
.nt-name{font-size:18px;font-weight:800;color:var(--cream);margin-bottom:3px}
.nt-detail{font-size:12px;color:var(--muted)}
.nt-count{font-size:12px;color:var(--gold);margin-top:10px;font-weight:700}
.nt-count.live{color:var(--birdie);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* RIVALRY */
.rivalry-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:8px;transition:border-color .15s}
.rivalry-card:hover{border-color:rgba(201,168,76,.15);background:var(--bg2)}
.rivalry-eye{font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:3px;font-weight:600;margin-bottom:14px;text-align:center}
.rivalry-vs{display:flex;align-items:center;justify-content:center;gap:16px}
.rv-player{text-align:center}
.rv-av{position:relative;width:44px;height:44px;border-radius:50%;background:var(--bg3);border:2px solid var(--border);margin:0 auto 4px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px}
.rv-av img{width:100%;height:100%;object-fit:cover}
.rv-name{font-size:12px;font-weight:600}
.rv-x{font-size:18px;font-weight:800;color:var(--muted2)}
.rv-score{text-align:center;margin-top:12px;font-family:"Playfair Display",serif;font-size:26px;font-weight:700;color:var(--gold)}
.rv-label{font-size:10px;color:var(--muted);text-align:center;margin-top:2px}

/* FEED */
.feed-row{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.feed-row:hover{background:var(--bg3)}
.feed-row:last-child{border:none}
.feed-name{font-size:13px;font-weight:600;letter-spacing:.1px}
.feed-course{font-size:11px;color:var(--muted);margin-top:1px}
.feed-quip{font-size:11px;color:var(--gold2);margin-top:4px;font-style:italic;line-height:1.3}
.feed-score{font-family:"Playfair Display",serif;font-size:20px;font-weight:700;color:var(--gold);text-align:right}
.feed-date{font-size:10px;color:var(--muted);text-align:right;letter-spacing:.3px}

/* QUICK LINKS */
.qlinks{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 16px}
.ql{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 8px 12px;text-align:center;cursor:pointer;transition:transform .1s,background .15s}
.ql:hover{background:var(--bg3);border-color:rgba(201,168,76,.15)}
.ql:active{background:var(--bg3);transform:scale(.95)}
.ql-icon{display:flex;justify-content:center;margin-bottom:6px}
.ql-label{font-size:10px;font-weight:600;color:var(--cream);letter-spacing:.5px;text-transform:uppercase}

/* CHAMPIONS */
.champ-row{display:flex;align-items:center;gap:12px;padding:12px 16px}
.champ-medal{font-size:22px}
.champ-trip{font-size:12px;font-weight:600;letter-spacing:.2px}
.champ-winner{font-size:11px;color:var(--gold);font-weight:600;letter-spacing:.3px}

/* EMPTY STATE */
.empty{text-align:center;padding:32px 20px}
.empty-icon{font-size:28px;margin-bottom:6px}
.empty-text{font-size:12px;color:var(--muted);letter-spacing:.2px}

/* MEMBERS */
.member-row{display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;transition:background .15s}
.member-row:hover{background:var(--bg3)}
.member-row:active{background:var(--bg3)}
.m-av{position:relative;width:48px;height:48px;border-radius:50%;background:var(--bg3);border:2px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--gold);font-weight:700;flex-shrink:0}
.m-av img{width:100%;height:100%;object-fit:cover}
.m-info{flex:1;min-width:0}
.m-name{font-size:14px;font-weight:600}
.m-nick{font-size:12px;color:var(--gold)}
.m-stats{font-size:11px;color:var(--muted);margin-top:3px}
.m-arrow{color:var(--muted2);font-size:16px}

/* PROFILE DETAIL */
.pd-banner{text-align:center;padding:20px 16px 16px}
.pd-av{position:relative;width:86px;height:86px;border-radius:50%;background:var(--bg3);border:2px solid var(--gold2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:34px;color:var(--gold);font-weight:700;margin:0 auto 10px;cursor:pointer;position:relative}
.pd-av img{width:100%;height:100%;object-fit:cover}
.pd-edit{position:absolute;bottom:0;right:0;width:24px;height:24px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid var(--bg);color:var(--bg)}
.pd-name{font-family:"Playfair Display",serif;font-size:22px;font-weight:700}
.pd-nick{font-size:12px;color:var(--gold);margin-top:3px;letter-spacing:.3px}
.pd-range{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.2px}
.pd-bio{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.6;max-width:300px;margin-left:auto;margin-right:auto;font-style:italic}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 16px 12px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 6px;text-align:center}
.stat-val{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--gold)}
.stat-label{font-size:8px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:1px;font-weight:600}

/* CLUBS */
.club-row{display:flex;justify-content:space-between;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:3px}
.club-name{font-size:12px;color:var(--cream);letter-spacing:.2px}
.club-yd{font-size:12px;color:var(--gold);font-weight:600}

/* FACTS */
.fact-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:4px;font-size:12px;color:var(--muted);line-height:1.4}

/* H2H */
.h2h-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:4px;transition:border-color .15s,background .15s}
.h2h-row:hover{background:var(--bg3);border-color:rgba(201,168,76,.1)}
.h2h-left{display:flex;align-items:center;gap:8px}
.h2h-av{position:relative;width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:12px}
.h2h-av img{width:100%;height:100%;object-fit:cover}
.h2h-name{font-size:13px;font-weight:600}
.h2h-record{font-size:13px;color:var(--gold);font-weight:700}

/* ROUND CARDS */
.round-card{padding:12px 16px}
.rc-top{display:flex;justify-content:space-between;align-items:flex-start}
.rc-course{font-size:13px;font-weight:600}
.rc-date{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.3px}
.rc-score{font-family:"Playfair Display",serif;font-size:24px;font-weight:700;color:var(--gold)}
.rc-quip{font-size:11px;color:var(--gold2);margin-top:8px;font-style:italic;line-height:1.4;border-left:2px solid rgba(201,168,76,.15);padding-left:10px}
.rc-photo{margin-top:8px;border-radius:8px;overflow:hidden}
.rc-photo img{width:100%;display:block}

/* FORMS */
.form-section{padding:0 16px 16px}
.form-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:10px}
.ff{margin-bottom:10px}
.ff-label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:600}
.ff-input{width:100%;padding:11px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--cream);font-size:14px;outline:none;transition:border .15s,box-shadow .15s;min-width:0;max-width:100%;box-sizing:border-box}
.ff-input:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(197,165,90,.1)}
textarea.ff-input{min-height:60px;resize:vertical}
.ff-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* TRIPS */
.trip-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}
.trip-name{font-family:"Playfair Display",serif;font-size:16px;font-weight:700;color:var(--gold)}
.trip-detail{font-size:12px;color:var(--muted);margin-top:2px}
.trip-members{font-size:11px;color:var(--muted2);margin-top:2px}

/* COURSES */
.course-row{display:flex;gap:12px;padding:12px 16px;cursor:pointer;align-items:center;transition:background .15s}
.course-row:hover{background:var(--bg3)}
.c-thumb{width:60px;height:42px;border-radius:8px;background:var(--bg3);overflow:hidden;flex-shrink:0}
.c-thumb img{width:100%;height:100%;object-fit:cover}
.c-thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:18px}
.c-info{flex:1}
.c-name{font-size:13px;font-weight:600}
.c-loc{font-size:11px;color:var(--muted);margin-top:1px}
.c-meta{font-size:11px;color:var(--gold);margin-top:3px}
.course-banner{height:160px;overflow:hidden;margin:0 16px;border-radius:var(--radius)}
.course-banner img{width:100%;height:100%;object-fit:cover}
.c-detail-info{font-size:13px;color:var(--muted);margin-bottom:8px}
.review-head{font-size:12px;color:var(--gold)}
.review-text{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.4}

/* HANDICAP */
.hcap-box{margin:0 16px 16px;background:linear-gradient(135deg,var(--bg4),var(--bg2));border:1px solid var(--border);border-radius:var(--radius);padding:24px;text-align:center}
.hcap-val{font-family:'Playfair Display',serif;font-size:44px;font-weight:800;color:var(--gold)}
.hcap-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:3px;margin-top:4px;font-weight:600}

/* HOF */
.hof-card{margin:0 16px 10px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.hof-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--gold);margin-bottom:10px;transition:color .15s}
.hof-title:hover{color:var(--gold3);text-shadow:0 0 8px rgba(201,168,76,.1)}
.hof-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);gap:8px}
.hof-row:last-child{border:none}
.hof-label{font-size:13px;color:var(--muted);flex-shrink:0}
.hof-val{font-size:13px;font-weight:700;text-align:right;overflow:hidden;text-overflow:ellipsis}

/* PHOTOS */
.photo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:0 16px}
.photo-thumb{aspect-ratio:1;border-radius:6px;overflow:hidden;background:var(--bg3)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}

/* SCORECARD */
.toggle-bar{display:flex;border-bottom:1px solid var(--border);background:var(--bg)}
.toggle-bar button{flex:1;padding:12px;background:transparent;color:var(--muted2);border:none;font:600 10px/1 'Inter',sans-serif;text-transform:uppercase;letter-spacing:1.2px;cursor:pointer;transition:all .15s}
.toggle-bar button.a{color:var(--gold);border-bottom:2px solid var(--gold)}
.sc-tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch;scrollbar-width:none}
.sc-tabs::-webkit-scrollbar{display:none}
.sc-tabs button{flex:0 0 auto;padding:10px 14px;background:0 0;color:var(--muted2);border:none;border-bottom:2px solid transparent;font:600 10px/1.4 'Inter',sans-serif;cursor:pointer;white-space:nowrap;letter-spacing:.5px}
.sc-tabs button.a{color:var(--gold);border-bottom-color:var(--gold)}
.sc-tabs .ts{font-size:9px;font-weight:400;opacity:.6;letter-spacing:0}
.ci{padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ci .nm{font-family:'Playfair Display',serif;font-size:15px;font-weight:700}.ci .dt{font-size:11px;color:var(--muted);letter-spacing:.2px}.ci .bd{padding:4px 14px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:20px;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.5px;text-transform:uppercase}
.mg{padding:12px 16px;border-bottom:1px solid var(--border)}
.mg h3{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.mgr{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mgi{display:flex;align-items:center;gap:6px}
.mgi label{font-size:9px;color:var(--muted);width:78px;flex-shrink:0;line-height:1.2;letter-spacing:.3px}
.mgi select{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--cream);padding:6px 8px;font:12px 'Inter',sans-serif;min-width:0}
table{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums}
th{padding:8px 6px;text-align:center;font:600 9px/1 'Inter',sans-serif;color:var(--muted);background:var(--bg3);text-transform:uppercase;letter-spacing:.8px}
th:first-child{text-align:left;padding-left:10px;position:sticky;left:0;z-index:2;background:var(--bg3)}
th.g{color:var(--gold)}
.r0{background:var(--bg2)}.r1{background:var(--bg)}
.r0 td:first-child{background:var(--bg2)}.r1 td:first-child{background:var(--bg)}
td{padding:3px 4px;text-align:center;border-bottom:1px solid rgba(30,35,51,.5)}
td:first-child{padding:6px 10px;font-weight:600;position:sticky;left:0;z-index:1;font-size:12px;color:var(--muted)}
.sr{background:var(--bg3)!important}.sr td{padding:7px 6px;font-weight:700;font-size:12px;color:var(--muted)}.sr td:first-child{background:var(--bg3)!important;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.ttr{background:var(--bg3)!important;border-top:2px solid var(--gold2)}.ttr td{padding:8px 6px;font-family:'Playfair Display',serif;font-weight:700;font-size:16px;color:var(--gold)}.ttr td:first-child{background:var(--bg3)!important;font-family:'Inter',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.ptsr{background:var(--bg4)!important}.ptsr td{padding:8px 6px;font-family:'Playfair Display',serif;font-weight:700;font-size:16px;color:var(--gold)}.ptsr td:first-child{background:var(--bg4)!important;font-family:'Inter',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.p3{color:var(--red);font-weight:600}.p5{color:var(--birdie);font-weight:600}.p4{color:var(--muted);font-weight:500}
input.s{width:42px;height:36px;text-align:center;border-radius:4px;font:600 14px 'Inter',sans-serif;outline:0;background:var(--bg3);border:1px solid var(--border);color:var(--cream);transition:border .15s}
input.s:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,168,76,.1)}
input.s.w{width:48px}
input.s.bi{background:rgba(78,201,122,.08);border:1px solid rgba(78,201,122,.3);border-radius:50%;color:var(--birdie)}
input.s.ea{background:rgba(201,168,76,.08);border:2px solid var(--gold);border-radius:50%;color:var(--gold)}
input.s.bo{background:rgba(212,96,78,.08);border:1px solid rgba(212,96,78,.2);color:var(--red)}
input.s.db{background:rgba(212,96,78,.08);border:1px solid rgba(212,96,78,.2);color:var(--red)}
.lg{padding:10px 16px;background:var(--bg2);border-top:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.li{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted);letter-spacing:.3px}
.ld{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;font-size:9px;font-weight:800;border-radius:4px;background:var(--bg3);border:1px solid var(--border)}
.ld.c{border-radius:50%}

/* LEADERBOARD */
.lbs{padding:16px}
.lb-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--gold);margin-bottom:12px}
.lb-card{display:flex;align-items:center;justify-content:space-between;padding:14px;margin-bottom:6px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border)}
.lb-card.first{background:linear-gradient(135deg,#1a1e30,var(--bg2));border-color:rgba(201,168,76,.2)}
.lb-left{display:flex;align-items:center;gap:10px}
.lb-medal{font-size:12px;font-weight:800;color:var(--gold);width:28px;text-align:center;letter-spacing:-.5px}
.lb-name{font-weight:600;font-size:14px}
.lb-detail{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.2px}
.lb-pts{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--gold)}
.rc{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:8px;border:1px solid var(--border)}
.rh{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:8px}
.rc-body{font-size:14px}
.rc-row{display:flex;justify-content:space-between;padding:5px 0;font-size:14px}
.rc-strokes{color:var(--muted);margin-right:10px}
.rc-pts{color:var(--gold);font-weight:700}
.bonus-card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:8px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.bonus-info .bonus-label{font-size:14px;font-weight:700}
.bonus-info .bonus-desc{font-size:11px;color:var(--muted)}
.bonus-card select{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--gold);padding:7px 28px 7px 10px;font:13px 'Inter',sans-serif}

/* BACKUP */
.bk-row{display:flex;gap:8px}
.bk-row button{flex:1}

/* FOOTER */
.footer{text-align:center;padding:24px 0 40px;font-size:9px;color:var(--muted2);letter-spacing:2px;text-transform:uppercase}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--gold);color:var(--bg);padding:10px 22px;border-radius:20px;font:600 12px 'Inter',sans-serif;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:99;max-width:90%;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.4);letter-spacing:.3px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* SEARCH RESULTS */
.search-results{position:relative;z-index:10}
.search-item{padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-top:none;cursor:pointer;font-size:13px;transition:background .1s}
.search-item:first-child{border-top:1px solid var(--border);border-radius:0 0 0 0}
.search-item:last-child{border-radius:0 0 8px 8px}
.search-item:hover,.search-item:active{background:var(--bg4)}


/* ===== AUTH SCREENS ===== */
.auth-screen{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.auth-logo{width:100px;height:100px;border-radius:20px;border:1px solid var(--border);overflow:hidden;margin-bottom:20px;background:var(--bg3)}
.auth-logo img{width:100%;height:100%;object-fit:cover}
.auth-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:800;color:var(--gold);letter-spacing:3px;margin-bottom:4px}
.auth-sub{font-size:9px;color:var(--muted);letter-spacing:5px;text-transform:uppercase;margin-bottom:32px;font-weight:500}
.auth-form{width:100%;max-width:320px}
.auth-input{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--cream);font-size:14px;margin-bottom:10px;outline:none;transition:border .15s,box-shadow .15s;font-family:'Inter',sans-serif}
.auth-input:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,168,76,.1)}
.auth-input::placeholder{color:var(--muted2)}
.auth-btn{width:100%;padding:13px;background:var(--gold);color:var(--bg);border:none;border-radius:8px;font:700 13px 'Inter',sans-serif;letter-spacing:.5px;margin-bottom:10px;cursor:pointer;transition:transform .1s,opacity .15s}
.auth-btn:active{transform:scale(.97);opacity:.85}
.auth-btn:disabled{opacity:.4;cursor:default}
.auth-btn-alt{width:100%;padding:12px;background:transparent;color:var(--cream);border:1px solid var(--border);border-radius:8px;font:600 12px 'Inter',sans-serif;margin-bottom:8px;cursor:pointer;transition:background .15s}
.auth-btn-alt:hover{background:var(--bg3);border-color:rgba(201,168,76,.15)}
.auth-error{background:rgba(212,96,78,.1);color:var(--red);padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:10px;display:none;text-align:left}
.auth-error.show{display:block}
.auth-link{color:var(--gold);font-size:12px;cursor:pointer;margin-top:6px;display:inline-block;letter-spacing:.2px}
.auth-divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--muted2);font-size:10px;text-transform:uppercase;letter-spacing:2px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* ===== TEE TIME CARDS ===== */
.tee-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:8px;position:relative;transition:border-color .15s}
.tee-card:hover{border-color:rgba(201,168,76,.12)}
.tee-card.official{border-color:rgba(201,168,76,.25)}
.tee-official-tag{position:absolute;top:12px;right:12px;font-size:8px;font-weight:700;color:var(--gold);background:rgba(201,168,76,.1);padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}
.tee-course{font-size:15px;font-weight:700;color:var(--cream);margin-bottom:2px}
.tee-datetime{font-size:12px;color:var(--gold);font-weight:600;margin-bottom:4px}
.tee-message{font-size:11px;color:var(--muted);margin-bottom:10px;font-style:italic;line-height:1.4}
.tee-host{font-size:10px;color:var(--muted2);margin-bottom:10px}
.tee-spots{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tee-spot{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;overflow:hidden}
.tee-spot.filled{border-style:solid;border-color:#2a6a3a}
.tee-spot.filled img{width:100%;height:100%;object-fit:cover}
.tee-spot.open{color:var(--muted2);font-size:14px}
.tee-rsvp-row{display:flex;gap:6px}
.tee-rsvp-btn{flex:1;padding:10px;border-radius:6px;font:700 10px 'Inter',sans-serif;border:none;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:transform .1s}
.tee-rsvp-btn:active{transform:scale(.95)}
.tee-rsvp-btn.accept{background:#1a3a25;color:#4ec97a}
.tee-rsvp-btn.maybe{background:var(--bg3);color:var(--gold);border:1px solid var(--border)}
.tee-rsvp-btn.decline{background:rgba(212,96,78,.08);color:var(--red)}
.tee-rsvp-btn.selected{outline:2px solid var(--gold);outline-offset:2px}
.tee-status{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;display:inline-block}
.tee-status.open{color:#4ec97a;background:rgba(78,201,122,.08)}
.tee-status.full{color:var(--gold);background:rgba(201,168,76,.1)}

/* ===== CALENDAR ===== */
.cal-month-header{display:flex;justify-content:space-between;align-items:center;padding:16px}
.cal-month-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--cream)}
.cal-nav-btn{background:none;border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:50%;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}
.cal-nav-btn:hover{background:var(--bg3)}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);padding:0 8px;margin-bottom:4px}
.cal-weekday{text-align:center;font-size:9px;font-weight:600;color:var(--muted2);text-transform:uppercase;padding:4px 0;letter-spacing:.5px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 8px;margin-bottom:8px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;font-size:12px;color:var(--muted);position:relative;cursor:pointer;transition:background .15s;max-height:44px}
.cal-day:active{background:var(--bg3)}
.cal-day.today{background:var(--bg3);color:var(--gold);font-weight:700}
.cal-day.has-event::after,.cal-day.has-tee::after,.cal-day.has-trip::after{content:'';position:absolute;bottom:3px;border-radius:50%}
.cal-day.has-event::after{width:4px;height:4px;background:#6a8ac9}
.cal-day.has-tee::after{width:4px;height:4px;background:#4ec97a}
.cal-day.has-trip::after{width:10px;height:3px;border-radius:2px;background:var(--gold)}
.cal-day.empty{color:var(--bg4);pointer-events:none}
.cal-day.selected{background:var(--bg4);color:var(--gold);font-weight:700}
.cal-event-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:6px;margin-bottom:6px}
.cal-event-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cal-event-dot.tee{background:#4ec97a}
.cal-event-dot.trip{background:var(--gold)}
.cal-event-dot.social{background:#6a8ac9}
.cal-event-title{font-size:12px;font-weight:600;color:var(--cream)}
.cal-event-time{font-size:10px;color:var(--muted)}

/* ===== DIRECT MESSAGES ===== */
.dm-list-item{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
.dm-list-item:hover,.dm-list-item:active{background:var(--bg3)}
.dm-thread{display:flex;flex-direction:column;height:calc(100vh - 120px);height:calc(100dvh - 120px)}
.dm-messages{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px}
.dm-bubble-row{display:flex;margin-bottom:8px}
.dm-bubble-row.mine{justify-content:flex-end}
.dm-bubble-row.theirs{justify-content:flex-start}
.dm-bubble{max-width:75%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.4}
.dm-bubble-row.mine .dm-bubble{background:var(--gold);color:var(--bg);border-bottom-right-radius:4px}
.dm-bubble-row.theirs .dm-bubble{background:var(--bg3);color:var(--cream);border-bottom-left-radius:4px}
.dm-bubble .dm-bubble-time{font-size:9px;margin-top:3px;opacity:.5}
.dm-input-area{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);background:var(--bg)}
.dm-input-area input{flex:1;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;color:var(--cream);font-size:13px;outline:none;font-family:'Inter',sans-serif}
.dm-input-area input:focus{border-color:var(--gold)}
.dm-input-area button{padding:10px 16px;background:var(--gold);color:var(--bg);border:none;border-radius:20px;font:700 12px 'Inter',sans-serif;cursor:pointer}

/* ===== INVITE CODE ===== */
.invite-code{background:var(--bg3);border:2px dashed rgba(201,168,76,.25);border-radius:var(--radius);padding:16px;text-align:center;margin:12px 0}
.invite-code .code{font-size:20px;font-weight:800;color:var(--gold);letter-spacing:3px;font-family:'SF Mono',monospace;margin-bottom:4px}
.invite-code .hint{font-size:10px;color:var(--muted)}

/* ===== CHAT FEED ===== */
.chat-msg{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.chat-msg:last-child{border:none}
.chat-msg .c-av{width:30px;height:30px;border-radius:50%;background:var(--bg3);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px}
.chat-msg .c-av img{width:100%;height:100%;object-fit:cover}
.chat-author{font-size:11px;font-weight:700;color:var(--gold)}
.chat-text{font-size:12px;color:var(--cream);margin-top:2px;line-height:1.4}
.chat-time{font-size:9px;color:var(--muted2);margin-top:2px}
.chat-input-row{display:flex;gap:8px;padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--bg);z-index:10}
.chat-input-row input{flex:1;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;color:var(--cream);font-size:13px;outline:none;font-family:'Inter',sans-serif}
.chat-input-row button{padding:10px 16px;background:var(--gold);color:var(--bg);border:none;border-radius:20px;font:700 12px 'Inter',sans-serif;cursor:pointer}

/* ===== TROPHY ROOM ===== */
.trophy-header{text-align:center;padding:24px 16px 16px;background:linear-gradient(180deg,#151929,var(--bg));border-bottom:1px solid var(--border)}
.trophy-level{font-family:'Playfair Display',serif;font-size:48px;font-weight:800;color:var(--gold)}
.trophy-title{font-size:14px;font-weight:700;color:var(--cream);margin-top:2px;letter-spacing:.5px}
.trophy-xp{font-size:11px;color:var(--muted);margin-top:4px}
.trophy-bar{height:6px;background:var(--bg3);border-radius:3px;margin:12px 40px 0;overflow:hidden}
.trophy-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold3));border-radius:3px;transition:width .6s ease}
.trophy-next{font-size:10px;color:var(--muted2);margin-top:6px}
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 16px}
.ach-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center;transition:border-color .15s}
.ach-card:hover{border-color:rgba(201,168,76,.15)}
.ach-card.locked{opacity:.35}
.ach-icon{display:flex;align-items:center;justify-content:center;margin-bottom:4px;color:var(--gold)}
.ach-name{font-size:11px;font-weight:700;color:var(--cream);letter-spacing:.2px}
.ach-desc{font-size:9px;color:var(--muted);margin-top:2px;line-height:1.3}
.ach-xp{font-size:9px;color:var(--gold);font-weight:600;margin-top:4px}
.ach-cat-head{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px;padding:14px 16px 6px}
.title-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:4px}
.title-row.locked{opacity:.3}
.title-row .t-level{font-size:10px;color:var(--muted);font-weight:600;min-width:40px}
.title-row .t-name{font-size:12px;font-weight:600;color:var(--cream);flex:1}
.title-row .t-status{font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px}

/* ===== LOADING ===== */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;gap:8px;color:var(--muted);font-size:12px}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}

/* ===== SKELETON LOADING ===== */
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-line{height:12px;margin-bottom:8px;border-radius:4px}
.skel-line.short{width:60%}
.skel-line.medium{width:80%}
.skel-circle{width:40px;height:40px;border-radius:50%}
.skel-card{padding:16px;margin-bottom:8px}

/* ===== SCORE POP ANIMATION ===== */
@keyframes scorePop{0%{transform:scale(1)}30%{transform:scale(1.15)}100%{transform:scale(1)}}
.score-pop{animation:scorePop .2s ease}

/* ===== ROUND IN PROGRESS BANNER ===== */
.rip-banner{position:sticky;top:0;z-index:60;background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.06));border-bottom:1px solid rgba(201,168,76,.2);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.rip-banner:active{background:rgba(201,168,76,.15)}
.rip-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse-dot 2s infinite;flex-shrink:0}

/* ===== CONNECTION STATUS BAR ===== */
.conn-bar{display:flex;align-items:center;gap:6px;padding:6px 16px;font-size:9px;letter-spacing:.5px;text-transform:uppercase;font-weight:600;transition:all .3s;pointer-events:none}
.conn-bar.live{color:rgba(78,201,122,.6)}
.conn-bar.syncing{color:var(--gold)}
.conn-bar.offline{color:var(--red);background:rgba(212,96,78,.06)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== NOTIFICATION PANEL ===== */
.sh .back{font-size:11px;min-height:36px;padding:6px 14px;white-space:nowrap}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
.notif-panel{position:fixed;top:0;right:0;width:min(320px,90vw);height:100vh;height:100dvh;background:var(--bg);border-left:1px solid var(--border);z-index:200;transform:translateX(100%);transition:transform .2s ease;overflow-y:auto}
.notif-panel.open{transform:translateX(0)}
.notif-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;opacity:0;pointer-events:none;transition:opacity .2s}
.notif-overlay.open{opacity:1;pointer-events:auto}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.notif-item:active{background:var(--bg2)}
.notif-item.unread{background:rgba(201,168,76,.04);border-left:3px solid var(--gold)}
.notif-time{font-size:9px;color:var(--muted2);margin-top:4px}

/* ===== HOME PAGE CONTENT WRAPPER ===== */
.home-wrap{padding:0 16px}
.home-wrap .card{margin-left:0;margin-right:0}
.home-wrap .section{padding-left:0;padding-right:0}
.home-wrap .sec-head{padding-left:0;padding-right:0}
.home-wrap .qlinks{padding-left:0;padding-right:0}

/* ===== UTILITY CLASSES ===== */
.flex{display:flex}.flex-col{display:flex;flex-direction:column}.flex-between{display:flex;justify-content:space-between;align-items:center}.flex-center{display:flex;align-items:center;justify-content:center}
.gap-4{gap:4px}.gap-6{gap:6px}.gap-8{gap:8px}.gap-12{gap:12px}
.p-16{padding:0 16px}.py-8{padding:8px 0}.py-12{padding:12px 0}
.text-xs{font-size:9px}.text-sm{font-size:10px}.text-md{font-size:12px}.text-lg{font-size:14px}
.text-muted{color:var(--muted)}.text-muted2{color:var(--muted2)}.text-gold{color:var(--gold)}.text-cream{color:var(--cream)}
.font-bold{font-weight:600}.font-heavy{font-weight:700}
.uppercase{text-transform:uppercase;letter-spacing:1px}

// ========== SECURITY UTILITIES ==========
function validatePassword(pw) {
  if (!pw || pw.length < 8) return "Password must be at least 8 characters";
  if (!/[A-Z]/.test(pw)) return "Password needs at least 1 uppercase letter";
  if (!/[0-9]/.test(pw)) return "Password needs at least 1 number";
  if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pw)) return "Password needs at least 1 symbol (!@#$%^&*)";
  return null;
}
var loginAttempts = 0, loginLockUntil = 0;
function checkLoginRateLimit() {
  if (Date.now() < loginLockUntil) return "Too many attempts. Try again in " + Math.ceil((loginLockUntil - Date.now()) / 1000) + "s.";
  return null;
}
function recordLoginFailure() { loginAttempts++; if (loginAttempts >= 5) { loginLockUntil = Date.now() + 300000; loginAttempts = 0; } }

  if (!db) return Promise.resolve(true);

function showRegister() { 
  document.getElementById("loginForm").classList.add("hidden"); 
  document.getElementById("registerForm").classList.remove("hidden"); 
  document.getElementById("forgotForm").classList.add("hidden"); 
  clearErrors();
  
  // Show claimable profiles (local PB players that haven't been claimed by a Firebase account)
  var players = PB.getPlayers();
  if (players.length > 0) {
    var claimDiv = document.getElementById("claimProfiles");
    var claimSection = document.getElementById("claimSection");
    
    // Check which profiles are already claimed in Firestore
    if (db) {
      db.collection("members").get().then(function(snap) {
        var claimedLocalIds = [];
        snap.forEach(function(doc) {
          var d = doc.data();
          if (d.claimedFrom) claimedLocalIds.push(d.claimedFrom);
        });
        
        var unclaimed = players.filter(function(p) { return claimedLocalIds.indexOf(p.id) === -1; });
        if (unclaimed.length > 0) {
          var ch = '';
          unclaimed.forEach(function(p) {
            ch += '<div onclick="selectClaimProfile(\'' + p.id + '\')" id="claim-' + p.id + '" style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border:2px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .15s">';

var selectedClaimId = null;
function selectClaimProfile(pid) {
  selectedClaimId = pid;
  document.getElementById("regClaimId").value = pid || "";
  // Update visual selection
  var items = document.querySelectorAll("#claimProfiles > div");
  items.forEach(function(el) { el.style.borderColor = "var(--border)"; });
  if (pid) {
    var selected = document.getElementById("claim-" + pid);
    if (selected) selected.style.borderColor = "var(--gold)";
    // Auto-fill username from claimed profile
    var p = PB.getPlayer(pid);
    if (p && p.username) document.getElementById("regUsername").value = p.username;
    else if (p && p.name) document.getElementById("regUsername").value = p.name.replace(/\s+/g, "");
  }
}

function doLogin() {
  var email = document.getElementById("loginEmail").value.trim();
  var pw = document.getElementById("loginPassword").value;
  if (!email || !pw) { showError("loginError", "Enter email and password"); return; }
  var rl = checkLoginRateLimit(); if (rl) { showError("loginError", rl); return; }
  var btn = document.querySelector("#loginForm .auth-btn"); lockButton(btn);
  auth.signInWithEmailAndPassword(email, pw).then(function(cred) {
    pbLog("[Auth] Logged in:", cred.user.email); resetLoginAttempts();
  }).catch(function(e) {
    recordLoginFailure();
    var msg = "Login failed";
    if (e.code === "auth/user-not-found") msg = "No account with that email";
    else if (e.code === "auth/wrong-password" || e.code === "auth/invalid-credential") msg = "Invalid email or password";
    else if (e.code === "auth/too-many-requests") msg = "Too many attempts. Try again later.";
    showError("loginError", msg); unlockButton(btn);
  });
}

function doRegister() {
  var invite = document.getElementById("regInvite").value.trim().toUpperCase();
  var username = document.getElementById("regUsername").value.trim();
  var email = document.getElementById("regEmail").value.trim();
  var pw = document.getElementById("regPassword").value;
  if (!invite) { showError("regError", "Invite code required"); return; }
  if (!username || username.length < 3) { showError("regError", "Username must be 3+ characters"); return; }
  if (username.length > 20) { showError("regError", "Username max 20 characters"); return; }
  if (!/^[a-zA-Z0-9_]+$/.test(username)) { showError("regError", "Username: letters, numbers, underscore only"); return; }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError("regError", "Enter a valid email"); return; }
  var pwErr = validatePassword(pw); if (pwErr) { showError("regError", pwErr); return; }

  var inviteRef = db.collection("invites").doc(invite);
  var isFoundingCode = (invite === "FOUNDING-FOUR");
  var validatePromise = isFoundingCode
    ? checkFoundingCodeAvailability().then(function(ok) { return ok ? { valid:true, founding:true } : { valid:false, reason:"FOUNDING-FOUR fully used (4/4)" }; })
    : inviteRef.get().then(function(doc) {
        if (!doc.exists) return { valid:false, reason:"Invite code not found" };
        var d = doc.data();
        if (d.status === "used") return { valid:false, reason:"Invite already used" };
        if (d.status === "revoked") return { valid:false, reason:"Invite revoked" };
        if (d.expiresAt) {
          var exp = d.expiresAt.toDate ? d.expiresAt.toDate() : new Date(d.expiresAt);
          if (new Date() > exp) return { valid:false, reason:"Invite code has expired. Ask for a new one." };
        }
        return { valid:true, createdBy:d.createdBy };
      });

  validatePromise.then(function(inv) {
    if (!inv.valid) { showError("regError", inv.reason); return Promise.reject("invalid"); }
    // Check username availability, but don't block if check fails
    var usernameCheck;
    try {
      usernameCheck = db.collection("members").where("username","==",username.toLowerCase()).get();
    } catch(e) {
      usernameCheck = Promise.resolve({empty:true});
    }
    return usernameCheck.then(function(snap) {
      if (snap && !snap.empty) { showError("regError", "Username already taken"); return Promise.reject("taken"); }
      return auth.createUserWithEmailAndPassword(email, pw);
    }).catch(function(e) {
      if (e === "taken") return Promise.reject("taken");
      if (e.code && e.code.indexOf("auth") !== -1) return Promise.reject(e);
      // Permission or other Firestore error on username check — skip it and proceed
      pbWarn("[Auth] Username check failed, proceeding:", e);
      return auth.createUserWithEmailAndPassword(email, pw);
    }).then(function(cred) {
      return cred.user.updateProfile({ displayName:username }).then(function() { return cred.user; });
    }).then(function(user) {
      // First founding member becomes Commissioner, rest are members
      var isFirstFounder = isFoundingCode;
      var rolePromise = isFoundingCode 
        ? db.collection("members").where("isFoundingFour","==",true).get().then(function(snap) { return snap.size === 0 ? "commissioner" : "member"; })
        : Promise.resolve("member");
      
      var claimId = document.getElementById("regClaimId").value;
      var claimedPlayer = claimId ? PB.getPlayer(claimId) : null;
      
      return rolePromise.then(function(assignedRole) {
        var profile;
        
        if (claimedPlayer) {
          // CLAIMING existing profile — merge all existing data with Firebase auth
          profile = JSON.parse(JSON.stringify(claimedPlayer));
          profile.id = user.uid;          // New Firebase UID
          profile.claimedFrom = claimId;  // Original local ID for tracking
          profile.email = email;
          profile.username = username.toLowerCase();
          profile.role = assignedRole;
          profile.maxInvites = assignedRole === "commissioner" ? 999 : 3;
          profile.invitesUsed = 0;
          profile.isFoundingFour = isFoundingCode;
          profile.createdAt = fsTimestamp();
          if (!profile.badges) profile.badges = [];
          if (isFoundingCode && profile.badges.indexOf("founder") === -1) profile.badges.push("founder");
          // Keep all existing data: name, nick, bio, range, clubs, bag, funnyFacts, 
          // photo, homeCourse, favoriteCourse, wins, trips, equippedTitle, etc.
          pbLog("[Auth] Claiming existing profile:", claimId, "→", user.uid);
        } else {
          // NEW profile — create from scratch
          profile = {
            id:user.uid, email:email, username:username.toLowerCase(), name:username,
            nick:"", bio:"", range:"", photo:null, emoji:"⛳", clubs:{}, facts:[],
            xp:0, level:1, badges:isFoundingCode ? ["founder"] : [], 
            role:assignedRole,
            invitedBy:inv.createdBy||"founding", invitesUsed:0, 
            maxInvites: assignedRole === "commissioner" ? 999 : 3,
            isFoundingFour:isFoundingCode, avgScore:null, bestRound:null, handicap:null,
            createdAt:fsTimestamp()
          };
        }
        
        return db.collection("members").doc(user.uid).set(profile).then(function() {
          if (!isFoundingCode) inviteRef.update({ usedBy:user.uid, status:"used", usedAt:fsTimestamp() });
          
          // If claiming, also migrate rounds to the new UID
          if (claimedPlayer && claimId) {
            var rounds = PB.getPlayerRounds(claimId);
            rounds.forEach(function(r) {
              var rd = JSON.parse(JSON.stringify(r));
              rd.originalPlayerId = rd.player || rd.playerId;
              rd.player = user.uid;
              rd.playerId = user.uid;
              if (rd.id) syncRound(rd);
            });
          }
          
          currentProfile = profile;
          
          // Post welcome to activity feed with a funny ribb
          var welcomeName = profile.name || profile.username || "Someone";
          var welcomeRibbs = [
            "🚨 " + welcomeName + " just joined the Parbaughs. Hide your trophies and lower your expectations.",
            "👀 " + welcomeName + " has entered the chat. The handicap leaderboard just got more interesting.",
            "🏌️ " + welcomeName + " is officially a Parbaugh. Their golf game? Remains to be seen.",
            "📢 Breaking: " + welcomeName + " joined the Parbaughs. The course rangers have been notified.",
            "🎉 Welcome " + welcomeName + "! We hope your golf game is better than your timing.",
            "⛳ " + welcomeName + " just signed up. Someone tell them we don't do mulligans here... okay fine, breakfast balls only.",
            "🔥 " + welcomeName + " has joined. The leaderboard shuffles nervously.",
            "🚀 " + welcomeName + " is now a Parbaugh. Their first round will either be legendary or legendary bad.",
            "👋 " + welcomeName + " walked in like they own the place. Prove it on the course.",
            "📋 " + welcomeName + " reporting for duty. The Commissioner has been alerted and the roasts are loading.",
            "🏆 " + welcomeName + " just joined and already thinks they can beat you. They probably can't. Probably.",
            "🤝 " + welcomeName + " is in. Someone get them a sleeve of balls — they'll need it.",
            "⚡ " + welcomeName + " just entered the Parbaughs universe. Their handicap says one thing, their confidence says another.",
            "🎯 " + welcomeName + " has joined. May their drives be long and their putts be short. We're not optimistic.",
            "🧢 " + welcomeName + " is officially a member. The dress code is vibes only and the only rule is don't be slower than Nick."
          ];
          var ribb = welcomeRibbs[Math.floor(Math.random() * welcomeRibbs.length)];
          db.collection("chat").add({
            id: genId(),
            text: ribb,
            authorId: "system",
            authorName: "The Caddy",
            createdAt: fsTimestamp(),
            type: "welcome"
          }).catch(function(){});
        });
      });
    });
  }).catch(function(e) {
    if (e === "invalid" || e === "taken") return;
    var msg = "Registration failed";
    if (e.code === "auth/email-already-in-use") msg = "Email already registered";
    else if (e.code === "auth/weak-password") msg = "Password too weak";
    else if (e.code === "auth/invalid-email") msg = "Invalid email format";
    else if (e.code === "auth/operation-not-allowed") msg = "Email/password accounts not enabled";
    else if (e.code === "auth/network-request-failed") msg = "Network error — check your connection";
    else if (e.message) msg = "Registration failed: " + e.message;
    console.error("[Auth] Registration error:", e);
    showError("regError", msg);
    // Unlock button
    var btn = document.querySelector("#registerForm .auth-btn");
    if (btn) { btn.disabled = false; btn.textContent = "Create Account"; btn.style.opacity = "1"; }
  });
}

  if (!currentUser || !db) { Router.toast("Not signed in"); return; }

  var uid = currentUser.uid;

  db.collection("members").doc(uid).delete()
    .then(function() {

      return db.collection("photos").where("uploadedBy","==",uid).get();

    .then(function(snap) {

      snap.forEach(function(doc) { batch.delete(doc.ref); });

      pbLog("[Account] Photos deleted");

        Router.toast("Error: " + e.message);
      }

// ========== SYNC STATUS ==========
var syncStatus = "connecting";
function setSyncStatus(s) {
  syncStatus = s;
  var txt = document.getElementById("syncStatusText");
  var dot = document.getElementById("connDot");
  if (txt) txt.textContent = s === "online" ? "Live" : s === "syncing" ? "Syncing..." : s === "offline" ? "Offline" : "Connecting...";
  if (dot) {
    dot.style.background = s === "online" ? "#4ade80" : s === "syncing" ? "var(--gold)" : s === "offline" ? "#e53935" : "var(--muted)";
    if (s === "syncing") dot.style.animation = "pulse-dot 1s infinite";
    else dot.style.animation = "none";
  }
}

function initSync() {
  if (!db) { setSyncStatus("offline"); return; }
  // Don't show syncing bar on load — go silent until confirmed
  db.collection("config").doc("app").get().then(function(doc) {
    if (doc.exists) { setSyncStatus("online"); }
    else { seedFirestore(); }
  }).catch(function() { setSyncStatus("offline"); });
}

function seedFirestore() {
  if (!db) return;
  var batch = db.batch();
  batch.set(db.collection("config").doc("app"), { version:"5.0", foundingFour:["zach","kayvan","kiyan","nick"], createdAt:fsTimestamp() });
  PB.getPlayers().forEach(function(p) {
    var doc = JSON.parse(JSON.stringify(p)); doc.createdAt = fsTimestamp();
    if (doc.photo && doc.photo.length > 500) { doc.photoLocal = true; delete doc.photo; }
    batch.set(db.collection("members").doc(p.id), doc);
  });
  PB.getCourses().forEach(function(c) { batch.set(db.collection("courses").doc(c.id), Object.assign({}, c, { createdAt:fsTimestamp() })); });
  PB.getTrips().forEach(function(t) {
    var doc = JSON.parse(JSON.stringify(t)); doc.createdAt = fsTimestamp();
    batch.set(db.collection("trips").doc(t.id), doc);
  });
  batch.commit().then(function() { pbLog("[Sync] Seeded"); setSyncStatus("online"); }).catch(function() { setSyncStatus("offline"); });
}

// Dual-write helpers — text data only, photos go to photos collection
function syncMember(m) { if (!db||syncStatus==="offline") return; var d=JSON.parse(JSON.stringify(m)); d.updatedAt=fsTimestamp(); delete d.photo; db.collection("members").doc(m.id).set(d,{merge:true}).catch(function(){}); }
function syncRound(r) { if (!db||syncStatus==="offline") return; var d=JSON.parse(JSON.stringify(r)); d.createdAt=fsTimestamp(); db.collection("rounds").doc(r.id||genId()).set(d,{merge:true}).catch(function(){}); }
function syncCourse(c) { if (!db||syncStatus==="offline") return; var d=JSON.parse(JSON.stringify(c)); d.updatedAt=fsTimestamp(); delete d.photo; db.collection("courses").doc(c.id).set(d,{merge:true}).catch(function(){}); }
function syncTrip(t) { if (!db||syncStatus==="offline") return; var d=JSON.parse(JSON.stringify(t)); d.updatedAt=fsTimestamp(); if(d.photos){delete d.photos;} db.collection("trips").doc(t.id).set(d,{merge:true}).catch(function(){}); }

// Trip score sync — pushes individual scores to Firestore for live viewing
function syncTripScore(tripId, courseKey, playerId, scores) {
  if (!db || syncStatus === "offline") return;
  var docId = tripId + "_" + courseKey + "_" + playerId;
  db.collection("tripscores").doc(docId).set({
    tripId: tripId,
    courseKey: courseKey,
    playerId: playerId,
    scores: scores,
    updatedAt: fsTimestamp(),
    updatedBy: currentUser ? currentUser.uid : "local"
  }, { merge: true }).catch(function(e) { pbWarn("[Sync] Trip score failed:", e.message); });
}

// Listen for live trip score updates from other devices
var tripScoreListener = null;
function startTripScoreListener(tripId) {
  if (!db) return;
  if (tripScoreListener) tripScoreListener();
  tripScoreListener = db.collection("tripscores").where("tripId","==",tripId).onSnapshot(function(snap) {
    var changed = false;
    snap.forEach(function(doc) {
      var d = doc.data();
      // Update local PB state with remote scores
      if (!PB.getTrip(d.tripId)) return;
      var localScores = PB.getScores(d.tripId, d.courseKey, d.playerId);
      var remoteScores = d.scores || [];
      // Merge — take remote if local is empty for that hole
      for (var i = 0; i < 18; i++) {
        if (remoteScores[i] && remoteScores[i] !== "" && (!localScores[i] || localScores[i] === "")) {
          PB.setScoreSilent(d.tripId, d.courseKey, d.playerId, i, remoteScores[i]);
          changed = true;
        } else if (remoteScores[i] && remoteScores[i] !== localScores[i] && d.updatedBy !== (currentUser ? currentUser.uid : "local")) {
          // Remote is different and from another user — take it
          PB.setScoreSilent(d.tripId, d.courseKey, d.playerId, i, remoteScores[i]);
          changed = true;
        }
      }
    });
    if (changed && Router.getPage() === "scorecard") {
      Router.go("scorecard", Router.getParams());
    }
  });
}

function finishTripRound(tripId, courseKey) {
  var trip = PB.getTrip(tripId);
  if (!trip) return;
  var course = trip.courses.find(function(c) { return c.key === courseKey; });
  if (!course) return;
  
  if (!confirm("End scoring for " + course.n + " and start attestation?")) return;
  
  // Create attestation record in Firestore
  if (!db) { Router.toast("Firebase required"); return; }
  
  var tripPlayers = trip.members.map(function(id) { return PB.getPlayer(id); }).filter(Boolean);
  var attestations = {};
  tripPlayers.forEach(function(p) { attestations[p.id] = { name: p.name, attested: false, attestedAt: null }; });
  
  // Build standings for the record
  var standings = [];
  if (!course.s) {
    standings = tripPlayers.map(function(p) {
      var pts = PB.getTripStableford(tripId, courseKey, p.id);
      var total = PB.getTripTotal(tripId, courseKey, p.id, 0, 18);
      return { id: p.id, name: p.name, score: total, pts: pts };
    }).sort(function(a, b) { return b.pts - a.pts; });
  } else {
    var teamTotal = PB.getTripTotal(tripId, courseKey, "team", 0, 18);
    standings = [{ id: "team", name: "Team", score: teamTotal, pts: 0 }];
  }
  
  var docId = tripId + "_" + courseKey;
  db.collection("attestations").doc(docId).set({
    tripId: tripId,
    courseKey: courseKey,
    courseName: course.n,
    status: "pending", // pending, complete, overridden
    standings: standings,
    attestations: attestations,
    createdBy: currentUser ? currentUser.uid : "local",
    createdAt: fsTimestamp()
  }).then(function() {
    // Announce to feed
    db.collection("chat").add({
      id: genId(),
      text: "📋 " + course.n + " scoring is complete. All players must attest their scores.",
      authorId: "system",
      authorName: "Parbaughs",
      createdAt: fsTimestamp()
    });
    Router.toast("Attestation started! Players must confirm their scores.");
    Router.go("scorecard", { tripId: tripId });
  });
}

function attestMyScore(tripId, courseKey) {
  if (!db || !currentUser) { Router.toast("Sign in required"); return; }
  var docId = tripId + "_" + courseKey;
  
  if (!confirm("I attest that the scores on this scorecard are accurate and complete.")) return;
  
  var field = "attestations." + currentUser.uid;
  var update = {};
  update[field + ".attested"] = true;
  update[field + ".attestedAt"] = fsTimestamp();
  
  db.collection("attestations").doc(docId).update(update).then(function() {
    Router.toast("Score attested ✓");
    // Check if all players have attested
    return db.collection("attestations").doc(docId).get();
  }).then(function(doc) {
    if (!doc.exists) return;
    var data = doc.data();
    var allAttested = Object.keys(data.attestations).every(function(pid) { return data.attestations[pid].attested; });
    
    if (allAttested) {
      // All players attested — finalize and post results
      finalizeAttestedRound(docId, data);
    }
  }).catch(function(e) { Router.toast("Failed: " + e.message); });
}

function overrideAttestation(tripId, courseKey) {
  if (!currentProfile || currentProfile.role !== "commissioner") return;
  if (!confirm("Override attestation and post results now? Some players haven't attested yet.")) return;
  
  var docId = tripId + "_" + courseKey;
  db.collection("attestations").doc(docId).get().then(function(doc) {
    if (!doc.exists) return;
    finalizeAttestedRound(docId, doc.data(), true);
  });
}

function finalizeAttestedRound(docId, data, overridden) {
  // Mark as complete
  db.collection("attestations").doc(docId).update({
    status: overridden ? "overridden" : "complete",
    completedAt: fsTimestamp()
  });
  
  // Post results to feed
  var results = "";
  if (data.standings && data.standings.length) {
    if (data.standings[0].id === "team") {
      results = "\nTeam score: " + data.standings[0].score;
    } else {
      results = "\n";
      data.standings.forEach(function(s, i) {
        var medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : (i+1) + ".";
        if (s.score > 0) results += medal + " " + s.name + " — " + s.score + (s.pts ? " (" + s.pts + " pts)" : "") + "\n";
      });
    }
  }
  
  var attestNote = overridden ? " (Commissioner override)" : " (All players attested ✓)";
  announceEventEnd(data.tripId, data.courseName, results + attestNote);
  Router.toast("Results posted! " + (overridden ? "Commissioner override." : "All players attested."));
  Router.go("scorecard", { tripId: data.tripId });
}

function renderAttestationStatus(tripId, courseKey) {
  var docId = tripId + "_" + courseKey;
  var h = '<div id="attestStatus_' + courseKey + '"><div class="loading"><div class="spinner"></div>Checking attestation...</div></div>';
  
  // Load attestation status asynchronously
  if (db) {
    setTimeout(function() {
      db.collection("attestations").doc(docId).get().then(function(doc) {
        var el = document.getElementById("attestStatus_" + courseKey);
        if (!el) return;
        
        if (!doc.exists) {
          el.innerHTML = '<div style="font-size:10px;color:var(--muted);text-align:center;padding:8px">Round has not been finalized yet</div>';
          return;
        }
        
        var data = doc.data();
        var ah = '<div class="card" style="margin:0 16px"><div class="card-body">';
        ah += '<div style="font-size:12px;font-weight:700;color:var(--gold);margin-bottom:8px">Score Attestation</div>';
        
        if (data.status === "complete") {
          ah += '<div style="font-size:11px;color:var(--birdie);margin-bottom:8px">✓ All players attested — scores are official</div>';
        } else if (data.status === "overridden") {
          ah += '<div style="font-size:11px;color:var(--gold);margin-bottom:8px">✓ Scores finalized (Commissioner override)</div>';
        } else {
          ah += '<div style="font-size:11px;color:var(--muted);margin-bottom:8px">⏳ Waiting for all players to attest</div>';
        }
        
        // Show each player's attestation status
        var attestations = data.attestations || {};
        var allAttested = true;
        Object.keys(attestations).forEach(function(pid) {
          var a = attestations[pid];
          var status = a.attested ? '<span style="color:var(--birdie)">✓ Attested</span>' : '<span style="color:var(--red)">⏳ Pending</span>';
          ah += '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)">';
          ah += '<span style="font-size:12px">' + escHtml(a.name) + '</span>';
          ah += '<span style="font-size:10px;font-weight:600">' + status + '</span></div>';
          if (!a.attested) allAttested = false;
        });
        
        // Action buttons
        if (data.status === "pending") {
          var myAttestation = attestations[currentUser ? currentUser.uid : ""];
          // Also check by claimedFrom
          if (!myAttestation && currentProfile && currentProfile.claimedFrom) {
            myAttestation = attestations[currentProfile.claimedFrom];
          }
          
          if (myAttestation && !myAttestation.attested) {
            ah += '<div style="margin-top:10px"><button class="btn full green" onclick="attestMyScore(\'' + tripId + '\',\'' + courseKey + '\')">I Attest These Scores Are Accurate</button></div>';
          } else if (myAttestation && myAttestation.attested) {
            ah += '<div style="margin-top:8px;font-size:10px;color:var(--birdie);text-align:center">✓ You have attested</div>';
          }
          
          // Commissioner override
          if (currentProfile && currentProfile.role === "commissioner" && !allAttested) {
            ah += '<div style="margin-top:8px"><button class="btn-sm outline" style="width:100%;font-size:9px;color:var(--muted)" onclick="overrideAttestation(\'' + tripId + '\',\'' + courseKey + '\')">Commissioner: Override & Finalize</button></div>';
          }
        }
        
        ah += '</div></div>';
        el.innerHTML = ah;
      }).catch(function() {
        var el = document.getElementById("attestStatus_" + courseKey);
        if (el) el.innerHTML = '';
      });
    }, 100);
  }
  
  return h;
}

// ========== FIRESTORE PHOTO SYSTEM ==========
// Photos stored in a dedicated 'photos' collection: { type, refId, data, uploadedBy, createdAt }
// Types: "member", "course", "trip"

var photoCache = {}; // Cache loaded photos in memory: { "member:zach": "data:image/jpeg;..." }

function savePhoto(type, refId, dataUrl, caption) {
  // Save locally
  var cacheKey = type + ":" + refId;
  photoCache[cacheKey] = dataUrl;
  
  // Save to Firestore
  if (!db || syncStatus === "offline") return Promise.resolve(false);
  var doc = {
    type: type,
    refId: refId,
    data: dataUrl,
    caption: caption || "",
    uploadedBy: currentUser ? currentUser.uid : "local",
    createdAt: fsTimestamp()
  };
  var docId = type + "_" + refId + (type === "trip" ? "_" + genId() : "");
  return db.collection("photos").doc(docId).set(doc)
    .then(function() { pbLog("[Photo] Saved:", cacheKey); return true; })
    .catch(function(e) { pbWarn("[Photo] Save failed:", e.message); return false; });
}

function loadPhoto(type, refId) {
  var cacheKey = type + ":" + refId;
  if (photoCache[cacheKey]) return Promise.resolve(photoCache[cacheKey]);
  if (!db) return Promise.resolve(null);
  var docId = type + "_" + refId;
  return db.collection("photos").doc(docId).get()
    .then(function(doc) {
      if (doc.exists && doc.data().data) {
        photoCache[cacheKey] = doc.data().data;
        return doc.data().data;
      }
      return null;
    })
    .catch(function() { return null; });
}

function loadTripPhotos(tripId) {
  if (!db) return Promise.resolve([]);
  return db.collection("photos").where("type","==","trip").where("refId","==",tripId).get()
    .then(function(snap) {
      var photos = [];
      snap.forEach(function(doc) { var d = doc.data(); photos.push({ src: d.data, caption: d.caption, uploadedBy: d.uploadedBy, id: doc.id, createdAt: d.createdAt }); });
      photos.sort(function(a,b) { return (a.createdAt||0) - (b.createdAt||0); });
      return photos;
    })
    .catch(function() { return []; });
}

// Preload member photos for avatar display
function preloadMemberPhotos() {
  if (!db) return;
  db.collection("photos").where("type","==","member").get()
    .then(function(snap) {
      snap.forEach(function(doc) {
        var d = doc.data();
        photoCache["member:" + d.refId] = d.data;
      });
      pbLog("[Photo] Preloaded", snap.size, "member photos");
      
      // Also cross-reference: if a member's Firebase UID has a photo but their claimedFrom doesn't (or vice versa), cache both ways
      db.collection("members").get().then(function(mSnap) {
        mSnap.forEach(function(mDoc) {
          var m = mDoc.data();
          // Cache member profile for achievement/XP lookups
          fbMemberCache[m.id] = m;
          if (m.claimedFrom) {
            fbMemberCache[m.claimedFrom] = m;
            playerIdMap[m.id] = m.claimedFrom; // Firebase UID → local ID
          }
          
          var fbPhoto = photoCache["member:" + m.id];
          var localPhoto = m.claimedFrom ? photoCache["member:" + m.claimedFrom] : null;
          if (fbPhoto && m.claimedFrom && !localPhoto) {
            photoCache["member:" + m.claimedFrom] = fbPhoto;
          }
          if (localPhoto && !fbPhoto) {
            photoCache["member:" + m.id] = localPhoto;
          }
          if (m.photoUrl && !photoCache["member:" + m.id]) {
            photoCache["member:" + m.id] = m.photoUrl;
          }
        });
        pbLog("[Members] Cached", Object.keys(fbMemberCache).length, "member profiles");
        if (Router.getPage() === "home" || Router.getPage() === "members") Router.go(Router.getPage());
      });
    });
}

// Compress photo to target size
function compressPhoto(dataUrl, maxKB, maxDim, callback) {
  maxKB = maxKB || PHOTO_MAX_KB;
  maxDim = maxDim || 400;
  var img = new Image();
  img.onload = function() {
    var canvas = document.createElement("canvas");
    var w = img.width, h = img.height;
    if (w > maxDim || h > maxDim) {
      var ratio = Math.min(maxDim / w, maxDim / h);
      w = Math.round(w * ratio);
      h = Math.round(h * ratio);
    }
    canvas.width = w;
    canvas.height = h;
    var ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0, w, h);
    
    // Try progressively lower quality until under maxKB
    var quality = 0.7;
    var result = canvas.toDataURL("image/jpeg", quality);
    while (result.length > maxKB * 1370 && quality > 0.1) { // 1370 ≈ bytes per KB in base64
      quality -= 0.1;
      result = canvas.toDataURL("image/jpeg", quality);
    }
    pbLog("[Photo] Compressed to", Math.round(result.length / 1370), "KB at quality", quality.toFixed(1));
    callback(result);
  };
  img.src = dataUrl;
}

      if (localId) {
        rounds = state.rounds.filter(function(r) { return r.player === localId; });
      }
      // Fallback: scan local players
      if (!rounds.length) {
        var localPlayer = state.players.find(function(p) { return p.claimedFrom === pid; });
        if (localPlayer) rounds = state.rounds.filter(function(r) { return r.player === localPlayer.id; });
      }
      // Fallback: currentProfile
      if (!rounds.length && typeof currentProfile !== "undefined" && currentProfile && currentProfile.id === pid && currentProfile.claimedFrom) {
        rounds = state.rounds.filter(function(r) { return r.player === currentProfile.claimedFrom; });

  /* ---------- CALCULATIONS ---------- */
  function calcStableford(score, par) {
    if (!score || score <= 0) return 0;
    var d = score - par;
    return d <= -2 ? 6 : d === -1 ? 4 : d === 0 ? 2 : d === 1 ? 1 : 0;
  }

  function calcHandicap(rounds) {
    // GHIN / World Handicap System formula
    // 1. Calculate Score Differential for each round: (113 / Slope) × (Score - Rating)
    // 2. Use most recent 20 rounds
    // 3. Select best differentials based on count:
    //    3 rounds=lowest 1, 4=lowest 1, 5=lowest 1, 6=lowest 2, 
    //    7-8=lowest 2, 9-10=lowest 3, 11-12=lowest 4, 13-14=lowest 5,
    //    15-16=lowest 6, 17-18=lowest 7, 19=lowest 8, 20=lowest 8
    // 4. Average the selected differentials
    // 5. Multiply by 0.96 (96% adjustment per WHS)
    // 6. Round to one decimal
    if (!rounds || rounds.length < 3) return null;
    
    // Sort by date descending, take most recent 20
    var recent = rounds.slice().sort(function(a,b) { return new Date(b.date) - new Date(a.date); }).slice(0, 20);
    
    // Calculate score differentials
    var diffs = recent.map(function(r) {
      var rating = parseFloat(r.rating) || 72;
      var slope = parseInt(r.slope) || 113;
      return (113 / slope) * (r.score - rating);
    });
    
    // Sort differentials lowest first
    var sorted = diffs.slice().sort(function(a, b) { return a - b; });
    
    // GHIN selection table
    var n = sorted.length;
    var use;
    if (n <= 5) use = 1;
    else if (n <= 8) use = 2;
    else if (n <= 10) use = 3;
    else if (n <= 12) use = 4;
    else if (n <= 14) use = 5;
    else if (n <= 16) use = 6;
    else if (n <= 18) use = 7;
    else use = 8;
    
    var best = sorted.slice(0, use);
    var avg = best.reduce(function(a, b) { return a + b; }, 0) / best.length;
    
    // Apply 0.96 multiplier (WHS standard)
    var handicap = avg * 0.96;
    
    // Cap at 54.0 (max GHIN handicap)
    handicap = Math.min(54.0, handicap);
    
    return Math.round(handicap * 10) / 10;
  }

  function getTripStableford(tripId, courseKey, playerId) {
    var trip = getTrip(tripId);
    if (!trip) return 0;
    var course = trip.courses.find(function(c) { return c.key === courseKey; });
    if (!course) return 0;
    var scores = getScores(tripId, courseKey, playerId);
    var total = 0;
    scores.forEach(function(v, i) {
      if (v && v > 0) total += calcStableford(parseInt(v), course.p[i]);
    });
    return Math.round(total * (course.m || 1) * 10) / 10;
  }

  function getTripTotal(tripId, courseKey, playerId, from, to) {
    var scores = getScores(tripId, courseKey, playerId);
    return scores.slice(from || 0, to || 18).reduce(function(a, v) { return a + (parseInt(v) || 0); }, 0);
  }

  function getMiniPoints(tripId, pid) {
    var trip = getTrip(tripId);

  function getBonusPoints(tripId, pid) {

    return trip.bonusAwards.reduce(function(t, b) { return t + (state.bonusWinners[b.i] === pid ? b.p : 0); }, 0);
  }

  function getTripPoints(tripId, pid) {
    var trip = getTrip(tripId);
    if (!trip) return 0;
    var pts = getMiniPoints(tripId, pid) + getBonusPoints(tripId, pid);
    trip.courses.forEach(function(c) {

    return Math.round(pts * 10) / 10;
