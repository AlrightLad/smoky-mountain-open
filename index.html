<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Parbaughs">
<meta name="theme-color" content="#0c0e0c">
<meta property="og:title" content="The Parbaughs">
<meta property="og:description" content="Golf league platform · Est. 2026 · York, PA">
<meta property="og:image" content="social-card.jpg">
<meta property="og:type" content="website">
<title>The Parbaughs</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;min-height:100dvh;max-width:520px;margin:0 auto;overflow-x:hidden;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
input,select,textarea{font-family:inherit}
select{-webkit-appearance:none;appearance:none}

:root{--bg:#0c0e0c;--bg2:#121514;--bg3:#191d1a;--bg4:#1f2521;--gold:#c9a84c;--gold2:#a68b3a;--gold3:#dfc06a;--green:#1a3d24;--green2:#2a5a38;--cream:#eae8e0;--muted:#7a7d75;--muted2:#52564e;--red:#d4604e;--birdie:#4ec97a;--card:#131614;--border:#222822;--radius:6px}

.hidden{display:none!important}

/* NAV */
.nav{display:flex;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;background:rgba(12,14,12,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.nav button{flex:1;padding:14px 0;background:0 0;color:var(--muted2);border:none;border-bottom:2px solid transparent;font:600 10px/1 'Inter',sans-serif;cursor:pointer;white-space:nowrap;text-transform:uppercase;letter-spacing:1.2px;transition:all .15s;text-align:center}
.nav button.a{color:var(--gold);border-bottom-color:var(--gold)}

/* HERO */
.hero{padding:36px 20px 22px;text-align:center;background:linear-gradient(180deg,#111411,var(--bg));border-bottom:1px solid var(--border)}
.hero-logo{width:80px;height:80px;border-radius:20px;margin:0 auto 14px;overflow:hidden;background:var(--bg3);border:1px solid var(--border)}
.hero-logo img{width:100%;height:100%;object-fit:cover}
.hero h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:var(--gold);letter-spacing:3px}
.hero .est{font-size:9px;color:var(--muted);letter-spacing:5px;text-transform:uppercase;margin-top:4px;font-weight:500}

/* SECTIONS */
.section{padding:14px 16px 6px}
.sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sec-title{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase}
.sec-link{font-size:11px;color:var(--muted);cursor:pointer;letter-spacing:.3px}
.sec-link:active{color:var(--gold)}
.sh{padding:16px 16px 10px;display:flex;justify-content:space-between;align-items:center}
.sh h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--gold)}
.back{background:none;border:none;color:var(--muted);font:600 13px 'Inter',sans-serif;cursor:pointer;padding:6px 10px;border-radius:6px;transition:background .15s}
.back:active{background:var(--bg3)}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:8px;transition:transform .1s,background .15s}
.card:active{transform:scale(.985);background:var(--bg3)}
.card-body{padding:14px 16px}

/* BUTTONS */
.btn{display:inline-block;padding:12px 20px;border-radius:6px;font:600 12px/1 'Inter',sans-serif;cursor:pointer;border:none;text-align:center;transition:transform .1s,opacity .15s;letter-spacing:.3px}
.btn:active{transform:scale(.97);opacity:.85}
.btn.full{width:100%;display:block}
.btn.green{background:var(--gold);color:var(--bg)}
.btn.green:active{background:var(--gold2)}
.btn.outline{background:transparent;border:1px solid var(--border);color:var(--cream)}
.btn.outline:active{background:var(--bg3)}
.btn-sm{padding:8px 14px;border-radius:6px;font:600 11px/1 'Inter',sans-serif;cursor:pointer;border:none;transition:transform .1s;letter-spacing:.3px}
.btn-sm:active{transform:scale(.95)}
.btn-sm.green{background:var(--gold);color:var(--bg)}
.btn-sm.outline{background:transparent;border:1px solid var(--border);color:var(--cream)}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;background:var(--bg3);color:var(--muted)}
.badge.gld{background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.2)}

/* NEXT TRIP */
.next-trip{background:linear-gradient(135deg,#171a15,#111310);border:1px solid rgba(201,168,76,.15);border-radius:var(--radius);padding:18px;margin-bottom:8px;cursor:pointer;position:relative;overflow:hidden;transition:transform .1s}
.next-trip:active{transform:scale(.98)}
.next-trip::after{content:'';position:absolute;top:-50%;right:-50%;width:50%;height:200%;background:linear-gradient(135deg,transparent,rgba(201,168,76,.02),transparent);transform:rotate(30deg);pointer-events:none}
.nt-eye{font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:3px;font-weight:700;margin-bottom:6px}
.nt-name{font-size:18px;font-weight:800;color:var(--cream);margin-bottom:3px}
.nt-detail{font-size:12px;color:var(--muted)}
.nt-count{font-size:12px;color:var(--gold);margin-top:10px;font-weight:700}
.nt-count.live{color:var(--birdie);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* RIVALRY */
.rivalry-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:8px}
.rivalry-eye{font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:3px;font-weight:600;margin-bottom:14px;text-align:center}
.rivalry-vs{display:flex;align-items:center;justify-content:center;gap:16px}
.rv-player{text-align:center}
.rv-av{width:44px;height:44px;border-radius:50%;background:var(--bg3);border:2px solid var(--border);margin:0 auto 4px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px}
.rv-av img{width:100%;height:100%;object-fit:cover}
.rv-name{font-size:12px;font-weight:600}
.rv-x{font-size:18px;font-weight:800;color:var(--muted2)}
.rv-score{text-align:center;margin-top:12px;font-family:"Playfair Display",serif;font-size:26px;font-weight:700;color:var(--gold)}
.rv-label{font-size:10px;color:var(--muted);text-align:center;margin-top:2px}

/* FEED */
.feed-row{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.feed-row:last-child{border:none}
.feed-name{font-size:13px;font-weight:600;letter-spacing:.1px}
.feed-course{font-size:11px;color:var(--muted);margin-top:1px}
.feed-quip{font-size:11px;color:var(--gold2);margin-top:4px;font-style:italic;line-height:1.3}
.feed-score{font-family:"Playfair Display",serif;font-size:20px;font-weight:700;color:var(--gold);text-align:right}
.feed-date{font-size:10px;color:var(--muted);text-align:right;letter-spacing:.3px}

/* QUICK LINKS */
.qlinks{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.ql{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 8px 12px;text-align:center;cursor:pointer;transition:transform .1s,background .15s}
.ql:active{background:var(--bg3);transform:scale(.95)}
.ql-icon{display:flex;justify-content:center;margin-bottom:6px}
.ql-label{font-size:10px;font-weight:600;color:var(--cream);letter-spacing:.5px;text-transform:uppercase}

/* CHAMPIONS */
.champ-row{display:flex;align-items:center;gap:12px;padding:12px 16px}
.champ-medal{font-size:22px}
.champ-trip{font-size:12px;font-weight:600;letter-spacing:.2px}
.champ-winner{font-size:11px;color:var(--gold);font-weight:600;letter-spacing:.3px}

/* EMPTY STATE */
.empty{text-align:center;padding:32px 20px}
.empty-icon{font-size:28px;margin-bottom:6px}
.empty-text{font-size:12px;color:var(--muted);letter-spacing:.2px}

/* MEMBERS */
.member-row{display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;transition:background .15s}
.member-row:active{background:var(--bg3)}
.m-av{width:48px;height:48px;border-radius:50%;background:var(--bg3);border:2px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--gold);font-weight:700;flex-shrink:0}
.m-av img{width:100%;height:100%;object-fit:cover}
.m-info{flex:1;min-width:0}
.m-name{font-size:14px;font-weight:600}
.m-nick{font-size:12px;color:var(--gold)}
.m-stats{font-size:11px;color:var(--muted);margin-top:3px}
.m-arrow{color:var(--muted2);font-size:16px}

/* PROFILE DETAIL */
.pd-banner{text-align:center;padding:20px 16px 16px}
.pd-av{width:86px;height:86px;border-radius:50%;background:var(--bg3);border:2px solid var(--gold2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:34px;color:var(--gold);font-weight:700;margin:0 auto 10px;cursor:pointer;position:relative}
.pd-av img{width:100%;height:100%;object-fit:cover}
.pd-edit{position:absolute;bottom:0;right:0;width:24px;height:24px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid var(--bg);color:var(--bg)}
.pd-name{font-family:"Playfair Display",serif;font-size:22px;font-weight:700}
.pd-nick{font-size:12px;color:var(--gold);margin-top:3px;letter-spacing:.3px}
.pd-range{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.2px}
.pd-bio{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.6;max-width:300px;margin-left:auto;margin-right:auto;font-style:italic}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 16px 12px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 6px;text-align:center}
.stat-val{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--gold)}
.stat-label{font-size:8px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:1px;font-weight:600}

/* CLUBS */
.club-row{display:flex;justify-content:space-between;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:3px}
.club-name{font-size:12px;color:var(--cream);letter-spacing:.2px}
.club-yd{font-size:12px;color:var(--gold);font-weight:600}

/* FACTS */
.fact-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:4px;font-size:12px;color:var(--muted);line-height:1.4}

/* H2H */
.h2h-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:4px}
.h2h-left{display:flex;align-items:center;gap:8px}
.h2h-av{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:12px}
.h2h-av img{width:100%;height:100%;object-fit:cover}
.h2h-name{font-size:13px;font-weight:600}
.h2h-record{font-size:13px;color:var(--gold);font-weight:700}

/* ROUND CARDS */
.round-card{padding:12px 16px}
.rc-top{display:flex;justify-content:space-between;align-items:flex-start}
.rc-course{font-size:13px;font-weight:600}
.rc-date{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.3px}
.rc-score{font-family:"Playfair Display",serif;font-size:24px;font-weight:700;color:var(--gold)}
.rc-quip{font-size:11px;color:var(--gold2);margin-top:8px;font-style:italic;line-height:1.4;border-left:2px solid rgba(201,168,76,.15);padding-left:10px}
.rc-photo{margin-top:8px;border-radius:8px;overflow:hidden}
.rc-photo img{width:100%;display:block}

/* FORMS */
.form-section{padding:0 16px 16px}
.form-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:10px}
.ff{margin-bottom:10px}
.ff-label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:600}
.ff-input{width:100%;padding:11px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--cream);font-size:14px;outline:none;transition:border .15s,box-shadow .15s}
.ff-input:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(197,165,90,.1)}
textarea.ff-input{min-height:60px;resize:vertical}
.ff-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* TRIPS */
.trip-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}
.trip-name{font-family:"Playfair Display",serif;font-size:16px;font-weight:700;color:var(--gold)}
.trip-detail{font-size:12px;color:var(--muted);margin-top:2px}
.trip-members{font-size:11px;color:var(--muted2);margin-top:2px}

/* COURSES */
.course-row{display:flex;gap:12px;padding:12px 16px;cursor:pointer;align-items:center}
.c-thumb{width:60px;height:42px;border-radius:8px;background:var(--bg3);overflow:hidden;flex-shrink:0}
.c-thumb img{width:100%;height:100%;object-fit:cover}
.c-thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:18px}
.c-info{flex:1}
.c-name{font-size:13px;font-weight:600}
.c-loc{font-size:11px;color:var(--muted);margin-top:1px}
.c-meta{font-size:11px;color:var(--gold);margin-top:3px}
.course-banner{height:160px;overflow:hidden;margin:0 16px;border-radius:var(--radius)}
.course-banner img{width:100%;height:100%;object-fit:cover}
.c-detail-info{font-size:13px;color:var(--muted);margin-bottom:8px}
.review-head{font-size:12px;color:var(--gold)}
.review-text{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.4}

/* HANDICAP */
.hcap-box{margin:0 16px 16px;background:linear-gradient(135deg,var(--bg4),var(--bg2));border:1px solid var(--border);border-radius:var(--radius);padding:24px;text-align:center}
.hcap-val{font-family:'Playfair Display',serif;font-size:44px;font-weight:800;color:var(--gold)}
.hcap-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:3px;margin-top:4px;font-weight:600}

/* HOF */
.hof-card{margin:0 16px 10px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.hof-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--gold);margin-bottom:10px}
.hof-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);gap:8px}
.hof-row:last-child{border:none}
.hof-label{font-size:13px;color:var(--muted);flex-shrink:0}
.hof-val{font-size:13px;font-weight:700;text-align:right;overflow:hidden;text-overflow:ellipsis}

/* PHOTOS */
.photo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:0 16px}
.photo-thumb{aspect-ratio:1;border-radius:6px;overflow:hidden;background:var(--bg3)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}

/* SCORECARD */
.toggle-bar{display:flex;border-bottom:1px solid var(--border);background:var(--bg)}
.toggle-bar button{flex:1;padding:12px;background:transparent;color:var(--muted2);border:none;font:600 10px/1 'Inter',sans-serif;text-transform:uppercase;letter-spacing:1.2px;cursor:pointer;transition:all .15s}
.toggle-bar button.a{color:var(--gold);border-bottom:2px solid var(--gold)}
.sc-tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch;scrollbar-width:none}
.sc-tabs::-webkit-scrollbar{display:none}
.sc-tabs button{flex:0 0 auto;padding:10px 14px;background:0 0;color:var(--muted2);border:none;border-bottom:2px solid transparent;font:600 10px/1.4 'Inter',sans-serif;cursor:pointer;white-space:nowrap;letter-spacing:.5px}
.sc-tabs button.a{color:var(--gold);border-bottom-color:var(--gold)}
.sc-tabs .ts{font-size:9px;font-weight:400;opacity:.6;letter-spacing:0}
.ci{padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ci .nm{font-family:'Playfair Display',serif;font-size:15px;font-weight:700}.ci .dt{font-size:11px;color:var(--muted);letter-spacing:.2px}.ci .bd{padding:4px 14px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:20px;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.5px;text-transform:uppercase}
.mg{padding:12px 16px;border-bottom:1px solid var(--border)}
.mg h3{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.mgr{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mgi{display:flex;align-items:center;gap:6px}
.mgi label{font-size:9px;color:var(--muted);width:78px;flex-shrink:0;line-height:1.2;letter-spacing:.3px}
.mgi select{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--cream);padding:6px 8px;font:12px 'Inter',sans-serif;min-width:0}
table{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums}
th{padding:8px 6px;text-align:center;font:600 9px/1 'Inter',sans-serif;color:var(--muted);background:var(--bg3);text-transform:uppercase;letter-spacing:.8px}
th:first-child{text-align:left;padding-left:10px;position:sticky;left:0;z-index:2;background:var(--bg3)}
th.g{color:var(--gold)}
.r0{background:var(--bg2)}.r1{background:var(--bg)}
.r0 td:first-child{background:var(--bg2)}.r1 td:first-child{background:var(--bg)}
td{padding:3px 4px;text-align:center;border-bottom:1px solid rgba(34,40,34,.5)}
td:first-child{padding:6px 10px;font-weight:600;position:sticky;left:0;z-index:1;font-size:12px;color:var(--muted)}
.sr{background:var(--bg3)!important}.sr td{padding:7px 6px;font-weight:700;font-size:12px;color:var(--muted)}.sr td:first-child{background:var(--bg3)!important;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.ttr{background:var(--bg3)!important;border-top:2px solid var(--gold2)}.ttr td{padding:8px 6px;font-family:'Playfair Display',serif;font-weight:700;font-size:16px;color:var(--gold)}.ttr td:first-child{background:var(--bg3)!important;font-family:'Inter',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.ptsr{background:var(--bg4)!important}.ptsr td{padding:8px 6px;font-family:'Playfair Display',serif;font-weight:700;font-size:16px;color:var(--gold)}.ptsr td:first-child{background:var(--bg4)!important;font-family:'Inter',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.p3{color:var(--red);font-weight:600}.p5{color:var(--birdie);font-weight:600}.p4{color:var(--muted);font-weight:500}
input.s{width:42px;height:36px;text-align:center;border-radius:4px;font:600 14px 'Inter',sans-serif;outline:0;background:var(--bg3);border:1px solid var(--border);color:var(--cream);transition:border .15s}
input.s:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,168,76,.1)}
input.s.w{width:48px}
input.s.bi{background:rgba(78,201,122,.06);border:1px solid rgba(78,201,122,.3);border-radius:50%;color:var(--birdie)}
input.s.ea{background:rgba(201,168,76,.06);border:2px solid var(--gold);border-radius:50%;color:var(--gold)}
input.s.bo{background:rgba(212,96,78,.06);border:1px solid rgba(212,96,78,.2);color:var(--red)}
input.s.db{background:rgba(212,96,78,.06);border:1px solid rgba(212,96,78,.2);color:var(--red)}
.lg{padding:10px 16px;background:var(--bg2);border-top:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.li{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted);letter-spacing:.3px}
.ld{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;font-size:9px;font-weight:800;border-radius:4px;background:var(--bg3);border:1px solid var(--border)}
.ld.c{border-radius:50%}

/* LEADERBOARD */
.lbs{padding:16px}
.lb-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--gold);margin-bottom:12px}
.lb-card{display:flex;align-items:center;justify-content:space-between;padding:14px;margin-bottom:6px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border)}
.lb-card.first{background:linear-gradient(135deg,#1a1e17,var(--bg2));border-color:rgba(201,168,76,.2)}
.lb-left{display:flex;align-items:center;gap:10px}
.lb-medal{font-size:12px;font-weight:800;color:var(--gold);width:28px;text-align:center;letter-spacing:-.5px}
.lb-name{font-weight:600;font-size:14px}
.lb-detail{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.2px}
.lb-pts{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--gold)}
.rc{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:8px;border:1px solid var(--border)}
.rh{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:8px}
.rc-body{font-size:14px}
.rc-row{display:flex;justify-content:space-between;padding:5px 0;font-size:14px}
.rc-strokes{color:var(--muted);margin-right:10px}
.rc-pts{color:var(--gold);font-weight:700}
.bonus-card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:8px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.bonus-info .bonus-label{font-size:14px;font-weight:700}
.bonus-info .bonus-desc{font-size:11px;color:var(--muted)}
.bonus-card select{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--gold);padding:7px 28px 7px 10px;font:13px 'Inter',sans-serif}

/* BACKUP */
.bk-row{display:flex;gap:8px}
.bk-row button{flex:1}

/* FOOTER */
.footer{text-align:center;padding:24px 0 40px;font-size:9px;color:var(--muted2);letter-spacing:2px;text-transform:uppercase}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--gold);color:var(--bg);padding:10px 22px;border-radius:20px;font:600 12px 'Inter',sans-serif;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:99;max-width:90%;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.4);letter-spacing:.3px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* SEARCH RESULTS */
.search-results{position:relative;z-index:10}
.search-item{padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-top:none;cursor:pointer;font-size:13px;transition:background .1s}
.search-item:first-child{border-top:1px solid var(--border);border-radius:0 0 0 0}
.search-item:last-child{border-radius:0 0 8px 8px}
.search-item:hover,.search-item:active{background:var(--bg4)}
</style>
</head>

  /* ---------- PERSISTENCE ---------- */
  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var d = JSON.parse(raw);
        if (d.version >= 3) return d;
      }
    } catch(e) {}
    return createDefault();
  }

  function save() {
    state._saved = Date.now();
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  }

  function exportBackup() {
    return btoa(JSON.stringify(state));
  }

  function importBackup(code) {
    try {
      var d = JSON.parse(atob(code));
      if (d.players && d.scores) { state = d; save(); return true; }
    } catch(e) {}
    return false;
  }

  function reset() {
    state = createDefault();
    localStorage.removeItem(STORAGE_KEY);
    save();
  }

  /* ---------- PLAYER OPS ---------- */
  function getPlayer(id) { return state.players.find(function(p) { return p.id === id; }); }
  function getPlayers() { return state.players; }

  function addPlayer(name, referredBy) {
    var id = name.toLowerCase().replace(/[^a-z0-9]/g, "");
    if (state.players.find(function(p) { return p.id === id; })) return null;
    var p = {id:id,name:name,nick:"",title:"Member",range:"",bio:"",emoji:"⛳",photo:"",homeCourse:"",favoriteCourse:"",bagPhoto:"",founding:false,referredBy:referredBy||null,trips:0,wins:0,clubs:{},bag:{},funnyFacts:[]};
    state.players.push(p);
    if (!state.activity) state.activity = [];
    state.activity.push({type:"member_joined",name:name,referredBy:referredBy||"",date:new Date().toISOString().split("T")[0],ts:Date.now()});
    save();
    return p;
  }

  function updatePlayer(id, updates) {
    var p = getPlayer(id);
    if (!p) return;
    Object.keys(updates).forEach(function(k) { p[k] = updates[k]; });
    save();
  }

  function removePlayer(id) {
    state.players = state.players.filter(function(p) { return p.id !== id; });
    save();
  }

  /* ---------- COURSE OPS ---------- */
  function getCourse(id) { return state.courses.find(function(c) { return c.id === id; }); }
  function getCourses() { return state.courses; }
  function getCourseByName(name) { return state.courses.find(function(c) { return c.name === name; }); }

  function addCourse(data) {
    var id = data.name.toLowerCase().replace(/[^a-z0-9]/g, "").substring(0, 20);
    var existing = getCourse(id);
    if (existing) id = id + "_" + Date.now().toString(36);
    var c = {id:id,name:data.name,loc:data.loc||"",region:data.region||"",rating:parseFloat(data.rating)||72,slope:parseInt(data.slope)||113,par:parseInt(data.par)||72,photo:data.photo||"",reviews:[]};
    state.courses.push(c);
    save();
    return c;
  }

  function updateCourse(id, updates) {
    var c = getCourse(id);
    if (!c) return;
    Object.keys(updates).forEach(function(k) { c[k] = updates[k]; });
    save();
  }

  function addCourseReview(courseId, review) {
    var c = getCourse(courseId);
    if (!c) return;
    if (!c.reviews) c.reviews = [];
    c.reviews.push(review);
    if (!state.activity) state.activity = [];
    state.activity.push({type:"review",course:c.name,by:review.by,rating:review.rating,date:review.date,ts:Date.now()});
    save();
  }

  function getCourseRounds(courseName) { return state.rounds.filter(function(r) { return r.course === courseName; }); }

    var p = getPlayer(data.player);

      player: data.player,
      playerName: p ? p.name : data.player,
      course: data.course,
      score: parseInt(data.score),

      rating: parseFloat(data.rating) || 72,
      slope: parseInt(data.slope) || 113,
      notes: data.notes || "",
      format: data.format || "stroke",
      highlights: data.highlights || [],
      blunders: data.blunders || [],

    state.rounds.push(r);

  /* ---------- TRIP OPS ---------- */

  /* ---------- RECORDS ---------- */
  function getRecords() { return state.records; }

  /* ---------- CALCULATIONS ---------- */
  function calcStableford(score, par) {
    if (!score || score <= 0) return 0;
    var d = score - par;
    return d <= -2 ? 6 : d === -1 ? 4 : d === 0 ? 2 : d === 1 ? 1 : 0;
  }

  function calcHandicap(rounds) {
    if (!rounds || rounds.length < 3) return null;
    var diffs = rounds.map(function(r) { return ((r.score - (r.rating || 72)) * 113 / (r.slope || 113)); });
    var sorted = diffs.slice().sort(function(a, b) { return a - b; });
    var n = Math.min(rounds.length, 20);
    var use = n <= 4 ? 1 : n <= 6 ? 2 : n <= 8 ? 3 : n <= 10 ? 4 : n <= 12 ? 5 : n <= 14 ? 6 : n <= 16 ? 7 : n <= 18 ? 8 : 10;
    var best = sorted.slice(0, use);
    var avg = best.reduce(function(a, b) { return a + b; }, 0) / best.length;
    return Math.round(avg * 10) / 10;
  }

  function getPlayerAvg(pid) {

  function getPlayerBest(pid) {

  function getUniqueCourses(pid) {

    r.forEach(function(x) { c[x.course] = 1; });

  }

  function getTripStableford(tripId, courseKey, playerId) {
    var trip = getTrip(tripId);
    if (!trip) return 0;
    var course = trip.courses.find(function(c) { return c.key === courseKey; });
    if (!course) return 0;
    var scores = getScores(tripId, courseKey, playerId);

    } else if (diff <= 0) {

    } else if (diff <= 5) {

      highlights.push(solid[seed % solid.length]);
    } else if (diff <= 10) {
      var mid = ["The course won, but you put up a fight.","A few bad holes away from a good round. So close yet so far.","Your short game carried your long game's dead weight today.","Average by Parbaugh standards. Which is still questionable by everyone else's."];
      roasts.push(mid[seed % mid.length]);
    } else if (diff <= 15) {
      var rough = ["The course fought back and won. At least you got exercise.","Your scorecard looks like a phone number.","Some holes were good. The rest were character building.","Golf is hard. You proved that today.","The ball spent more time in the rough than on the fairway."];
      roasts.push(rough[seed % rough.length]);
    } else if (diff <= 25) {
      var bad = ["Were you playing golf or hiking? You saw every part of that course.","The course ranger asked if you needed a search party.","Your caddie would've quit if you had one.","Legend says you're still looking for your ball on the 7th.","The golf cart got more of a workout than your clubs."];
      roasts.push(bad[seed % bad.length]);
    } else {
      var brutal = ["We're not sure that counts as golf. More of an outdoor adventure experience.","Your ball spent more time in the woods than a Boy Scout.","That wasn't a round of golf, that was a nature walk with anger issues.","The course is pressing charges.","Triple digits? In this economy?","Someone check if the course is okay after what you just did to it."];
      roasts.push(brutal[seed % brutal.length]);
    }

    // Special score Easter eggs
    if (score === 69) highlights.push("Nice.");
    if (score === 42) highlights.push("The answer to life, the universe, and your golf game.");
    if (score === 77) highlights.push("Lucky 77. The golf gods smiled today.");
    if (score === 100) roasts.push("A perfect hundo. At least you're consistent.");
    if (score === 99) highlights.push("So close to triple digits. The golf gods showed mercy.");
    if (score === 111) roasts.push("Triple ones. A score so bad it's almost a PIN number.");
    if (score === 88) highlights.push("Double eights. Infinity on its side. Poetic.");
    if (score < 80) highlights.push("Sub-80 club. Welcome to the elite.");
    if (score > 120) roasts.push("At this point just tell people you played 27 holes.");
    if (score > 130) roasts.push("Did you count every practice swing too?");

    // Course-specific humor
    if (round.course && round.course.indexOf("Sequoyah") !== -1) {
      if (diff > 10) roasts.push("Sequoyah claims another victim. That 142 slope is undefeated.");
      else highlights.push("You survived Sequoyah. That alone deserves a trophy.");
    }

    // Improvement tracking
    var playerRounds = state.rounds.filter(function(r) { return r.player === round.player; });
    if (playerRounds.length >= 3) {
      var lastThree = playerRounds.slice(-3);
      var avgLast3 = Math.round(lastThree.reduce(function(a, r) { return a + r.score; }, 0) / 3);
      if (score < avgLast3 - 5) highlights.push("That's " + (avgLast3 - score) + " strokes better than your recent average. Trending up.");
      if (score > avgLast3 + 10) roasts.push("That's " + (score - avgLast3) + " strokes worse than your recent average. What happened out there?");
    }

    // Personal best detection
    if (playerRounds.length > 1) {
      var prevBest = Math.min.apply(null, playerRounds.slice(0, -1).map(function(r) { return r.score; }));
      if (score < prevBest) highlights.push("NEW PERSONAL BEST. Previous was " + prevBest + ". The grind is paying off.");
    }

    return { highlights: highlights, roasts: roasts };
  }

  /* ---------- ACTIVITY FEED ---------- */
  function getActivity(limit) {

/* ================================================
   PARBAUGHS ROUTER
   Page navigation and render dispatch
   ================================================ */

var Router = (function() {
  var current = { page: "home", params: {} };
  var pages = {};

  function register(name, renderFn) {
    pages[name] = renderFn;
  }

  function go(page, params) {
    current = { page: page, params: params || {} };
    renderNav();
    var containers = document.querySelectorAll("[data-page]");
    containers.forEach(function(el) { el.classList.add("hidden"); });
    var target = document.querySelector('[data-page="' + page + '"]');
    if (target) {
      target.classList.remove("hidden");
      if (pages[page]) pages[page](current.params);
    }
    window.scrollTo(0, 0);
  }

  function getPage() { return current.page; }
  function getParams() { return current.params; }

  function renderNav() {
    var tabs = [
      { p: "home", l: "Home", match: ["home"] },
      { p: "members", l: "Members", match: ["members","profile-edit"] },
      { p: "trips", l: "Events", match: ["trips","scorecard"] },
      { p: "rounds", l: "Rounds", match: ["rounds"] },
      { p: "records", l: "Records", match: ["records","aces","scramble","courses"] }
    ];
    var h = "";
    tabs.forEach(function(t) {
      var active = t.match.indexOf(current.page) !== -1;
      h += '<button class="' + (active ? "a" : "") + '" onclick="Router.go(\'' + t.p + '\')">' + t.l + '</button>';
    });
    document.getElementById("nav").innerHTML = h;
  }

  function toast(msg) {
    var el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    setTimeout(function() { el.classList.remove("show"); }, 2200);
  }

  var STOCK_AVATARS = ["stock_profile_gold.jpg","stock_profile_green.jpg","stock_profile_navy.jpg","stock_profile_charcoal.jpg","stock_profile_red.jpg","stock_profile_teal.jpg"];

  function getAvatar(player, fallback) {
    if (player.photo) return '<img src="' + player.photo + '" alt="' + player.name + '">';
    if (player.stockAvatar) return '<img src="' + player.stockAvatar + '" onerror="this.parentElement.textContent=\'' + player.name.charAt(0) + '\'" alt="' + player.name + '">';
    var hash = 0;
    for (var i = 0; i < player.name.length; i++) hash = ((hash << 5) - hash) + player.name.charCodeAt(i);
    var idx = Math.abs(hash) % STOCK_AVATARS.length;
    return '<img src="' + STOCK_AVATARS[idx] + '" onerror="this.parentElement.textContent=\'' + player.name.charAt(0) + '\'" alt="' + player.name + '">';
  }

  function handlePhotoUpload(callback, maxW, maxH, quality) {
    maxW = maxW || 200;
    maxH = maxH || 200;
    quality = quality || 0.7;
    var input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";
    input.onchange = function() {
      var file = input.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        var img = new Image();
        img.onload = function() {
          var canvas = document.createElement("canvas");
          if (maxW === maxH) {
            canvas.width = maxW; canvas.height = maxH;
            var ctx = canvas.getContext("2d");
            var min = Math.min(img.width, img.height);
            var sx = (img.width - min) / 2, sy = (img.height - min) / 2;
            ctx.drawImage(img, sx, sy, min, min, 0, 0, maxW, maxH);
          } else {
            canvas.width = maxW; canvas.height = maxH;
            var ctx = canvas.getContext("2d");
            var ratio = Math.max(maxW / img.width, maxH / img.height);
            var w = img.width * ratio, h = img.height * ratio;
            ctx.drawImage(img, (maxW - w) / 2, (maxH - h) / 2, w, h);
          }
          callback(canvas.toDataURL("image/jpeg", quality));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    };
    input.click();
  }

  return {
    register: register,
    go: go,
    getPage: getPage,
    getParams: getParams,
    toast: toast,
    getAvatar: getAvatar,
    handlePhotoUpload: handlePhotoUpload
  };
})();

    {p:"courses",icon:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.5' width='22' height='22'><path d='M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z'/><circle cx='12' cy='10' r='2.5'/></svg>",l:"Courses"},
    {p:"scramble",icon:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.5' width='22' height='22'><path d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z'/></svg>",l:"Teams"},
    {p:"aces",icon:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.5' width='22' height='22'><path d='M5 3v18l7-3 7 3V3H5z'/><circle cx='12' cy='10' r='2'/></svg>",l:"Ace Wall"}
  ];
  links.forEach(function(lnk) {
    h += '<div class="ql" onclick="Router.go(\'' + lnk.p + '\')"><div class="ql-icon" style="color:var(--gold)">' + lnk.icon + '</div><div class="ql-label">' + lnk.l + '</div></div>';
  });
  h += '</div></div>';

  // 5. Rivalry spotlight
  if (players.length >= 2) {
    // Find the most competitive rivalry (most total matches)
    var bestRivalry = null, bestTotal = 0;
    for (var i = 0; i < players.length; i++) {
      for (var j = i + 1; j < players.length; j++) {
        var h2h = calcH2H(players[i].id, players[j].id);
        var total = h2h.p1wins + h2h.p2wins + h2h.ties;
        if (total > bestTotal) { bestTotal = total; bestRivalry = { p1: players[i], p2: players[j], h2h: h2h }; }
      }
    }
    if (!bestRivalry) bestRivalry = { p1: players[0], p2: players.length > 2 ? players[2] : players[1], h2h: { p1wins: 0, p2wins: 0, ties: 0 } };

    h += '<div class="section"><div class="sec-head"><span class="sec-title">Rivalry spotlight</span></div>';
    h += '<div class="rivalry-card"><div class="rivalry-eye">Featured matchup</div><div class="rivalry-vs">';
    h += '<div class="rv-player"><div class="rv-av">' + Router.getAvatar(bestRivalry.p1) + '</div><div class="rv-name">' + bestRivalry.p1.name + '</div></div>';
    h += '<div class="rv-x">vs</div>';
    h += '<div class="rv-player"><div class="rv-av">' + Router.getAvatar(bestRivalry.p2) + '</div><div class="rv-name">' + bestRivalry.p2.name + '</div></div>';
    h += '</div><div class="rv-score">' + bestRivalry.h2h.p1wins + ' — ' + bestRivalry.h2h.p2wins + '</div><div class="rv-label">Head-to-head record</div></div></div>';
  }

  // Backup (subtle, at bottom)
  h += '<div style="text-align:center;padding:8px 16px 4px"><span style="font-size:11px;color:var(--muted2);cursor:pointer;letter-spacing:.5px" onclick="Router.go(\'settings\')">Settings & Backup</span></div>';

  document.querySelector('[data-page="home"]').innerHTML = h;
});

function doCopy() {
  var code = PB.exportBackup();
  navigator.clipboard.writeText(code).then(function() { Router.toast("✅ Backup copied!"); }).catch(function() { prompt("Copy this code:", code); });
}
function doRestore() {
  var code = prompt("Paste backup code:");
  if (code && PB.importBackup(code)) { Router.toast("✅ Restored!"); Router.go("home"); }
  else if (code) Router.toast("❌ Invalid code");
}

function renderMemberList() {
  var players = PB.getPlayers();
  var h = '<div class="sh"><h2>Parbaugh members</h2></div>';
  players.forEach(function(p) {
    var avg = PB.getPlayerAvg(p.id);

    h += '<div class="card" onclick="Router.go(\'members\',{id:\'' + p.id + '\'})">';

  var h = '<div class="sh"><h2>' + p.name + '</h2><button class="back" onclick="Router.go(\'members\')">← Back</button></div>';

  // Banner
  h += '<div class="pd-banner"><div class="pd-av" onclick="uploadMemberPhoto(\'' + pid + '\')">' + Router.getAvatar(p) + '<div class="pd-edit">✎</div></div>';
  h += '<div class="pd-name">' + p.name + '</div>';

  if (p.range) h += '<div class="pd-range">Typical range: ' + p.range + '</div>';

  // Stats grid
  h += '<div class="stats-grid">';

  h += statBox(best || "—", "Best round");

  // What's In The Bag
  if (p.bagPhoto || (p.bag && Object.keys(p.bag).some(function(k){return p.bag[k]}))) {
    h += '<div class="section"><div class="sec-head" onclick="toggleSection(\'bag-' + pid + '\')" style="cursor:pointer"><span class="sec-title">What\'s in the bag</span><span class="sec-link" id="bag-' + pid + '-toggle">▼</span></div>';
    h += '<div id="bag-' + pid + '">';
    if (p.bagPhoto) h += '<div style="border-radius:var(--radius);overflow:hidden;margin-bottom:8px"><img src="' + p.bagPhoto + '" style="width:100%;display:block"></div>';
    if (p.bag) {
      var bagLabels = {driver:"Driver",irons:"Irons",wedges:"Wedges",putter:"Putter",bag_brand:"Bag",accessories:"Accessories",fav_ball:"Favorite Ball"};
      Object.keys(bagLabels).forEach(function(k) {
        if (p.bag[k]) h += '<div class="club-row"><span class="club-name">' + bagLabels[k] + '</span><span class="club-yd" style="max-width:200px;text-align:right">' + p.bag[k] + '</span></div>';
      });
    }
    h += '</div></div>';
  }

  // Club distances (collapsible)
  if (p.clubs && Object.keys(p.clubs).some(function(k) { return p.clubs[k]; })) {
    h += '<div class="section"><div class="sec-head" onclick="toggleSection(\'clubs-' + pid + '\')" style="cursor:pointer"><span class="sec-title">Club distances</span><span class="sec-link" id="clubs-' + pid + '-toggle">▼</span></div>';
    h += '<div id="clubs-' + pid + '">';
    Object.keys(clubLabels).forEach(function(k) {
      if (p.clubs[k]) h += '<div class="club-row"><span class="club-name">' + clubLabels[k] + '</span><span class="club-yd">' + p.clubs[k] + ' yds</span></div>';
    });
    h += '</div></div>';
  }

  // Known for
  if (p.funnyFacts && p.funnyFacts.length) {
    h += '<div class="section"><div class="sec-head"><span class="sec-title">Known for</span></div>';
    p.funnyFacts.forEach(function(f) {
      h += '<div class="fact-item">• ' + f + '</div>';
    });
    h += '</div>';
  }

  // Head to head
  h += '<div class="section"><div class="sec-head"><span class="sec-title">Head to head</span></div>';
  PB.getPlayers().forEach(function(opp) {
    if (opp.id === pid) return;
    var h2h = calcH2H(pid, opp.id);
    var record = h2h.p1wins + ' — ' + h2h.p2wins + (h2h.ties ? ' — ' + h2h.ties + 'T' : '');
    var color = h2h.p1wins > h2h.p2wins ? 'var(--birdie)' : h2h.p2wins > h2h.p1wins ? 'var(--red)' : 'var(--gold)';
    h += '<div class="h2h-row"><div class="h2h-left"><div class="h2h-av">' + Router.getAvatar(opp) + '</div><span class="h2h-name">' + opp.name + '</span></div><span class="h2h-record" style="color:' + color + '">' + record + '</span></div>';
  });
  h += '</div>';

  // Recent rounds with AI commentary
  if (rounds.length) {
    h += '<div class="section"><div class="sec-head"><span class="sec-title">Recent rounds</span></div>';
    rounds.slice(-5).reverse().forEach(function(r) {
      var c = PB.generateRoundCommentary(r);

      h += '<div class="round-card"><div class="rc-top"><div><div class="rc-course">' + r.course + '</div><div class="rc-date">' + r.date + '</div></div>';
      h += '<div class="rc-score">' + r.score + '</div></div>';
      if (quip) h += '<div class="rc-quip">' + quip + '</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  document.querySelector('[data-page="members"]').innerHTML = h;
}

function saveMemberEdit(pid) {
  var clubs = {};
  var clubKeys = ["driver","three_wood","hybrid","five_iron","six_iron","seven_iron","eight_iron","nine_iron","pw","gw","sw","lw"];
  clubKeys.forEach(function(k) {
    var v = document.getElementById("edit-club-" + k);
    if (v && v.value) clubs[k] = v.value;
  });
  var bag = {};
  var bagKeys = ["driver","irons","wedges","putter","bag_brand","accessories","fav_ball"];
  bagKeys.forEach(function(k) {
    var v = document.getElementById("edit-bag-" + k);
    if (v && v.value) bag[k] = v.value;
  });
  var facts = [];
  for (var i = 0; i < 5; i++) {
    var v = document.getElementById("edit-fact-" + i);
    if (v && v.value) facts.push(v.value);
  }
  var updates = {
    name: document.getElementById("edit-name").value,
    nick: document.getElementById("edit-nick").value,
    range: document.getElementById("edit-range").value,
    bio: document.getElementById("edit-bio").value,
    homeCourse: document.getElementById("edit-homecourse").value,
    favoriteCourse: document.getElementById("edit-favcourse").value,
    clubs: clubs,
    bag: bag,
    funnyFacts: facts
  };

  // Handle bag photo
  var bagInput = document.getElementById("edit-bagphoto");
  if (bagInput && bagInput.files && bagInput.files[0]) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement("canvas");
        var maxW = 400, maxH = 300;
        var ratio = Math.min(maxW / img.width, maxH / img.height);
        canvas.width = img.width * ratio;
        canvas.height = img.height * ratio;
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        updates.bagPhoto = canvas.toDataURL("image/jpeg", 0.7);
        PB.updatePlayer(pid, updates);
        Router.toast("Profile saved!");
        Router.go("members", { id: pid });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(bagInput.files[0]);
  } else {
    PB.updatePlayer(pid, updates);
    Router.toast("Profile saved!");
    Router.go("members", { id: pid });
  }
}

function handleEditPhoto(pid, input) {
  var file = input.files[0]; if (!file) return;
  Router.handlePhotoUpload(function(dataUrl) {
    PB.updatePlayer(pid, { photo: dataUrl });

}

function renderAddMemberForm() {

  h += '<div class="form-section"><div class="form-title">New Parbaugh member</div>';

  h += '<div class="ff"><label class="ff-label">Favorite course</label><input class="ff-input" id="add-favcourse" placeholder="Start typing..." oninput="showCourseSearch(this,\'add-fav\')"><div id="search-add-fav" class="search-results"></div></div>';

function submitAddMember() {
  var name = document.getElementById("add-name").value;
  if (!name) { Router.toast("Enter a name"); return; }
  var referral = document.getElementById("add-referral").value;
  var range = document.getElementById("add-range").value;
  var handicap = document.getElementById("add-handicap").value;
  var homeCourse = document.getElementById("add-homecourse").value;
  var favCourse = document.getElementById("add-favcourse").value;
  var result = PB.addPlayer(name, referral);
  if (result) {
    var updates = {};
    if (range) updates.range = range;
    if (homeCourse) updates.homeCourse = homeCourse;
    if (favCourse) updates.favoriteCourse = favCourse;
    if (handicap) updates.manualHandicap = parseFloat(handicap);
    if (Object.keys(updates).length) PB.updatePlayer(result.id, updates);
    Router.toast(name + " joined the Parbaughs!");
    Router.go("members", { edit: result.id });
  } else {
    Router.toast("Member already exists");
  }
}

/* Helpers */
function statBox(val, label) {
  return '<div class="stat-box"><div class="stat-val">' + val + '</div><div class="stat-label">' + label + '</div></div>';
}

function formField(label, id, value, type, placeholder) {
  return '<div class="ff"><label class="ff-label">' + label + '</label><input type="' + (type || "text") + '" class="ff-input" id="' + id + '" value="' + (value || "").toString().replace(/"/g, "&quot;") + '"' + (placeholder ? ' placeholder="' + placeholder + '"' : "") + '></div>';
}

function showCourseSearch(input, type) {
  var results = PB.searchCourses(input.value);
  var container = document.getElementById("search-" + type);
  if (!container || !results.length) { if (container) container.innerHTML = ""; return; }

  var t1id = document.getElementById("lm-team1").value;

  var t2 = teams.find(function(t) { return t.id === t2id; });

  // Team 1 match record
  PB.addScrambleMatch(t1id, {
    opponent: t2.name,

  });

    score: score2,
    opponentScore: score1,
    result: score2 < score1 ? "win" : score2 > score1 ? "loss" : "tie",
    date: date
  });

  Router.toast("Match logged! " + (score1 < score2 ? t1.name + " wins!" : score2 < score1 ? t2.name + " wins!" : "Tie!"));
  Router.go("scramble");
}

/* ================================================
   HEAD-TO-HEAD TRACKING
   ================================================ */

function calcH2H(pid1, pid2) {
  var rounds = PB.getRounds();
  var p1wins = 0, p2wins = 0, ties = 0;

  // Find rounds where both players played the same course on the same date
  var p1rounds = rounds.filter(function(r) { return r.player === pid1; });
  var p2rounds = rounds.filter(function(r) { return r.player === pid2; });

  p1rounds.forEach(function(r1) {
    var match = p2rounds.find(function(r2) {
      return r2.course === r1.course && r2.date === r1.date;
    });
    if (match) {
      if (r1.score < match.score) p1wins++;
      else if (r1.score > match.score) p2wins++;
      else ties++;
    }
  });

  return { p1wins: p1wins, p2wins: p2wins, ties: ties };
}

  var player = document.getElementById("ace-player").value;
  var course = document.getElementById("ace-course").value;
  if (!player || !course) { Router.toast("Player and course required"); return; }

  var ace = {
    by: player,
    course: course,
    hole: document.getElementById("ace-hole").value,
    distance: document.getElementById("ace-distance").value,
    club: document.getElementById("ace-club").value,
    date: document.getElementById("ace-date").value,
    description: document.getElementById("ace-desc").value,
    witnesses: document.getElementById("ace-witnesses").value,
    photo: "",
    ts: Date.now()
  };

  var photoInput = document.getElementById("ace-photo");
  if (photoInput && photoInput.files && photoInput.files[0]) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement("canvas");
        var maxW = 600, maxH = 400;
        var ratio = Math.min(maxW / img.width, maxH / img.height);
        canvas.width = img.width * ratio;
        canvas.height = img.height * ratio;
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        ace.photo = canvas.toDataURL("image/jpeg", 0.7);
        saveAce(ace);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(photoInput.files[0]);
  } else {
    saveAce(ace);
  }
}

function saveAce(ace) {
  var rec = PB.getRecords();
  if (!rec.holeInOnes) rec.holeInOnes = [];
  rec.holeInOnes.push(ace);
  PB.setRecord("holeInOnes", rec.holeInOnes);
  Router.toast("Ace immortalized");
  Router.go("aces");
}

function deleteAce(idx) {
  if (!confirm("Delete this hole-in-one?")) return;
  var rec = PB.getRecords();
  if (rec.holeInOnes) {
    rec.holeInOnes.splice(idx, 1);
    PB.setRecord("holeInOnes", rec.holeInOnes);
  }
  Router.toast("Ace removed");
  Router.go("aces");
}

function toggleTripMember(pid) {
  var idx = tripCreateState.members.indexOf(pid);
  if (idx === -1) tripCreateState.members.push(pid);
  else tripCreateState.members.splice(idx, 1);
  var el = document.getElementById("tc-check-" + pid);
  if (el) el.textContent = tripCreateState.members.indexOf(pid) !== -1 ? "✓" : "";
  if (el) el.style.background = tripCreateState.members.indexOf(pid) !== -1 ? "var(--green)" : "transparent";
  if (el) el.style.borderColor = tripCreateState.members.indexOf(pid) !== -1 ? "var(--green)" : "var(--border)";
}

function showTripCourseSearch(input) {
  var results = PB.searchCourses(input.value);
  var container = document.getElementById("search-tc-course");
  if (!results.length) { container.innerHTML = ""; return; }
  var h = '';
  results.forEach(function(c) {
    h += '<div class="search-item" onclick="addTripCourse(\'' + c.id + '\',\'' + c.name.replace(/'/g, "\\'") + '\',' + c.rating + ',' + c.slope + ',' + c.par + ');document.getElementById(\'tc-course-search\').value=\'\';document.getElementById(\'search-tc-course\').innerHTML=\'\'">' + c.name + ' <span style="color:var(--muted);font-size:11px">' + c.loc + ' · ' + c.rating + '/' + c.slope + '</span></div>';

}

function addTripCourse(id, name, rating, slope, par) {
  if (tripCreateState.courses.find(function(c) { return c.id === id; })) { Router.toast("Already added"); return; }
  tripCreateState.courses.push({ id: id, name: name, rating: rating, slope: slope, par: par, format: "stableford", multiplier: "1" });

}

function removeTripCourse(idx) {
  tripCreateState.courses.splice(idx, 1);

}

function updateTripCourseFormat(idx, val) { tripCreateState.courses[idx].format = val; }
function updateTripCourseMultiplier(idx, val) { tripCreateState.courses[idx].multiplier = val; }

  });

function submitTripCreate() {
  var name = document.getElementById("tc-name").value;
  if (!name) { Router.toast("Enter an event name"); return; }
  if (!tripCreateState.members.length) { Router.toast("Select at least one member"); return; }
  if (tripCreateState.courses.length < 3) { Router.toast("Events require at least 3 rounds"); return; }

  var start = document.getElementById("tc-start").value;
  var end = document.getElementById("tc-end").value;
  if (!start || !end) { Router.toast("Start and end dates required"); return; }
  var loc = document.getElementById("tc-location").value;
  var notes = document.getElementById("tc-notes").value;

  // Build date display
  var dates = "";
  if (start && end) {
    var s = new Date(start + "T00:00:00"), e = new Date(end + "T00:00:00");
    var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    dates = months[s.getMonth()] + " " + s.getDate() + "-" + e.getDate() + ", " + s.getFullYear();
  }

  // Build course configs using per-course format selections
  var defaultPar = [4,4,3,4,5,4,4,3,5,4,3,4,5,4,4,3,4,5];
  var formatLabels = {stableford:"Stableford",stroke:"Stroke play",scramble:"Scramble",bestball:"Best ball",match:"Match play",skins:"Skins"};
  var courseConfigs = tripCreateState.courses.map(function(c, idx) {
    var dayLabels = ["Day 1","Day 2","Day 3","Day 4","Day 5","Day 6","Day 7"];
    var mult = parseFloat(c.multiplier) || 1;
    var fmt = c.format || "stableford";
    var label = (formatLabels[fmt] || fmt) + (mult !== 1 ? " (" + mult + "x)" : "");
    return {
      key: c.id + "_" + idx,
      courseId: c.id,
      n: c.name,
      d: dayLabels[idx] || "Day " + (idx+1),
      t: "TBD",
      p: defaultPar,
      f: label,
      s: fmt === "scramble" ? 1 : 0,
      m: mult
    };
  });

  var trip = PB.addTrip({
    name: name,
    location: loc,
    dates: dates,
    startDate: start,
    endDate: end,
    members: tripCreateState.members,
    courses: courseConfigs,
    miniGames: [],
    bonusAwards: [
      {i:"sandman_"+Date.now(),l:"Sandman",d:"Most pars-or-better from bunkers",p:5},
      {i:"shortgame_"+Date.now(),l:"Short Game King",d:"Most up-and-downs",p:5},
      {i:"coldblooded_"+Date.now(),l:"Cold Blooded",d:"Most one-putts",p:5},
      {i:"phoenix_"+Date.now(),l:"Phoenix",d:"Best single hole vs group",p:3}
    ]
  });

  if (trip) {
    // Log activity
    if (!PB.getActivity) {} // activity logged in addTrip if we add it
    Router.toast("Event created");
    Router.go("scorecard", { tripId: trip.id });
  }
}

function renderTripScorecard(trip, tripPlayers) {
  var h = '';
  if (!trip.courses.length) return '<div class="empty"><div class="empty-icon" style="font-size:14px;color:var(--muted)">No data</div><div class="empty-text">No courses added to this trip yet</div></div>';

  // Course tabs
  h += '<div class="sc-tabs">';
  trip.courses.forEach(function(c) {
    h += '<button class="' + (scState.courseKey === c.key ? "a" : "") + '" onclick="scState.courseKey=\'' + c.key + '\';Router.go(\'scorecard\',{tripId:\'' + trip.id + '\'})">';
    h += '<div>' + c.d + '</div><div class="ts">' + c.n.split(" ")[0] + '</div></button>';
  });
  h += '</div>';

  var c = trip.courses.find(function(x) { return x.key === scState.courseKey; }) || trip.courses[0];
  var iS = c.s, pT = c.p.reduce(function(a, b) { return a + b; }, 0);

  h += '<div class="ci"><div><div class="nm">' + c.n + '</div><div class="dt">' + c.d + ' · ' + c.t + ' · Par ' + pT + '</div></div><div class="bd">' + c.f + '</div></div>';

  // Mini games
  if (iS && trip.miniGames && trip.miniGames.length) {
    h += '<div class="mg"><h3>Mini-game winners</h3><div class="mgr">';
    trip.miniGames.forEach(function(g) {
      h += '<div class="mgi"><label>' + g.l + ' (' + g.p + ')</label><select onchange="PB.setMiniWinner(\'' + g.i + '\',this.value)">';
      h += '<option value="">—</option>';
      tripPlayers.forEach(function(p) { h += '<option value="' + p.id + '"' + (PB.getMiniWinner(g.i) === p.id ? " selected" : "") + '>' + p.name + '</option>'; });
      h += '</select></div>';
    });
    h += '</div></div>';
  }

  // Table
  h += '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch">';
  h += '<table style="min-width:' + (iS ? "300" : (100 + tripPlayers.length * 70)) + 'px"><thead><tr><th>Hole</th><th>Par</th>';
  if (iS) h += '<th class="g">Team</th>';
  else tripPlayers.forEach(function(p) { h += '<th class="g">' + p.name + '</th>'; });
  h += '</tr></thead><tbody>';

  var tid = trip.id;
  for (var i = 0; i < 18; i++) {
    if (i === 9) {
      h += '<tr class="sr"><td>OUT</td><td>' + c.p.slice(0, 9).reduce(function(a, b) { return a + b; }, 0) + '</td>';
      if (iS) h += '<td>' + (PB.getTripTotal(tid, c.key, "team", 0, 9) || "—") + '</td>';
      else tripPlayers.forEach(function(p) { h += '<td>' + (PB.getTripTotal(tid, c.key, p.id, 0, 9) || "—") + '</td>'; });
      h += '</tr>';
    }
    var pa = c.p[i], pc = pa === 3 ? "p3" : pa === 5 ? "p5" : "p4";
    h += '<tr class="r' + (i % 2) + '"><td>' + (i + 1) + '</td><td class="' + pc + '">' + pa + '</td>';
    if (iS) {
      var v = PB.getScores(tid, c.key, "team")[i] || "";
      h += '<td><input type="number" inputmode="numeric" class="s w ' + scoreClass(v, pa) + '" value="' + (v || "") + '" onchange="PB.setScore(\'' + tid + "','" + c.key + "','team'," + i + ',this.value===\"\"?\"\":Math.max(1,Math.min(15,parseInt(this.value)||0)));Router.go(\'scorecard\',{tripId:\'' + tid + '\'})" onfocus="this.select()"></td>';
    } else {
      tripPlayers.forEach(function(p) {
        var v = PB.getScores(tid, c.key, p.id)[i] || "";
        h += '<td><input type="number" inputmode="numeric" class="s ' + scoreClass(v, pa) + '" value="' + (v || "") + '" onchange="PB.setScore(\'' + tid + "','" + c.key + "','" + p.id + "'," + i + ',this.value===\"\"?\"\":Math.max(1,Math.min(15,parseInt(this.value)||0)));Router.go(\'scorecard\',{tripId:\'' + tid + '\'})" onfocus="this.select()"></td>';
      });
    }
    h += '</tr>';
  }

  // IN
  h += '<tr class="sr"><td>IN</td><td>' + c.p.slice(9).reduce(function(a, b) { return a + b; }, 0) + '</td>';
  if (iS) h += '<td>' + (PB.getTripTotal(tid, c.key, "team", 9, 18) || "—") + '</td>';
  else tripPlayers.forEach(function(p) { h += '<td>' + (PB.getTripTotal(tid, c.key, p.id, 9, 18) || "—") + '</td>'; });
  h += '</tr>';

  // TOTAL
  h += '<tr class="ttr"><td>TOT</td><td>' + pT + '</td>';
  if (iS) h += '<td>' + (PB.getTripTotal(tid, c.key, "team", 0, 18) || "—") + '</td>';
  else tripPlayers.forEach(function(p) { h += '<td>' + (PB.getTripTotal(tid, c.key, p.id, 0, 18) || "—") + '</td>'; });
  h += '</tr>';

  // Stableford
  if (!iS) {
    h += '<tr class="ptsr"><td colspan="2">STBL PTS</td>';
    tripPlayers.forEach(function(p) { h += '<td>' + PB.getTripStableford(tid, c.key, p.id) + '</td>'; });
    h += '</tr>';
  }
  h += '</tbody></table></div>';

  if (!iS) {
    h += '<div class="lg"><div class="li"><span class="ld c" style="border:2px solid var(--gold);color:var(--gold)">6</span>Eagle+</div>';
    h += '<div class="li"><span class="ld c" style="border:1px solid var(--birdie);color:var(--birdie);background:#12261a">4</span>Birdie</div>';
    h += '<div class="li"><span class="ld" style="color:var(--cream)">2</span>Par</div>';
    h += '<div class="li"><span class="ld" style="color:var(--red);background:#261515">1</span>Bogey</div>';
    h += '<div class="li"><span class="ld" style="color:var(--red);background:#261515">0</span>Dbl+</div></div>';
  }
  return h;
}

function renderTripLB(trip, tripPlayers) {
  var h = '', tid = trip.id;
  var sorted = tripPlayers.slice().sort(function(a, b) { return PB.getTripPoints(tid, b.id) - PB.getTripPoints(tid, a.id); });
  var md = ["1st", "2nd", "3rd", ""];

  h += '<div class="lbs"><div class="lb-title">Overall standings</div>';
  sorted.forEach(function(p, i) {
    var tot = PB.getTripPoints(tid, p.id);
    var stbl = 0; trip.courses.forEach(function(c) { if (!c.s) stbl += PB.getTripStableford(tid, c.key, p.id); });
    h += '<div class="lb-card' + (i === 0 ? " first" : "") + '"><div class="lb-left"><span class="lb-medal">' + (md[i] || "") + '</span><div><div class="lb-name">' + p.name + '</div>';
    h += '<div class="lb-detail">Mini: ' + PB.getMiniPoints(tid, p.id) + ' · Stbl: ' + stbl + ' · Bonus: ' + PB.getBonusPoints(tid, p.id) + '</div></div></div><div class="lb-pts">' + tot + '</div></div>';
  });
  h += '</div>';

  // Round breakdown
  h += '<div class="lbs"><div class="lb-title">Round breakdown</div>';
  var st = PB.getTripTotal(tid, "scramble", "team", 0, 18);
  h += '<div class="rc"><div class="rh">Sequoyah National · Scramble</div><div class="rc-body">Team: ' + (st || "—") + (st > 0 ? " (" + (st - 72 >= 0 ? "+" : "") + (st - 72) + ")" : "") + '</div></div>';
  trip.courses.forEach(function(c) {
    if (c.s) return;
    h += '<div class="rc"><div class="rh">' + c.d + ' · ' + c.n + ' · ' + c.f + '</div>';
    tripPlayers.forEach(function(p) {
      h += '<div class="rc-row"><span>' + p.name + '</span><span><span class="rc-strokes">' + (PB.getTripTotal(tid, c.key, p.id, 0, 18) || "—") + '</span> <span class="rc-pts">' + PB.getTripStableford(tid, c.key, p.id) + ' pts</span></span></div>';
    });
    h += '</div>';
  });
  h += '</div>';

  // Bonus
  if (trip.bonusAwards && trip.bonusAwards.length) {
    h += '<div class="lbs"><div class="lb-title">Bonus awards</div>';
    trip.bonusAwards.forEach(function(b) {

function scoreClass(v, pa) {
  if (!v || v === "") return "";
  var d = parseInt(v) - pa;
  return d <= -2 ? "ea" : d === -1 ? "bi" : d === 0 ? "" : d === 1 ? "bo" : "db";
}

function renderRoundDetail(roundId) {
  var rounds = PB.getRounds();
  var round = rounds.find(function(r) { return r.id === roundId; });
  if (!round) { Router.go("rounds"); return; }

  var commentary = PB.generateRoundCommentary(round);
  var diff = round.score - (round.rating || 72);
  var player = PB.getPlayer(round.player);

  var h = '<div class="sh"><h2>Round detail</h2><button class="back" onclick="Router.go(\'rounds\')">← Back</button></div>';

  // Round header
  h += '<div class="pd-banner" style="padding-bottom:12px">';
  if (player) h += '<div class="pd-av" style="width:60px;height:60px;font-size:24px;border-width:2px">' + Router.getAvatar(player) + '</div>';
  h += '<div class="pd-name">' + round.playerName + '</div>';
  h += '<div class="pd-nick">' + round.course + '</div>';
  h += '<div style="font-size:40px;font-weight:800;color:var(--gold);margin-top:8px">' + round.score + '</div>';
  h += '<div class="pd-range">' + (diff >= 0 ? "+" : "") + diff + ' vs course rating (' + round.rating + ')</div>';
  h += '<div class="pd-range">' + round.date + ' · Slope: ' + round.slope + (round.format && round.format !== 'stroke' ? ' · ' + round.format.charAt(0).toUpperCase() + round.format.slice(1) : '') + '</div>';
  h += '</div>';

  // Stats
  h += '<div class="stats-grid">';
  h += statBox(round.score, "Score");
  h += statBox(round.rating || 72, "Rating");
  h += statBox(round.slope || 113, "Slope");
  h += '</div>';

  // AI Commentary - show ALL highlights and roasts
  if (commentary.highlights.length || commentary.roasts.length) {
    h += '<div class="section"><div class="sec-head"><span class="sec-title">Parbaugh commentary</span></div>';
    if (commentary.highlights.length) {
      commentary.highlights.forEach(function(hl) {
        h += '<div class="card"><div class="card-body" style="display:flex;gap:10px;align-items:flex-start"><span style="font-size:18px;flex-shrink:0">▲</span><div style="font-size:13px;color:var(--birdie);line-height:1.4">' + hl + '</div></div></div>';
      });
    }
    if (commentary.roasts.length) {
      commentary.roasts.forEach(function(r) {
        h += '<div class="card"><div class="card-body" style="display:flex;gap:10px;align-items:flex-start"><span style="font-size:18px;flex-shrink:0">▼</span><div style="font-size:13px;color:var(--red);line-height:1.4">' + r + '</div></div></div>';
      });
    }
    h += '</div>';
  }

  // Scorecard photo
  if (round.scorecardPhoto) {
    h += '<div class="section"><div class="sec-head"><span class="sec-title">Scorecard</span></div>';
    h += '<div class="card"><div style="border-radius:var(--radius);overflow:hidden"><img src="' + round.scorecardPhoto + '" style="width:100%;display:block"></div></div>';
    h += '</div>';
  }

  // Delete round
  h += '<div class="section"><button class="btn full" style="background:#2a1515;border:1px solid #3a2020;color:#cc6666" onclick="if(confirm(\'Delete this round?\')){PB.deleteRound(\'' + roundId + '\');Router.toast(\'Round deleted\');Router.go(\'rounds\')}">Delete round</button></div>';

  document.querySelector('[data-page="rounds"]').innerHTML = h;
}

function submitRound() {
  var player = document.getElementById("rf-player").value;
  var courseName = document.getElementById("rf-course").value;
  if (!courseName) { Router.toast("Pick a course"); return; }
  var score = parseInt(document.getElementById("rf-score").value);
  if (!score || score < 40 || score > 200) { Router.toast("Enter a valid score"); return; }
  var course = PB.getCourseByName(courseName);
  var rating = parseFloat(document.getElementById("rf-rating").value) || (course ? course.rating : 72);
  var slope = parseInt(document.getElementById("rf-slope").value) || (course ? course.slope : 113);
  var photoInput = document.getElementById("rf-photo");
  var addRoundData = { player:player, course:courseName, score:score, date:document.getElementById("rf-date").value, rating:rating, slope:slope, format:document.getElementById("rf-format").value };

  if (photoInput && photoInput.files && photoInput.files[0]) {
    var reader = new FileReader();
    reader.onload = function(e) {
      addRoundData.scorecardPhoto = e.target.result;
      var round = PB.addRound(addRoundData);
      showRoundCommentary(round);
    };
    reader.readAsDataURL(photoInput.files[0]);
  } else {
    var round = PB.addRound(addRoundData);
    showRoundCommentary(round);
  }
}

function showRoundCourseSearch(input) {
  var results = PB.searchCourses(input.value);
  var container = document.getElementById("search-round-course");
  if (!results.length) { container.innerHTML = ""; return; }
  var h = '';
  results.forEach(function(c) {
    h += '<div class="search-item" onclick="document.getElementById(\'rf-course\').value=\'' + c.name.replace(/'/g, "\\'") + '\';document.getElementById(\'search-round-course\').innerHTML=\'\';var ri=document.getElementById(\'rf-rating\');var si=document.getElementById(\'rf-slope\');if(ri&&!ri.value)ri.value=\'' + c.rating + '\';if(si&&!si.value)si.value=\'' + c.slope + '\';">' + c.name + ' <span style="color:var(--muted);font-size:11px">' + c.loc + '</span></div>';
  });
  container.innerHTML = h;
}

function showRoundCommentary(round) {
  var c = PB.generateRoundCommentary(round);
  var msg = c.roasts.length ? "" + c.roasts[0] : c.highlights.length ? "▲ " + c.highlights[0] : "Round logged!";
  Router.toast(msg);
  Router.go("rounds");
}

function renderCourseDetail(courseId) {
  var c = PB.getCourse(courseId);

  var roundsHere = PB.getCourseRounds(c.name);

  var h = '<div class="sh"><h2>' + c.name + '</h2><button class="back" onclick="Router.go(\'courses\')">← Back</button></div>';

  if (c.photo) h += '<div class="course-banner"><img src="' + c.photo + '"></div>';
  h += '<div class="section"><div class="c-detail-info">' + c.loc + ' · Rating: ' + c.rating + ' · Slope: ' + c.slope + ' · Par: ' + c.par + '</div>';
  h += '<button class="btn-sm outline" onclick="uploadCoursePhoto(\'' + courseId + '\')">Upload photo</button></div>';

  // Course records
  h += '<div class="section"><div class="sec-head"><span class="sec-title">Course records</span></div>';

    var bestSolo = roundsHere.reduce(function(a, b) { return a.score < b.score ? a : b; });
    h += '<div class="hof-card" style="margin:0 0 8px"><div class="hof-row"><span class="hof-label">Best solo score</span><span class="hof-val">' + bestSolo.score + ' — ' + bestSolo.playerName + '</span></div>';
  } else {
    h += '<div class="hof-card" style="margin:0 0 8px"><div class="hof-row"><span class="hof-label">Best solo score</span><span class="hof-val">—</span></div>';
  }
  // Best scramble at this course by team size
  var teams = PB.getScrambleTeams();
  var scrambleBests = {2:null,3:null,4:null};
  teams.forEach(function(t) {
    var sz = t.members ? t.members.length : (t.size || 2);
    (t.matches || []).forEach(function(m) {
      if (m.course === c.name && m.score && (!scrambleBests[sz] || m.score < scrambleBests[sz].score)) {
        scrambleBests[sz] = { score: m.score, team: t.name };
      }
    });
  });
  h += '<div class="hof-row"><span class="hof-label">Best 2-man scramble</span><span class="hof-val">' + (scrambleBests[2] ? scrambleBests[2].score + ' — ' + scrambleBests[2].team : "—") + '</span></div>';
  h += '<div class="hof-row"><span class="hof-label">Best 3-man scramble</span><span class="hof-val">' + (scrambleBests[3] ? scrambleBests[3].score + ' — ' + scrambleBests[3].team : "—") + '</span></div>';
  h += '<div class="hof-row"><span class="hof-label">Best 4-man scramble</span><span class="hof-val">' + (scrambleBests[4] ? scrambleBests[4].score + ' — ' + scrambleBests[4].team : "—") + '</span></div>';
  h += '</div></div>';

  if (roundsHere.length) {
    h += '<div class="section"><div class="sec-head"><span class="sec-title">Parbaugh scores</span></div>';
    roundsHere.slice().reverse().forEach(function(r) {
      h += '<div class="card"><div class="round-card"><div class="rc-top"><div><div class="rc-course">' + r.playerName + '</div><div class="rc-date">' + r.date + '</div></div>';
      h += '<div class="rc-score">' + r.score + '</div></div></div></div>';
    });
    h += '</div>';
  }

  // Reviews
  h += '<div class="section"><div class="sec-head"><span class="sec-title">Reviews</span></div>';
  if (c.reviews && c.reviews.length) {
    c.reviews.forEach(function(r) {
      h += '<div class="card"><div class="card-body"><div class="review-head">★ ' + r.rating + '/5 — ' + r.by + '</div><div class="review-text">' + r.text + '</div></div></div>';
    });
  }
  h += '<div id="review-form-' + courseId + '" style="display:none;margin-top:8px">';
  h += '<div class="ff"><label class="ff-label">Rating</label><select class="ff-input" id="rev-rating"><option value="5">★★★★★ (5)</option><option value="4">★★★★ (4)</option><option value="3">★★★ (3)</option><option value="2">★★ (2)</option><option value="1">★ (1)</option></select></div>';
  h += '<div class="ff"><label class="ff-label">Review</label><textarea class="ff-input" id="rev-text" placeholder="What did you think of this course?"></textarea></div>';
  h += '<button class="btn full green" onclick="submitCourseReview(\'' + courseId + '\')">Submit review</button></div>';
  h += '<button class="btn full outline" onclick="document.getElementById(\'review-form-' + courseId + '\').style.display=\'block\';this.style.display=\'none\'">+ Write review</button></div>';

  document.querySelector('[data-page="courses"]').innerHTML = h;
}
