// ========== SMART TOURNAMENT GENERATOR ==========
function getTournamentFormats(style, numRounds) {
  var formats = [];
  switch(style) {
    case "classic":
      for (var i = 0; i < numRounds; i++) formats.push({ format: "stableford", teeTime: "8:00 AM", desc: "Modified Stableford" });
      break;
    case "mixed":
      var rotation = ["stableford", "bestball", "scramble", "skins", "parbaugh", "match", "stroke"];
      for (var i = 0; i < numRounds; i++) formats.push({ format: rotation[i % rotation.length], teeTime: "8:00 AM", desc: "" });
      break;
    case "parbaugh":
      for (var i = 0; i < numRounds; i++) formats.push({ format: "parbaugh", teeTime: "8:30 AM", desc: "Handicap-adjusted stroke play" });
      break;
    case "ryder":
      var ryderRotation = ["bestball", "scramble", "match", "bestball", "match"];
      for (var i = 0; i < numRounds; i++) formats.push({ format: ryderRotation[i % ryderRotation.length], teeTime: "9:00 AM", desc: "Team format" });
      break;
    case "skins":
      for (var i = 0; i < numRounds; i++) formats.push({ format: "skins", teeTime: "8:00 AM", desc: "Skins — pot carries over" });
      break;
    case "scramble":
      for (var i = 0; i < numRounds; i++) formats.push({ format: "scramble", teeTime: "Shotgun 9:00 AM", desc: "Teams balanced by handicap" });
      break;
    default:
      for (var i = 0; i < numRounds; i++) formats.push({ format: "stableford", teeTime: "TBD", desc: "" });
  }
  return formats;
}

function updateFormatPreview() {
  var style = document.getElementById("tc-style").value;
  var el = document.getElementById("formatPreview");
  if (!el) return;
  
  if (style === "custom") { el.innerHTML = ''; return; }
  
  var numCourses = tripCreateState.courses.length || 3;
  var numPlayers = tripCreateState.members.length || 4;
  var formats = getTournamentFormats(style, numCourses);
  var formatLabels = {stableford:"Stableford",stroke:"Stroke Play",parbaugh:"Parbaugh Stroke Play",scramble:"Scramble",bestball:"Best Ball",match:"Match Play",skins:"Skins"};
  
  var descriptions = {
    classic: "Every round is Modified Stableford. Points accumulate across all rounds. Highest total points wins. Simple, fair, and rewards consistent play across the whole event.",
    mixed: "A different format each day keeps things fresh. Tests all aspects of your game — individual scoring, team play, head-to-head, and strategy.",
    parbaugh: "Parbaugh Stroke Play levels the playing field. Each player's handicap adjusts their gross score so higher handicappers compete fairly against lower ones. The best net score wins.",
    ryder: "Split into two teams balanced by combined handicap. Alternate between best ball and scramble formats. Final day is individual match play. Team with most points wins.",
    skins: "Every hole is worth money (or bragging rights). Win the hole outright or the skin carries over, making the next hole worth double. High drama guaranteed.",
    scramble: "Teams balanced by combined handicap. Everyone drives, pick the best ball, everyone plays from there. Best team score wins. Great for groups with mixed skill levels."
  };
  
  var ph = '<div class="card" style="margin:8px 0"><div class="card-body">';
  ph += '<div style="font-size:12px;font-weight:600;color:var(--gold);margin-bottom:6px">' + style.charAt(0).toUpperCase() + style.slice(1) + ' Format</div>';
  ph += '<div style="font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:8px">' + (descriptions[style] || "") + '</div>';
  
  ph += '<div style="font-size:10px;color:var(--cream)">';
  formats.slice(0, numCourses).forEach(function(f, i) {
    ph += '<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border)">';
    ph += '<span>Day ' + (i+1) + '</span>';
    ph += '<span style="color:var(--gold)">' + (formatLabels[f.format] || f.format) + '</span></div>';
  });
  ph += '</div>';
  
  if (numPlayers >= 2) {
    ph += '<div style="margin-top:8px;font-size:10px;color:var(--muted)">';
    if (style === "ryder" || style === "scramble") {
      ph += 'Teams will be auto-balanced by handicap (' + numPlayers + ' players → ' + Math.ceil(numPlayers/2) + ' per team)';
    } else {
      ph += numPlayers + ' players competing individually';
    }
    ph += '</div>';
  }
  
  ph += '</div></div>';
  el.innerHTML = ph;
}

function generateFairPairings(memberIds, style) {
  // Get players with handicaps, sort by skill
  var players = memberIds.map(function(id) {
    var p = PB.getPlayer(id);
    var rounds = PB.getPlayerRounds(id);
    var hcap = PB.calcHandicap(rounds) || (p ? (p.manualHandicap || 20) : 20);
    return { id: id, name: p ? p.name : id, handicap: hcap };
  }).sort(function(a, b) { return a.handicap - b.handicap; });
  
  if (style === "ryder" || style === "scramble") {
    // Snake draft for fair teams: best + worst, 2nd best + 2nd worst, etc.
    var team1 = [], team2 = [];
    players.forEach(function(p, i) {
      if (i % 4 === 0 || i % 4 === 3) team1.push(p);
      else team2.push(p);
    });
    
    var t1hcap = team1.reduce(function(a, p) { return a + p.handicap; }, 0);
    var t2hcap = team2.reduce(function(a, p) { return a + p.handicap; }, 0);
    
    return {
      type: "teams",
      team1: { players: team1, combinedHandicap: Math.round(t1hcap * 10) / 10 },
      team2: { players: team2, combinedHandicap: Math.round(t2hcap * 10) / 10 },
      fairness: Math.abs(t1hcap - t2hcap) < 3 ? "Excellent balance" : Math.abs(t1hcap - t2hcap) < 6 ? "Good balance" : "Moderate imbalance"
    };
  }
  
  // Individual — return players sorted by handicap for tee time grouping
  return {
    type: "individual",
    players: players,
    groups: groupPlayersForTee(players)
  };
}

function groupPlayersForTee(players) {
  // Group players in foursomes, mixing skill levels
  if (players.length <= 4) return [players];
  var groups = [];
  var remaining = players.slice();
  while (remaining.length > 0) {
    var group = [];
    // Take best available, worst available, then fill middle
    if (remaining.length > 0) group.push(remaining.shift()); // best
    if (remaining.length > 0) group.push(remaining.pop());   // worst
    if (remaining.length > 0) group.push(remaining.shift()); // 2nd best
    if (remaining.length > 0) group.push(remaining.pop());   // 2nd worst
    groups.push(group);
  }
  return groups;
}

function submitTripCreate() {
  var name = document.getElementById("tc-name").value;
  if (!name) { Router.toast("Enter an event name"); return; }
  if (!tripCreateState.members.length) { Router.toast("Select at least one member"); return; }
  if (tripCreateState.courses.length < 1) { Router.toast("Add at least one course"); return; }

  var start = document.getElementById("tc-start").value;
  var end = document.getElementById("tc-end").value;
  if (!start || !end) { Router.toast("Start and end dates required"); return; }
  var loc = document.getElementById("tc-location").value;
  var notes = document.getElementById("tc-notes").value;
  var style = document.getElementById("tc-style").value;
  var champMult = parseFloat(document.getElementById("tc-champ").value) || 1;

  // Apply tournament style to course formats
  var styleFormats = getTournamentFormats(style, tripCreateState.courses.length);

  // Build date display
  var dates = "";
  if (start && end) {
    var s = new Date(start + "T00:00:00"), e = new Date(end + "T00:00:00");
    var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    dates = months[s.getMonth()] + " " + s.getDate() + "-" + e.getDate() + ", " + s.getFullYear();
  }

  // Build course configs
  var defaultPar = [4,4,3,4,5,4,4,3,5,4,3,4,5,4,4,3,4,5];
  var formatLabels = {stableford:"Stableford",stroke:"Stroke play",parbaugh:"Parbaugh Stroke Play",scramble:"Scramble",bestball:"Best ball",match:"Match play",skins:"Skins"};
  var courseConfigs = tripCreateState.courses.map(function(c, idx) {
    var dayLabels = ["Day 1","Day 2","Day 3","Day 4","Day 5","Day 6","Day 7"];
    var fmt = (style !== "custom" && styleFormats[idx]) ? styleFormats[idx].format : (c.format || "stableford");
    var mult = (idx === tripCreateState.courses.length - 1 && champMult > 1) ? champMult : (parseFloat(c.multiplier) || 1);
    var label = (formatLabels[fmt] || fmt) + (mult !== 1 ? " (" + mult + "x)" : "");
    return {
      key: c.id + "_" + idx,
      courseId: c.id,
      n: c.name,
      d: dayLabels[idx] || "Day " + (idx+1),
      t: styleFormats[idx] ? (styleFormats[idx].teeTime || "TBD") : "TBD",
      p: defaultPar,
      f: label,
      s: fmt === "scramble" ? 1 : 0,
      m: mult
    };
  });

  // Generate fair pairings if team format
  var pairings = generateFairPairings(tripCreateState.members, style);

  var trip = PB.addTrip({
    name: name,
    location: loc,
    dates: dates,
    startDate: start,
    endDate: end,
    members: tripCreateState.members,
    courses: courseConfigs,
    tournamentStyle: style,
    pairings: pairings,
    miniGames: [],
    bonusAwards: [
      {i:"sandman_"+Date.now(),l:"Sandman",d:"Most pars-or-better from bunkers",p:5},
      {i:"shortgame_"+Date.now(),l:"Short Game King",d:"Most up-and-downs",p:5},
      {i:"coldblooded_"+Date.now(),l:"Cold Blooded",d:"Most one-putts",p:5},
      {i:"phoenix_"+Date.now(),l:"Phoenix",d:"Best single hole vs group",p:3}
    ]
  });

  if (trip) {
    // Log activity
    if (!PB.getActivity) {} // activity logged in addTrip if we add it
    Router.toast("Event created");
    Router.go("scorecard", { tripId: trip.id });
  }
}

    h += '<div class="li"><span class="ld c" style="border:1px solid var(--birdie);color:var(--birdie);background:#12261a">4</span>Birdie</div>';

    h += '</div>';

  return h;

    gh += '<div style="text-align:center;padding:8px;font-size:10px;color:var(--muted2)">' + allPhotos.length + ' photos</div>';

  });

}

function uploadTripPhotoFirestore(tripId) {
  var input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.onchange = function() {
    var file = input.files[0];
    if (!file) return;
    Router.toast("Compressing...");
    var reader = new FileReader();
    reader.onload = function(e) {
      compressPhoto(e.target.result, PHOTO_MAX_KB, 800, function(compressed) {
        var caption = prompt("Caption (optional):", "") || "";
        savePhoto("trip", tripId, compressed, caption).then(function(ok) {
          if (ok) Router.toast("Photo uploaded to cloud!");
          else Router.toast("Saved locally");
          // Also save locally as backup
          PB.addTripPhoto(tripId, compressed);
          Router.go("scorecard", { tripId: tripId });
        });
      });
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function uploadTripPhoto(tripId) { uploadTripPhotoFirestore(tripId); }

function addTripPhotoUrl(tripId) {
  var url = prompt("Paste image URL:");
  if (!url) return;
  savePhoto("trip", tripId, url, "").then(function() {
    Router.toast("Photo added!");
    Router.go("scorecard", { tripId: tripId });
  });
}

function scoreClass(v, pa) {
  if (!v || v === "") return "";
  var d = parseInt(v) - pa;
  return d <= -2 ? "ea" : d === -1 ? "bi" : d === 0 ? "" : d === 1 ? "bo" : "db";
}

function renderRoundDetail(roundId) {
  var rounds = PB.getRounds();

  if (!round) { Router.go("rounds"); return; }

  var commentary = PB.generateRoundCommentary(round);
  var diff = round.score - (round.rating || 72);
  var player = PB.getPlayer(round.player);

  var h = '<div class="sh"><h2>Round detail</h2><button class="back" onclick="Router.go(\'rounds\')">← Back</button></div>';

  // Round header
  h += '<div class="pd-banner" style="padding-bottom:12px">';

  h += '<div class="pd-name">' + round.playerName + '</div>';
  h += '<div class="pd-nick">' + round.course + '</div>';
  h += '<div style="font-size:40px;font-weight:800;color:var(--gold);margin-top:8px">' + round.score + '</div>';
  h += '<div class="pd-range">' + (diff >= 0 ? "+" : "") + diff + ' vs course rating (' + round.rating + ')</div>';
  h += '<div class="pd-range">' + round.date + ' · Slope: ' + round.slope + (round.format && round.format !== 'stroke' ? ' · ' + round.format.charAt(0).toUpperCase() + round.format.slice(1) : '') + '</div>';
  h += '</div>';

  // Stats
  h += '<div class="stats-grid">';
  h += statBox(round.score, "Score");
  h += statBox(round.rating || 72, "Rating");
  h += statBox(round.slope || 113, "Slope");
  h += '</div>';

  // AI Commentary - show ALL highlights and roasts
  if (commentary.highlights.length || commentary.roasts.length) {
    h += '<div class="section"><div class="sec-head"><span class="sec-title">Parbaugh commentary</span></div>';

      commentary.highlights.forEach(function(hl) {

    }
    if (commentary.roasts.length) {
      commentary.roasts.forEach(function(r) {

      });
    }

    h += '</div>';
  }

  h += '<div class="section">';
  h += '<div id="del-confirm" style="display:none;margin-bottom:8px;padding:12px;background:rgba(212,96,78,.06);border:1px solid rgba(212,96,78,.15);border-radius:var(--radius);text-align:center">';

function submitRound() {
  var player = document.getElementById("rf-player").value;
  var courseName = document.getElementById("rf-course").value;
  if (!courseName) { Router.toast("Pick a course"); return; }
  var score = parseInt(document.getElementById("rf-score").value);
  if (!score || score < 40 || score > 200) { Router.toast("Enter a valid score"); return; }
  var course = PB.getCourseByName(courseName);
  var rating = parseFloat(document.getElementById("rf-rating").value) || (course ? course.rating : 72);
  var slope = parseInt(document.getElementById("rf-slope").value) || (course ? course.slope : 113);
  var photoInput = document.getElementById("rf-photo");
  var addRoundData = { player:player, course:courseName, score:score, date:document.getElementById("rf-date").value, rating:rating, slope:slope, format:document.getElementById("rf-format").value };

  if (photoInput && photoInput.files && photoInput.files[0]) {
    var reader = new FileReader();
    reader.onload = function(e) {
      addRoundData.scorecardPhoto = e.target.result;
      var round = PB.addRound(addRoundData);
      showRoundCommentary(round);
    };
    reader.readAsDataURL(photoInput.files[0]);
  } else {
    var round = PB.addRound(addRoundData);
    showRoundCommentary(round);
  }
}

  h += '<div class="m-arrow" style="color:var(--gold);font-size:20px">›</div></div></div>';

  h += '<div class="qlinks" style="grid-template-columns:1fr 1fr;margin-bottom:12px">';

  // Challenges
  var challengeCount = 0;
  try { PB.getPlayers().forEach(function(p){challengeCount += PB.getChallenges(p.id).filter(function(c){return c.status==="pending"}).length}); } catch(e) {}
  h += '<div class="card" onclick="Router.go(\'challenges\')" style="cursor:pointer;margin-bottom:0"><div style="padding:14px 12px;text-align:center">';
  h += '<div style="font-size:20px;font-family:Playfair Display,serif;font-weight:700;color:var(--gold)">' + (challengeCount || "0") + '</div>';
  h += '<div style="font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.8px">Challenges</div></div></div>';

  // Ace Wall
  var aceCount = (rec.holeInOnes && rec.holeInOnes.length) || 0;
  h += '<div class="card" onclick="Router.go(\'aces\')" style="cursor:pointer;margin-bottom:0"><div style="padding:14px 12px;text-align:center">';
  h += '<div style="font-size:20px;font-family:Playfair Display,serif;font-weight:700;color:var(--gold)">' + aceCount + '</div>';
  h += '<div style="font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.8px">Aces</div></div></div>';

  // Teams
  var teamCount = PB.getScrambleTeams().length;
  h += '<div class="card" onclick="Router.go(\'scramble\')" style="cursor:pointer;margin-bottom:0"><div style="padding:14px 12px;text-align:center">';
  h += '<div style="font-size:20px;font-family:Playfair Display,serif;font-weight:700;color:var(--gold)">' + teamCount + '</div>';
  h += '<div style="font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.8px">Teams</div></div></div>';

  // Courses
  var coursesPlayed = PB.getCourses().filter(function(c){return PB.getCourseRounds(c.name).length>0}).length;
  h += '<div class="card" onclick="Router.go(\'courses\')" style="cursor:pointer;margin-bottom:0"><div style="padding:14px 12px;text-align:center">';
  h += '<div style="font-size:20px;font-family:Playfair Display,serif;font-weight:700;color:var(--gold)">' + coursesPlayed + '</div>';
  h += '<div style="font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.8px">Courses played</div></div></div>';

  h += '</div>';

  // Helper for collapsible hof card
  function hofCard(id, title, content) {
    return '<div class="hof-card"><div class="hof-title" onclick="toggleSection(\'rec-' + id + '\')" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center"><span>' + title + '</span><span id="rec-' + id + '-toggle" style="font-size:12px;color:var(--muted);display:inline-flex;transition:transform .2s"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="transition:transform .2s;color:var(--muted)"><path d="M9 18l6-6-6-6"/></svg></span></div><div id="rec-' + id + '" style="display:none">' + content + '</div></div>';
  }

  // 1. Event Champions — ALWAYS VISIBLE, they earned it
  var trips = PB.getTrips();
  if (trips.length) {
    h += '<div class="section"><div class="sec-head"><span class="sec-title">Event champions</span></div>';
    trips.forEach(function(t) {
      var champ = t.champion ? PB.getPlayer(t.champion) : null;
      var champName = champ ? (champ.username || champ.name) : "TBD";
      var isChamp = !!t.champion;
      h += '<div class="card" style="' + (isChamp ? 'border-color:rgba(201,168,76,.2);background:linear-gradient(135deg,#1a1e30,var(--card))' : '') + '">';
      h += '<div style="padding:14px 16px;display:flex;justify-content:space-between;align-items:center">';
      h += '<div><div style="font-family:Playfair Display,serif;font-size:15px;font-weight:700;color:var(--gold)">' + t.name + '</div>';
      h += '<div style="font-size:10px;color:var(--muted);margin-top:3px">' + (t.dates||"") + ' · ' + (t.location||"") + '</div></div>';
      h += '<div style="text-align:right"><div style="font-size:14px;font-weight:700;color:' + (isChamp ? 'var(--gold)' : 'var(--muted)') + '">' + champName + '</div></div>';
      h += '</div></div>';
    });
    h += '</div>';
  }

  // 2. All-time records
  var recContent = '';
  if (rounds.length) {
    var best = rounds.reduce(function(a, b) { return a.score < b.score ? a : b; });
    recContent += '<div class="hof-row"><span class="hof-label">Best round</span><span class="hof-val">' + best.score + ' — ' + best.playerName + '</span></div>';
  } else {
    recContent += '<div class="hof-row"><span class="hof-label">Best round</span><span class="hof-val">—</span></div>';
  }
  var rec = PB.getRecords();
  recContent += '<div class="hof-row"><span class="hof-label">Longest drive</span><span class="hof-val">' + (rec.longestDrive ? rec.longestDrive.distance + ' yds — ' + rec.longestDrive.by : "—") + '</span></div>';
  recContent += '<div class="hof-row"><span class="hof-label">Longest putt</span><span class="hof-val">' + (rec.longestPutt ? rec.longestPutt.distance + ' ft — ' + rec.longestPutt.by : "—") + '</span></div>';
  recContent += '<div class="hof-row"><span class="hof-label">Longest hole out</span><span class="hof-val">' + (rec.longestHoleOut ? rec.longestHoleOut.distance + ' yds — ' + rec.longestHoleOut.by : "—") + '</span></div>';
  recContent += '<div class="hof-row"><span class="hof-label">Chip-ins</span><span class="hof-val">' + (rec.chipIns || 0) + '</span></div>';
  recContent += '<div class="hof-row" onclick="Router.go(\'aces\')" style="cursor:pointer"><span class="hof-label">Hole-in-ones</span><span class="hof-val" style="color:var(--gold)">' + (rec.holeInOnes && rec.holeInOnes.length ? rec.holeInOnes.length + ' → View Ace Wall' : 'View Ace Wall →') + '</span></div>';
  h += hofCard("alltime", "All-time records", recContent);

  // Log record button
  h += '<div style="padding:0 16px 8px"><button class="btn full outline" onclick="showAddRecord()">+ Log a record</button></div>';
  h += '<div id="add-record-form" style="display:none;padding:0 16px 16px"><div class="card"><div class="card-body">';
  h += '<div class="ff"><label class="ff-label">Record type</label><select class="ff-input" id="rec-type"><option value="longestDrive">Longest drive</option><option value="longestPutt">Longest putt</option><option value="longestHoleOut">Longest hole out</option><option value="chipIn">Chip-in</option></select></div>';
  h += '<div class="ff"><label class="ff-label">Player</label><select class="ff-input" id="rec-player">';
  players.forEach(function(p) { h += '<option value="' + p.name + '">' + p.name + '</option>'; });
  h += '</select></div>';
  h += '<div class="ff"><label class="ff-label">Distance (yds or ft)</label><input class="ff-input" id="rec-distance" type="number" placeholder="e.g. 285"></div>';
  h += '<div class="ff"><label class="ff-label">Club used</label><input class="ff-input" id="rec-club" placeholder="e.g. 7 iron"></div>';
  h += '<div class="ff"><label class="ff-label">Course</label><input class="ff-input" id="rec-course" placeholder="Course name"></div>';
  h += '<button class="btn full green" onclick="submitRecord()">Save record</button></div></div></div>';

  // 3. Head-to-head records
  var h2hContent = '';
  for (var i = 0; i < players.length; i++) {
    for (var j = i + 1; j < players.length; j++) {
      var h2h = calcH2H(players[i].id, players[j].id);
      var total = h2h.p1wins + h2h.p2wins + h2h.ties;
      if (total > 0) {
        var leader = h2h.p1wins > h2h.p2wins ? players[i].name : h2h.p2wins > h2h.p1wins ? players[j].name : "Tied";
        h2hContent += '<div class="hof-row"><span class="hof-label">' + players[i].name + ' vs ' + players[j].name + '</span><span class="hof-val">' + h2h.p1wins + '-' + h2h.p2wins + (h2h.ties ? '-' + h2h.ties + 'T' : '') + '</span></div>';
      }
    }
  }
  if (!h2hContent) h2hContent = '<div class="hof-row"><span class="hof-label">No head-to-head data</span><span class="hof-val">Play same course, same day</span></div>';
  h += hofCard("h2h", "Head-to-head records", h2hContent);

  // 4. Scramble team records
  var teams = PB.getScrambleTeams();
  var scrambleContent = '';
  if (teams.length) {
    // Group by size
    [2,3,4].forEach(function(sz) {
      var sizeTeams = teams.filter(function(t) { return (t.members ? t.members.length : (t.size || 2)) === sz; });
      if (!sizeTeams.length) return;
      scrambleContent += '<div style="font-size:12px;font-weight:700;color:var(--muted);margin:8px 0 4px;text-transform:uppercase;letter-spacing:1px">' + sz + '-man teams</div>';
      var sorted = sizeTeams.slice().sort(function(a, b) {
        var aw = (a.matches || []).filter(function(m) { return m.result === "win"; }).length;
        var bw = (b.matches || []).filter(function(m) { return m.result === "win"; }).length;
        return bw - aw;
      });
      sorted.forEach(function(t) {
        var w = (t.matches || []).filter(function(m) { return m.result === "win"; }).length;
        var l = (t.matches || []).filter(function(m) { return m.result === "loss"; }).length;
        var bestScore = t.matches && t.matches.length ? Math.min.apply(null, t.matches.filter(function(m){return m.score}).map(function(m){return m.score})) : null;
        scrambleContent += '<div class="hof-row"><span class="hof-label">' + t.name + '</span><span class="hof-val">' + w + '-' + l + (bestScore ? ' · Best: ' + bestScore : '') + '</span></div>';
      });
    });
  } else {
    scrambleContent = '<div class="hof-row"><span class="hof-label">No teams yet</span><span class="hof-val">Create a team</span></div>';
  }
  h += hofCard("scramble", "Scramble team records", scrambleContent);

  // 5. Best scores by course
  var courseContent = '';
  var courses = PB.getCourses();
  var coursesWithData = courses.filter(function(c) { return PB.getCourseRounds(c.name).length > 0 || teams.some(function(t){return(t.matches||[]).some(function(m){return m.course===c.name})}); });
  if (coursesWithData.length) {
    coursesWithData.forEach(function(c) {
      var cr = PB.getCourseRounds(c.name);
      var bestSolo = cr.length ? cr.reduce(function(a, b) { return a.score < b.score ? a : b; }) : null;
      var scrambleBests = {};
      teams.forEach(function(t) {
        var sz = t.members ? t.members.length : (t.size || 2);
        (t.matches || []).forEach(function(m) {
          if (m.course === c.name && m.score && (!scrambleBests[sz] || m.score < scrambleBests[sz].score)) {
            scrambleBests[sz] = { score: m.score, team: t.name };
          }
        });
      });
      var extras = [];
      if (scrambleBests[2]) extras.push('2m: ' + scrambleBests[2].score);
      if (scrambleBests[3]) extras.push('3m: ' + scrambleBests[3].score);
      if (scrambleBests[4]) extras.push('4m: ' + scrambleBests[4].score);
      courseContent += '<div class="hof-row"><span class="hof-label">' + c.name + '</span><span class="hof-val">' + (bestSolo ? bestSolo.score + ' (' + bestSolo.playerName + ')' : '—') + (extras.length ? ' · ' + extras.join(' · ') : '') + '</span></div>';
    });
  } else {
    courseContent = '<div class="hof-row"><span class="hof-label">No course records</span><span class="hof-val">Log rounds to populate</span></div>';
  }
  h += hofCard("courses", "Best scores by course", courseContent);

  // 6. Handicap leaderboard
  var hcapContent = '';
  var hcaps = players.map(function(p) { return { name: p.name, hcap: PB.calcHandicap(PB.getPlayerRounds(p.id)) }; })
    .filter(function(x) { return x.hcap !== null; }).sort(function(a, b) { return a.hcap - b.hcap; });
  if (hcaps.length) { hcaps.forEach(function(x) { hcapContent += '<div class="hof-row"><span class="hof-label">' + x.name + '</span><span class="hof-val">' + x.hcap + '</span></div>'; }); }
  else hcapContent = '<div class="hof-row"><span class="hof-label">No handicaps yet</span><span class="hof-val">Log 3+ rounds</span></div>';
  h += hofCard("hcap", "Handicap leaderboard", hcapContent);

  // 7. Member averages
  var avgContent = '';
  players.forEach(function(p) {
    var r = PB.getPlayerRounds(p.id);
    var avg = r.length ? Math.round(r.reduce(function(a, x) { return a + x.score; }, 0) / r.length) : "—";
    avgContent += '<div class="hof-row"><span class="hof-label">' + p.name + '</span><span class="hof-val">' + avg + (r.length ? ' (' + r.length + ')' : '') + '</span></div>';
  });
  h += hofCard("avg", "Member averages", avgContent);

  document.querySelector('[data-page="records"]').innerHTML = h;
});

function showAddRecord() {
  var form = document.getElementById("add-record-form");
  if (form) form.style.display = form.style.display === "none" ? "block" : "none";
}

function submitRecord() {
  var type = document.getElementById("rec-type").value;
  var player = document.getElementById("rec-player").value;
  var distance = document.getElementById("rec-distance").value;
  var club = document.getElementById("rec-club").value;
  var course = document.getElementById("rec-course").value;
  var rec = PB.getRecords();
  var entry = { by: player, distance: distance, club: club, course: course, date: new Date().toISOString().split("T")[0] };

  if (type === "longestDrive") {
    if (!rec.longestDrive || parseInt(distance) > parseInt(rec.longestDrive.distance)) {
      PB.setRecord("longestDrive", entry);
      Router.toast("New longest drive record!");
    } else Router.toast("Didn't beat the record (" + rec.longestDrive.distance + " yds)");
  } else if (type === "longestPutt") {
    if (!rec.longestPutt || parseInt(distance) > parseInt(rec.longestPutt.distance)) {
      PB.setRecord("longestPutt", entry);
      Router.toast("New longest putt record!");
    } else Router.toast("Didn't beat the record (" + rec.longestPutt.distance + " ft)");
  } else if (type === "longestHoleOut") {
    if (!rec.longestHoleOut || parseInt(distance) > parseInt(rec.longestHoleOut.distance)) {
      PB.setRecord("longestHoleOut", entry);
      Router.toast("New longest hole out record!");
    } else Router.toast("Didn't beat the record (" + rec.longestHoleOut.distance + " yds)");
  } else if (type === "chipIn") {
    PB.setRecord("chipIns", (rec.chipIns || 0) + 1);
    Router.toast("Chip-in logged! Total: " + ((rec.chipIns || 0) + 1));
  } else if (type === "holeInOne") {
    if (!rec.holeInOnes) rec.holeInOnes = [];
    rec.holeInOnes.push(entry);
    PB.setRecord("holeInOnes", rec.holeInOnes);
    Router.toast("Hole in one logged");
  }
  Router.go("records");
}


/* ================================================
   PHASE 5 PAGES: Tee Times, Calendar, DMs, Chat, Invite
   ================================================ */

// ========== TEE TIMES ==========
var liveTeeTimes = [];

function startTeeTimeListener() {
  if (!db) return;
  db.collection("teetimes").orderBy("date","asc").onSnapshot(function(snap) {
    liveTeeTimes = [];
    snap.forEach(function(doc) { liveTeeTimes.push(Object.assign({_id:doc.id}, doc.data())); });
    if (Router.getPage() === "teetimes") Router.go("teetimes");
  });
}

Router.register("teetimes", function() {
  var now = new Date().toISOString().split("T")[0];
  var threeDaysAgo = new Date(Date.now() - 3 * 86400000).toISOString().split("T")[0];
  
  var upcoming = liveTeeTimes.filter(function(t) { return t.date >= now && t.status !== "cancelled"; });
  var past = liveTeeTimes.filter(function(t) { return (t.date < now || t.status === "completed") && t.status !== "cancelled"; }).slice(0,5);
  var recentlyCancelled = liveTeeTimes.filter(function(t) { 
    return t.status === "cancelled" && t.cancelledAt && t.cancelledAt >= threeDaysAgo;
  });

  var h = '<div class="sh"><h2>Tee Times</h2><button class="btn-sm green" onclick="Router.go(\'tee-create\')">+ Post</button></div>';

  if (!upcoming.length) {
    h += '<div class="section"><div class="card"><div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="28" height="28" style="color:var(--muted)"><path d="M12 22V2"/><path d="M12 2l8 4-8 4"/><circle cx="12" cy="22" r="2"/></svg></div><div class="empty-text">No upcoming tee times. Be the first to post one!</div></div></div></div>';
  }
  upcoming.forEach(function(t) { h += '<div class="section">' + renderTeeCard(t) + '</div>'; });

  if (past.length) {
    h += '<div class="section"><div class="sec-head"><span class="sec-title">Past</span></div>';
    past.forEach(function(t) { h += renderTeeCard(t, true); });
    h += '</div>';
  }
  
  if (recentlyCancelled.length) {
    h += '<div class="section"><div class="sec-head"><span class="sec-title" style="color:var(--muted)">Recently Cancelled</span></div>';
    recentlyCancelled.forEach(function(t) { h += renderTeeCard(t, true, true); });
    h += '</div>';
  }
  
  document.querySelector('[data-page="teetimes"]').innerHTML = h;
});

function renderTeeCard(t, isPast, isCancelled) {
  var course = PB.getCourse(t.courseId) || PB.getCourseByName(t.courseName);
  var responses = t.responses || {};
  var acceptedIds = Object.keys(responses).filter(function(k) { return responses[k] === "accepted"; });
  var spotsLeft = (t.spots || 4) - acceptedIds.length;
  var myResponse = currentUser ? responses[currentUser.uid] : null;

  var h = '<div class="tee-card' + (t.official ? " official" : "") + '"' + (isCancelled ? ' style="opacity:.5"' : '') + '>';
  if (t.official) h += '<div class="tee-official-tag">Official Round</div>';
  if (isCancelled) h += '<div style="position:absolute;top:12px;right:12px;font-size:9px;font-weight:700;color:var(--red);background:rgba(229,57,53,.1);padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px">Cancelled</div>';
  h += '<div class="tee-course">' + escHtml(course ? course.name : t.courseName || "TBD") + '</div>';

  var dateObj = new Date(t.date + "T12:00:00");
  var days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var mons = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  h += '<div class="tee-datetime">' + days[dateObj.getDay()] + ", " + mons[dateObj.getMonth()] + " " + dateObj.getDate() + " · " + (t.time||"TBD") + '</div>';
  if (t.message) h += '<div class="tee-message">"' + escHtml(t.message) + '"</div>';

  var host = PB.getPlayer(t.createdBy);
  h += '<div class="tee-host">Posted by ' + escHtml(host ? host.name : t.createdByName || "Unknown") + ' · ';
  if (isCancelled) {
    h += '<span style="color:var(--red);font-size:10px">Cancelled</span></div>';
  } else {
    h += '<span class="tee-status ' + (t.status||"open") + '">' + (spotsLeft > 0 ? spotsLeft + " spot" + (spotsLeft>1?"s":"") + " open" : "FULL") + '</span></div>';
  }

  h += '<div class="tee-spots">';
  for (var i = 0; i < (t.spots||4); i++) {
    if (i < acceptedIds.length) {
      var m = PB.getPlayer(acceptedIds[i]);
      h += '<div class="tee-spot filled">' + (m ? Router.getAvatar(m) : "✓") + '</div>';
    } else h += '<div class="tee-spot open">+</div>';
  }
  h += '</div>';

  if (!isPast && !isCancelled && t.status !== "cancelled" && t.status !== "completed") {
    h += '<div class="tee-rsvp-row">';
    h += '<button class="tee-rsvp-btn accept' + (myResponse==="accepted"?" selected":"") + '" onclick="rsvpTeeTime(\'' + t._id + '\',\'accepted\')">✓ In</button>';
    h += '<button class="tee-rsvp-btn maybe' + (myResponse==="maybe"?" selected":"") + '" onclick="rsvpTeeTime(\'' + t._id + '\',\'maybe\')">? Maybe</button>';
    h += '<button class="tee-rsvp-btn decline' + (myResponse==="declined"?" selected":"") + '" onclick="rsvpTeeTime(\'' + t._id + '\',\'declined\')">✗ Out</button>';
    h += '</div>';

    var maybeIds = Object.keys(responses).filter(function(k){return responses[k]==="maybe"});
    var declinedIds = Object.keys(responses).filter(function(k){return responses[k]==="declined"});
    if (maybeIds.length || declinedIds.length) {
      h += '<div style="margin-top:8px;font-size:10px;color:var(--muted)">';
      if (maybeIds.length) h += 'Maybe: ' + maybeIds.map(function(id){var m=PB.getPlayer(id);return m?m.name:"?";}).join(", ");
      if (declinedIds.length) { if (maybeIds.length) h += ' · '; h += 'Out: ' + declinedIds.map(function(id){var m=PB.getPlayer(id);return m?m.name:"?";}).join(", "); }
      h += '</div>';
    }

    if (currentUser && (t.createdBy === currentUser.uid || (currentProfile && currentProfile.role === "commissioner"))) {
      h += '<div style="margin-top:10px;text-align:right">';
      h += '<button style="background:none;border:none;color:var(--muted);font-size:10px;text-decoration:underline;cursor:pointer" onclick="cancelTeeTime(\'' + t._id + '\')">Cancel</button>';
      if (currentProfile && currentProfile.role === "commissioner" && !t.official) {
        h += ' <button style="background:none;border:none;color:var(--gold);font-size:10px;text-decoration:underline;cursor:pointer;margin-left:8px" onclick="markOfficial(\'' + t._id + '\')">Mark Official</button>';
      }
      h += '</div>';
    }
  }
  
  // Commissioner-only hard delete for cancelled or past tee times
  if ((isCancelled || isPast) && currentProfile && currentProfile.role === "commissioner") {
    h += '<div style="margin-top:8px;text-align:right">';
    h += '<button style="background:none;border:none;color:var(--red);font-size:10px;text-decoration:underline;cursor:pointer;opacity:.7" onclick="deleteTeeTime(\'' + t._id + '\')">Delete permanently</button>';
    h += '</div>';
  }
  
  h += '</div>';
  return h;
}

Router.register("tee-create", function(params) {
  var courses = PB.getCourses();
  var prefillDate = (params && params.date) ? params.date : "";
  var h = '<div class="sh"><h2>Post Tee Time</h2><button class="back" onclick="Router.go(\'teetimes\')">← Back</button></div>';
  h += '<div class="form-section">';
  h += '<div class="ff"><label class="ff-label">Course</label><select id="teeCourse" class="ff-input">';
  courses.forEach(function(c) { h += '<option value="' + c.id + '">' + c.name + '</option>'; });
  h += '</select></div>';
  h += '<div class="ff"><label class="ff-label">Date</label><input type="date" id="teeDate" class="ff-input" min="' + new Date().toISOString().split("T")[0] + '" value="' + prefillDate + '"></div>';
  h += '<div class="ff"><label class="ff-label">Tee Time</label><input type="time" id="teeTime" class="ff-input"></div>';
  h += '<div class="ff"><label class="ff-label">Spots</label><select id="teeSpots" class="ff-input"><option value="2">2</option><option value="3">3</option><option value="4" selected>4</option><option value="5">5+</option></select></div>';
  h += '<div class="ff"><label class="ff-label">Message (optional)</label><input type="text" id="teeMessage" class="ff-input" placeholder="Let\'s get after it" maxlength="100"></div>';
  h += '<button class="btn full green" onclick="submitTeeTime()">Post Tee Time</button>';

function submitTeeTime() {
  var courseId = document.getElementById("teeCourse").value;
  var date = document.getElementById("teeDate").value;
  var time = document.getElementById("teeTime").value;
  var spots = parseInt(document.getElementById("teeSpots").value);
  var message = document.getElementById("teeMessage").value.trim();
  if (!date) { Router.toast("Pick a date"); return; }
  if (!time) { Router.toast("Pick a tee time"); return; }
  var course = PB.getCourse(courseId);
  var timeParts = time.split(":"); var hr = parseInt(timeParts[0]); var ampm = hr >= 12 ? "PM" : "AM";
  if (hr > 12) hr -= 12; if (hr === 0) hr = 12;
  var timeStr = hr + ":" + timeParts[1] + " " + ampm;
  var tee = { courseId:courseId, courseName:course?course.name:courseId, date:date, time:timeStr, spots:spots, message:message, status:"open", official:false, createdBy:currentUser?currentUser.uid:"anon", createdByName:currentProfile?(currentProfile.name||currentProfile.username):"Anon", responses:{}, createdAt:fsTimestamp() };
  if (currentUser) tee.responses[currentUser.uid] = "accepted";
  db.collection("teetimes").add(tee).then(function() { Router.toast("Tee time posted!"); Router.go("teetimes"); }).catch(function(e) { Router.toast("Failed: " + e.message); });
}

function rsvpTeeTime(teeId, response) {
  if (!currentUser || !db) return;
  var tee = liveTeeTimes.find(function(t){return t._id===teeId});
  var wasAccepted = tee && tee.responses && tee.responses[currentUser.uid] === "accepted";
  var field = "responses." + currentUser.uid; var update = {}; update[field] = response;
  db.collection("teetimes").doc(teeId).update(update).then(function() {
    Router.toast(response === "accepted" ? "You're in!" : response === "maybe" ? "Marked maybe" : "You're out");
    if (wasAccepted && response !== "accepted" && tee) {
      var others = Object.keys(tee.responses).filter(function(k){return tee.responses[k]==="accepted"&&k!==currentUser.uid});
      var name = currentProfile ? (currentProfile.name||currentProfile.username) : "A member";
      others.forEach(function(uid) { sendNotification(uid, { type:"tee_withdrawal", title:"Player Withdrew", message:name + " withdrew from " + (tee.courseName||"tee time") }); });
    }
  });
}

function cancelTeeTime(teeId) {
  if (!confirm("Cancel this tee time?")) return;
  var tee = liveTeeTimes.find(function(t){return t._id===teeId});
  db.collection("teetimes").doc(teeId).update({status:"cancelled", cancelledAt: new Date().toISOString().split("T")[0]}).then(function() {
    Router.toast("Cancelled");
    if (tee && tee.responses) {
      var ids = Object.keys(tee.responses).filter(function(k){return(tee.responses[k]==="accepted"||tee.responses[k]==="maybe")&&k!==(currentUser?currentUser.uid:"")});
      ids.forEach(function(uid) { sendNotification(uid, { type:"tee_cancelled", title:"Tee Time Cancelled", message:(tee.courseName||"Tee time") + " on " + tee.date + " was cancelled" }); });
    }
  });
}

function deleteTeeTime(teeId) {
  if (!currentProfile || currentProfile.role !== "commissioner") { Router.toast("Commissioner only"); return; }
  if (!confirm("Permanently delete this tee time? This cannot be undone.")) return;
  db.collection("teetimes").doc(teeId).delete().then(function() {
    Router.toast("Deleted");
  }).catch(function() { Router.toast("Failed to delete"); });
}

function markOfficial(teeId) { db.collection("teetimes").doc(teeId).update({official:true}).then(function(){Router.toast("Marked official")}); }

var calMonth = new Date().getMonth(), calYear = new Date().getFullYear(), calSelectedDate = null;
var liveEvents = [];

function startEventListener() {

  h += '<div class="cal-month-title">' + monthNames[calMonth] + ' ' + calYear + '</div>';
  h += '<button class="cal-nav-btn" onclick="calNext()">›</button></div>';

  PB.getTrips().forEach(function(trip) {
    if (trip.startDate) { var sd = new Date(trip.startDate+"T12:00:00"); var ed = trip.endDate ? new Date(trip.endDate+"T12:00:00") : sd;
      for (var d = new Date(sd); d <= ed; d.setDate(d.getDate()+1)) { var ds = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); if(!eventMap[ds])eventMap[ds]=[]; eventMap[ds].push({type:"trip",title:trip.name,time:""}); }
    }
  });
  liveEvents.forEach(function(ev) { var d=ev.date; if(!eventMap[d])eventMap[d]=[]; eventMap[d].push({type:ev.type||"social",title:ev.title,time:ev.time||""}); });

  h += '<div class="cal-grid">';
  for (var i=0;i<firstDay;i++) h += '<div class="cal-day empty"></div>';
  for (var d=1;d<=daysInMonth;d++) {
    var dateStr = calYear+"-"+String(calMonth+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    var evts = eventMap[dateStr]||[];

    if (evts.length) { if(evts.some(function(e){return e.type==="trip"})) cls+=" has-trip"; else if(evts.some(function(e){return e.type==="tee"})) cls+=" has-tee"; else cls+=" has-event"; }
    h += '<div class="'+cls+'" onclick="selectCalDay(\''+dateStr+'\')">'+d+'</div>';

  h += '</div>';

  if (calSelectedDate && eventMap[calSelectedDate]) {
    h += '<div style="padding:12px 16px">';

      h += '<div class="cal-event-item"><div class="cal-event-dot '+ev.type+'"></div><div><div class="cal-event-title">'+escHtml(ev.title)+'</div>';

      h += '</div></div>';
    });
    h += '</div>';
  }

  h += '<div class="section"><button class="btn full green" onclick="Router.go(\'tee-create\')">Post a Tee Time</button></div>';
  document.querySelector('[data-page="calendar"]').innerHTML = h;
});

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}calSelectedDate=null;Router.go("calendar");}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}calSelectedDate=null;Router.go("calendar");}
function selectCalDay(ds){calSelectedDate=(calSelectedDate===ds)?null:ds;Router.go("calendar");}

var clubCalOpen = false;
var clubCalSelectedDate = null;

function toggleClubhouseCal() {
  clubCalOpen = !clubCalOpen;
  var el = document.getElementById("clubhouseCal");
  var btn = document.getElementById("calToggleBtn");
  if (el) {
    el.style.display = clubCalOpen ? "block" : "none";
  }
  if (btn) {
    btn.innerHTML = clubCalOpen ? "✕ Close" : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14" style="vertical-align:middle"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg> Calendar';
  }
}

function renderClubCalGrid(year, month, todayStr, events) {
  var firstDay = new Date(year, month, 1).getDay();
  var daysInMonth = new Date(year, month + 1, 0).getDate();
  
  // Build event dates set
  var eventDates = {};
  if (events) events.forEach(function(e) { eventDates[e.date] = e; });
  liveTeeTimes.forEach(function(t) { if (t.status !== "cancelled") eventDates[t.date] = {type:"tee",title:t.courseName,time:t.time}; });
  PB.getTrips().forEach(function(trip) {
    if (trip.startDate) {
      var sd = new Date(trip.startDate + "T12:00:00");
      var ed = trip.endDate ? new Date(trip.endDate + "T12:00:00") : sd;
      for (var dt = new Date(sd); dt <= ed; dt.setDate(dt.getDate() + 1)) {
        var ds = dt.getFullYear() + "-" + String(dt.getMonth()+1).padStart(2,"0") + "-" + String(dt.getDate()).padStart(2,"0");
        eventDates[ds] = {type:"trip",title:trip.name,time:""};
      }
    }
  });
  
  var h = '';
  for (var i = 0; i < firstDay; i++) h += '<div style="padding:8px;font-size:12px"></div>';
  for (var d = 1; d <= daysInMonth; d++) {
    var dateStr = year + "-" + String(month + 1).padStart(2,"0") + "-" + String(d).padStart(2,"0");
    var isToday = dateStr === todayStr;
    var isSelected = dateStr === clubCalSelectedDate;
    var hasEvent = eventDates[dateStr];
    var bg = isSelected ? "var(--gold)" : isToday ? "rgba(201,168,76,.15)" : "transparent";
    var color = isSelected ? "var(--bg)" : isToday ? "var(--gold)" : "var(--cream)";
    var dotHtml = hasEvent ? '<div style="width:4px;height:4px;border-radius:50%;background:' + (hasEvent.type === "trip" ? "var(--gold)" : "var(--birdie)") + ';margin:1px auto 0"></div>' : '';
    h += '<div onclick="selectClubCalDay(\'' + dateStr + '\')" style="padding:6px 0;font-size:12px;font-weight:' + (isToday ? "700" : "400") + ';color:' + color + ';background:' + bg + ';border-radius:6px;cursor:pointer;line-height:1">' + d + dotHtml + '</div>';
  }
  return h;
}

function selectClubCalDay(dateStr) {
  clubCalSelectedDate = (clubCalSelectedDate === dateStr) ? null : dateStr;
  refreshClubCal();
}

function clubCalPrev() {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  clubCalSelectedDate = null;
  refreshClubCal();
}

function clubCalNext() {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  clubCalSelectedDate = null;
  refreshClubCal();
}

      if (dayEvents.length) {
        dayEvents.forEach(function(ev) {
          var dotColor = ev.type === "trip" ? "var(--gold)" : "var(--birdie)";
          eh += '<div style="display:flex;align-items:center;gap:8px;padding:6px 0"><div style="width:6px;height:6px;border-radius:50%;background:' + dotColor + ';flex-shrink:0"></div>';
          eh += '<div><div style="font-size:12px;font-weight:600;color:var(--cream)">' + escHtml(ev.title) + '</div>';

      eh += '<button class="btn-sm green" style="flex:1;font-size:10px" onclick="Router.go(\'tee-create\',{date:\'' + clubCalSelectedDate + '\'})">+ Tee Time</button>';
      eh += '</div>';
      
      eventsEl.innerHTML = eh;
    } else {
      eventsEl.innerHTML = '';
    }
  }
}

function renderChatMessages(messages) {
  if (!messages.length) return '<div class="card"><div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="28" height="28" style="color:var(--muted)"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div><div class="empty-text">No messages yet. Start the trash talk.</div></div></div>';
  
  var ch = '';
  messages.forEach(function(msg) {
    var m = PB.getPlayer(msg.authorId);
    var mLvl = m ? PB.getPlayerLevel(m.id) : null;
    var likes = msg.likes || [];
    var likeCount = likes.length;
    var iLiked = currentUser && likes.indexOf(currentUser.uid) !== -1;
    var comments = msg.comments || [];
    var isCommissioner = currentProfile && currentProfile.role === "commissioner";
    var isMine = currentUser && msg.authorId === currentUser.uid;
    
    ch += '<div class="card" style="margin-bottom:6px"><div style="padding:10px 14px">';
    // Header
    ch += '<div style="display:flex;gap:10px">';
    ch += '<div class="c-av">' + (m ? Router.getAvatar(m) : "⛳") + '</div>';
    ch += '<div style="flex:1"><div class="chat-author">' + escHtml(msg.authorName||"Anon") + (mLvl ? ' <span style="font-size:8px;color:var(--gold);font-weight:600">LV' + mLvl.level + '</span>' : '') + '</div>';
    ch += '<div class="chat-text">' + escHtml(msg.text) + '</div>';
    if (msg.createdAt && msg.createdAt.toDate) ch += '<div class="chat-time">' + msg.createdAt.toDate().toLocaleDateString() + '</div>';
    ch += '</div></div>';
    
    // Like + Comment bar
    ch += '<div style="display:flex;gap:14px;margin-top:8px;padding-top:6px;border-top:1px solid var(--border)">';
    ch += '<span style="font-size:11px;cursor:pointer;color:' + (iLiked ? 'var(--gold)' : 'var(--muted)') + ';padding:4px 0" onclick="event.stopPropagation();toggleLike(\'' + msg._docId + '\')">' + (iLiked ? '♥' : '♡') + ' ' + (likeCount || '') + '</span>';
    ch += '<span style="font-size:11px;cursor:pointer;color:var(--muted);padding:4px 0" onclick="event.stopPropagation();showCommentInput(\'' + msg._docId + '\')">💬 ' + (comments.length || '') + '</span>';
    if (isCommissioner || isMine) {
      ch += '<span id="del-' + msg._docId + '" style="font-size:11px;cursor:pointer;color:var(--muted2);margin-left:auto;padding:4px 0" onclick="event.stopPropagation();confirmDelete(this,\'' + msg._docId + '\')">✕</span>';
    }
    ch += '</div>';
    
    // Comments
    if (comments.length) {
      ch += '<div style="margin-top:6px;padding-top:4px">';
      comments.forEach(function(c, ci) {
        var canDeleteComment = (currentUser && c.uid === currentUser.uid) || isCommissioner;
        ch += '<div style="display:flex;gap:6px;padding:4px 0;font-size:11px;align-items:flex-start">';
        ch += '<span style="color:var(--gold);font-weight:600;flex-shrink:0">' + escHtml(c.name||"Anon") + '</span>';
        ch += '<span style="color:var(--cream);flex:1">' + escHtml(c.text) + '</span>';
        if (canDeleteComment) {
          ch += '<span style="color:var(--muted2);cursor:pointer;font-size:10px;flex-shrink:0;padding:2px 4px" onclick="event.stopPropagation();confirmDeleteComment(this,\'' + msg._docId + '\',' + ci + ')">✕</span>';
        }
        ch += '</div>';
      });
      ch += '</div>';
    }
    
    // Comment input area (hidden by default)
    ch += '<div id="comment-' + msg._docId + '" class="hidden" style="margin-top:6px;display:flex;gap:6px">';
    ch += '<input type="text" class="ff-input" style="flex:1;padding:6px 10px;font-size:11px" id="commentText-' + msg._docId + '" placeholder="Add a comment..." onkeydown="if(event.key===\'Enter\')submitComment(\'' + msg._docId + '\')">';
    ch += '<button class="btn-sm green" style="font-size:10px;padding:6px 10px" onclick="submitComment(\'' + msg._docId + '\')">Post</button>';
    ch += '</div>';
    
    ch += '</div></div>';
  });
  return ch;
}

function toggleLike(docId) {
  if (!db || !currentUser) { Router.toast("Sign in to like"); return; }
  var uid = currentUser.uid;
  
  // Optimistic UI update — update local data immediately
  var localMsg = liveChat.find(function(m) { return m._docId === docId; });
  if (localMsg) {
    if (!localMsg.likes) localMsg.likes = [];
    var localIdx = localMsg.likes.indexOf(uid);
    if (localIdx !== -1) localMsg.likes.splice(localIdx, 1);
    else localMsg.likes.push(uid);
    // Re-render feed immediately
    var feed = document.getElementById("chatFeed");
    if (feed) feed.innerHTML = renderChatMessages(liveChat);
  }
  
  // Then sync to Firestore
  db.collection("chat").doc(docId).get().then(function(doc) {
    if (!doc.exists) return;
    var data = doc.data();
    var likes = data.likes || [];
    var idx = likes.indexOf(uid);
    var isLiking = idx === -1;
    if (idx !== -1) { likes.splice(idx, 1); } else { likes.push(uid); }
    db.collection("chat").doc(docId).update({ likes: likes }).then(function() {
      if (isLiking && data.authorId && data.authorId !== uid && data.authorId !== "system") {
        var myName = currentProfile ? PB.getDisplayName(currentProfile) : "Someone";
        sendNotification(data.authorId, {
          type: "feed_like",
          title: "New Like",
          message: myName + " liked your post",
          linkPage: "chat"
        });
      }
    });
  });
}

function showCommentInput(docId) {
  var el = document.getElementById("comment-" + docId);
  if (el) { el.classList.toggle("hidden"); el.style.display = el.classList.contains("hidden") ? "none" : "flex"; }
  var input = document.getElementById("commentText-" + docId);
  if (input) input.focus();
}

function submitComment(docId) {
  if (!db || !currentUser) { Router.toast("Sign in to comment"); return; }
  var input = document.getElementById("commentText-" + docId);
  var text = input ? input.value.trim() : "";
  if (!text) return;
  
  var name = currentProfile ? PB.getDisplayName(currentProfile) : "Anon";
  
  db.collection("chat").doc(docId).get().then(function(doc) {
    if (!doc.exists) return;
    var data = doc.data();
    var comments = data.comments || [];
    comments.push({ uid: currentUser.uid, name: name, text: text, at: new Date().toISOString() });
    return db.collection("chat").doc(docId).update({ comments: comments }).then(function() {
      // Notify post author
      if (data.authorId && data.authorId !== currentUser.uid && data.authorId !== "system") {
        sendNotification(data.authorId, {
          type: "feed_comment",
          title: "New Comment",
          message: name + " commented: \"" + text.substring(0, 40) + (text.length > 40 ? "..." : "") + "\"",
          linkPage: "chat"
        });
      }
      // Also notify other commenters (not the author, not yourself)
      var notified = {};
      notified[currentUser.uid] = true;
      if (data.authorId) notified[data.authorId] = true;
      comments.forEach(function(c) {
        if (c.uid && !notified[c.uid]) {
          notified[c.uid] = true;
          sendNotification(c.uid, {
            type: "feed_reply",
            title: "New Reply",
            message: name + " also commented on a post you commented on",
            linkPage: "chat"
          });
        }
      });
    });
  }).then(function() {
    if (input) input.value = "";
  });
}

function confirmDelete(el, docId) {
  if (el.dataset.armed === "true") {
    deleteChat(docId);
    return;
  }
  el.dataset.armed = "true";
  el.innerHTML = '<svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="#e53935" stroke-width="1.5"><path d="M2 4h12M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1M6 7v5M10 7v5"/><path d="M3 4l1 10a1 1 0 001 1h6a1 1 0 001-1l1-10"/></svg>';
  el.style.color = "#e53935";
  // Reset after 3 seconds if not tapped
  setTimeout(function() { 
    if (el) { el.dataset.armed = "false"; el.textContent = "✕"; el.style.color = "var(--muted2)"; }
  }, 3000);
}

function confirmDeleteComment(el, docId, commentIndex) {
  if (el.dataset.armed === "true") {
    deleteComment(docId, commentIndex);
    return;
  }
  el.dataset.armed = "true";
  el.innerHTML = '<svg viewBox="0 0 16 16" width="10" height="10" fill="none" stroke="#e53935" stroke-width="1.5"><path d="M2 4h12M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1M6 7v5M10 7v5"/><path d="M3 4l1 10a1 1 0 001 1h6a1 1 0 001-1l1-10"/></svg>';
  el.style.color = "#e53935";
  setTimeout(function() {
    if (el) { el.dataset.armed = "false"; el.textContent = "✕"; el.style.color = "var(--muted2)"; }
  }, 3000);
}

function deleteComment(docId, commentIndex) {
  if (!db || !currentUser) return;
  db.collection("chat").doc(docId).get().then(function(doc) {
    if (!doc.exists) return;
    var data = doc.data();
    var comments = data.comments || [];
    if (commentIndex >= 0 && commentIndex < comments.length) {
      comments.splice(commentIndex, 1);
      db.collection("chat").doc(docId).update({ comments: comments });
    }
  });
}

function deleteChat(docId) {
  if (!db) return;
  if (!confirm("Delete this post?")) return;
  db.collection("chat").doc(docId).delete().then(function() { Router.toast("Deleted"); });
}

function sendChat() {
  var input = document.getElementById("chatInput"); var text = input.value.trim();
  if (!text || !db) return;
  db.collection("chat").add({ id:genId(), text:text, authorId:currentUser?currentUser.uid:"anon", authorName:currentProfile?PB.getDisplayName(currentProfile):"Anon", createdAt:fsTimestamp() })

}

var dmConversations = {}, activeDmPartner = null, dmListenerUnsub = null;

function getDmConvoId(a,b){return [a,b].sort().join("_")}
function formatDmTime(date){var now=new Date(),diff=now-date;if(diff<60000)return "now";if(diff<3600000)return Math.floor(diff/60000)+"m";if(diff<86400000)return Math.floor(diff/3600000)+"h";return(date.getMonth()+1)+"/"+date.getDate();}

Router.register("dms", function() {
  var h = '<div class="sh"><h2>Messages</h2><button class="back" onclick="Router.go(\'home\')">← Home</button></div>';
  
  if (!currentUser) {
    h += '<div class="section"><div class="empty"><div class="empty-text">Sign in to use messages</div></div></div>';
    document.querySelector('[data-page="dms"]').innerHTML = h;
    return;
  }
  
  h += '<div id="dmMemberList">' + skeletonMemberRow() + skeletonMemberRow() + skeletonMemberRow() + '</div>';
  document.querySelector('[data-page="dms"]').innerHTML = h;
  
  // Load members from Firebase + local
  var renderDmList = function(members) {
    var myUid = currentUser.uid;
    var myClaimedFrom = currentProfile ? currentProfile.claimedFrom : null;
    var filtered = members.filter(function(m) { 
      if (m.role === "removed") return false;
      if (m.id === myUid) return false;
      if (myClaimedFrom && m.id === myClaimedFrom) return false;
      if (m.claimedFrom && m.claimedFrom === myClaimedFrom && myClaimedFrom) return false;
      return true;
    });
    // Deduplicate — if a member appears as both local and Firebase, keep Firebase version
    var seen = {};
    filtered = filtered.filter(function(m) {
      var key = m.claimedFrom || m.id;
      if (seen[key]) return false;
      seen[key] = true;
      return true;
    });
    var dh = '';
    if (!filtered.length) {
      dh = '<div class="section"><div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="28" height="28" style="color:var(--muted)"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div><div class="empty-text">No other members yet</div></div></div>';
    }
    filtered.forEach(function(m) {
      var convoId = getDmConvoId(currentUser.uid, m.id);
      var last = dmConversations[convoId];
      dh += '<div class="dm-list-item" onclick="Router.go(\'dm-thread\',{partner:\'' + m.id + '\'})">';
      dh += '<div class="m-av">' + Router.getAvatar(m) + '</div>';
      dh += '<div class="m-info"><div class="m-name">' + escHtml(m.name || m.username || m.id) + '</div>';
      dh += '<div style="font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + (last ? escHtml(last.text) : "Start a conversation") + '</div>';
      dh += '</div></div>';
    });
    var el = document.getElementById("dmMemberList");
    if (el) el.innerHTML = dh;
    
    // Load previews
    if (db) {
      filtered.forEach(function(m) {
        var cid = getDmConvoId(currentUser.uid, m.id);
        db.collection("dms").doc(cid).collection("messages").orderBy("createdAt","desc").limit(1).get().then(function(snap) {
          if (!snap.empty) { dmConversations[cid] = { text: snap.docs[0].data().text }; if (Router.getPage()==="dms") renderDmList(members); }
        });
      });
    }
  };
  
  // Try Firebase first, fall back to local
  if (db) {
    db.collection("members").get().then(function(snap) {
      var members = [];
      snap.forEach(function(doc) { members.push(doc.data()); });
      // Merge with local — skip locals that have been claimed by a Firebase account
      var localPlayers = PB.getPlayers();
      var fbIds = members.map(function(m) { return m.id; });
      var fbClaimedFromIds = members.map(function(m) { return m.claimedFrom; }).filter(Boolean);
      localPlayers.forEach(function(lp) { 
        if (fbIds.indexOf(lp.id) === -1 && fbClaimedFromIds.indexOf(lp.id) === -1) members.push(lp); 
      });
      renderDmList(members);
    }).catch(function() { renderDmList(PB.getPlayers()); });
  } else {
    renderDmList(PB.getPlayers());
  }
});

var INVITE_EXPIRY_DAYS = 7;

function createInviteDoc(code) {
  var expiresAt = new Date();
  expiresAt.setDate(expiresAt.getDate() + INVITE_EXPIRY_DAYS);
  return {
    code: code,
    createdBy: currentUser.uid,
    createdByName: PB.getDisplayName(currentProfile),
    usedBy: null,
    status: "active",
    createdAt: fsTimestamp(),
    expiresAt: firebase.firestore.Timestamp.fromDate(expiresAt)
  };
}

function isInviteExpired(invite) {
  if (!invite.expiresAt) return false;
  var exp = invite.expiresAt.toDate ? invite.expiresAt.toDate() : new Date(invite.expiresAt);
  return new Date() > exp;
}

function generateInvite() {
  if (!db || !currentUser || !currentProfile) { Router.toast("Not ready"); return; }
  var isComm = currentProfile.role === "commissioner";
  if (!isComm && (currentProfile.invitesUsed||0) >= (currentProfile.maxInvites||3)) { Router.toast("No invites remaining"); return; }
  var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; var code = "PB-";
  for (var i=0;i<8;i++) code += chars.charAt(Math.floor(Math.random()*chars.length));
  db.collection("invites").doc(code).set(createInviteDoc(code))
    .then(function() {
      db.collection("members").doc(currentUser.uid).update({invitesUsed:firebase.firestore.FieldValue.increment(1)}); currentProfile.invitesUsed = (currentProfile.invitesUsed||0)+1;
      document.getElementById("generatedInvite").innerHTML = '<div class="invite-code"><div class="code">' + code + '</div><div class="hint">Share this with the new member · Expires in ' + INVITE_EXPIRY_DAYS + ' days</div></div>';
      Router.toast("Invite created!");
    });
}

function loadAdminMemberList() {
  if (!db) return;
  db.collection("members").get().then(function(snap) {
    var members = []; snap.forEach(function(doc) { members.push(doc.data()); });
    var localPlayers = PB.getPlayers();
    var allMembers = members.length ? members : localPlayers;

    var h = '';
    allMembers.forEach(function(m) {
      var used = m.invitesUsed || 0;
      var max = m.maxInvites || 3;
      var isComm = m.role === "commissioner";
      var isSuspended = m.role === "suspended";
      var isRemoved = m.role === "removed";

      var statusColor = isSuspended ? "var(--red)" : isRemoved ? "var(--muted2)" : isComm ? "var(--gold)" : "var(--birdie)";
      var statusText = isSuspended ? "SUSPENDED" : isRemoved ? "REMOVED" : isComm ? "COMMISSIONER" : "ACTIVE";

      h += '<div class="card"><div class="card-body">';
      // Top row — name and status
      h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
      h += '<div style="font-size:13px;font-weight:600">' + escHtml(m.name || m.username || m.id) + '</div>';
      h += '<span style="font-size:8px;font-weight:700;color:' + statusColor + ';background:' + statusColor + '15;padding:3px 8px;border-radius:4px;letter-spacing:.5px">' + statusText + '</span>';
      h += '</div>';

      // Invite controls (not for commissioner or removed)
      if (!isComm && !isRemoved) {
        h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
        h += '<div style="font-size:10px;color:var(--muted)">Invites: ' + used + ' used</div>';
        h += '<div style="display:flex;align-items:center;gap:6px">';
        h += '<button class="btn-sm outline" onclick="adjustInvites(\'' + m.id + '\',' + max + ',-1)" style="width:26px;padding:5px;font-size:12px">−</button>';
        h += '<span style="font-size:13px;font-weight:700;color:var(--gold);min-width:20px;text-align:center">' + max + '</span>';
        h += '<button class="btn-sm outline" onclick="adjustInvites(\'' + m.id + '\',' + max + ',1)" style="width:26px;padding:5px;font-size:12px">+</button>';
        h += '</div></div>';
      }

      // Suspension info
      if (isSuspended && m.suspendedUntil) {
        var until = m.suspendedUntil.toDate ? m.suspendedUntil.toDate() : new Date(m.suspendedUntil);
        h += '<div style="font-size:10px;color:var(--red);margin-bottom:8px">Suspended until ' + (until.getMonth()+1) + '/' + until.getDate() + '/' + until.getFullYear();
        if (m.suspendedReason) h += ' — ' + escHtml(m.suspendedReason);
        h += '</div>';
      }

      // Moderation buttons (not for self or other commissioners)
      if (!isComm && m.id !== (currentUser ? currentUser.uid : "")) {
        h += '<div style="display:flex;gap:6px;flex-wrap:wrap">';
        if (isSuspended) {
          h += '<button class="btn-sm green" style="font-size:9px" onclick="unsuspendMember(\'' + m.id + '\')">Unsuspend</button>';
        } else if (!isRemoved) {
          h += '<button class="btn-sm outline" style="font-size:9px" onclick="promptSuspend(\'' + m.id + '\',\'' + escHtml(m.name||m.id) + '\')">Suspend</button>';
        }
        if (!isRemoved) {
          h += '<button class="btn-sm" style="font-size:9px;background:rgba(212,96,78,.08);color:var(--red);border:1px solid rgba(212,96,78,.15)" onclick="removeMemberAdmin(\'' + m.id + '\')">Remove</button>';
        } else {
          h += '<button class="btn-sm green" style="font-size:9px" onclick="reinstateMember(\'' + m.id + '\')">Reinstate</button>';
        }
        h += '</div>';
      }

      h += '</div></div>';
    });

    document.getElementById("adminMemberList").innerHTML = h || '<div style="font-size:11px;color:var(--muted)">No members</div>';
  }).catch(function() {
    document.getElementById("adminMemberList").innerHTML = '<div style="font-size:11px;color:var(--muted)">Failed to load</div>';
  });
}

function adjustInvites(memberId, currentMax, delta) {
  if (!db) return;
  var newMax = Math.max(0, currentMax + delta);
  db.collection("members").doc(memberId).update({ maxInvites: newMax }).then(function() {
    Router.toast("Invite limit updated to " + newMax);
    loadAdminMemberList();
  }).catch(function() { Router.toast("Failed to update"); });
}

// ========== MODERATION ACTIONS ==========

function promptSuspend(memberId, memberName) {
  var days = prompt("Suspend " + memberName + " for how many days?", "7");
  if (!days) return;
  days = parseInt(days);
  if (isNaN(days) || days < 1) { Router.toast("Enter a valid number of days"); return; }
  var reason = prompt("Reason for suspension (visible to member):", "");
  suspendMember(memberId, days, reason);
}

function suspendMember(memberId, days, reason) {
  if (!db || !currentProfile || currentProfile.role !== "commissioner") return;
  var until = new Date();
  until.setDate(until.getDate() + days);

  db.collection("members").doc(memberId).update({
    role: "suspended",
    suspendedAt: fsTimestamp(),
    suspendedUntil: firebase.firestore.Timestamp.fromDate(until),
    suspendedBy: currentUser.uid,
    suspendedReason: reason || "Violation of Parbaughs rules"
  }).then(function() {
    // Notify the suspended member
    sendNotification(memberId, {
      type: "suspension",
      title: "Account Suspended",
      message: "Your account has been suspended for " + days + " days." + (reason ? " Reason: " + reason : "")
    });
    Router.toast("Member suspended for " + days + " days");
    loadAdminMemberList();
  }).catch(function() { Router.toast("Failed to suspend"); });
}

function unsuspendMember(memberId) {
  if (!db || !confirm("Unsuspend this member?")) return;
  db.collection("members").doc(memberId).update({
    role: "member",
    suspendedAt: null,
    suspendedUntil: null,
    suspendedBy: null,
    suspendedReason: null
  }).then(function() {
    sendNotification(memberId, {
      type: "unsuspension",
      title: "Suspension Lifted",
      message: "Your account has been reinstated. Welcome back."
    });
    Router.toast("Member unsuspended");
    loadAdminMemberList();
  });
}

function removeMemberAdmin(memberId) {
  if (!db) return;
  var member = PB.getPlayer(memberId);
  var name = member ? member.name : memberId;
  if (!confirm("Remove " + name + " from the Parbaughs? This will revoke their access.")) return;
  var reason = prompt("Reason (optional):", "");

  db.collection("members").doc(memberId).update({
    role: "removed",
    removedAt: fsTimestamp(),
    removedBy: currentUser.uid,
    removedReason: reason || ""
  }).then(function() {
    sendNotification(memberId, {
      type: "removal",
      title: "Account Removed",
      message: "Your membership has been revoked." + (reason ? " Reason: " + reason : "")
    });
    Router.toast(name + " removed");
    loadAdminMemberList();
  }).catch(function() { Router.toast("Failed to remove"); });
}

function reinstateMember(memberId) {
  if (!db || !confirm("Reinstate this member?")) return;
  db.collection("members").doc(memberId).update({
    role: "member",
    removedAt: null,
    removedBy: null,
    removedReason: null
  }).then(function() {
    sendNotification(memberId, {
      type: "reinstatement",
      title: "Welcome Back",
      message: "Your Parbaughs membership has been reinstated."
    });
    Router.toast("Member reinstated");
    loadAdminMemberList();
  });
}

function resolveReport(reportId) {
  if (!db) return;
  db.collection("reports").doc(reportId).update({ resolved: true, resolvedAt: fsTimestamp(), resolvedBy: currentUser.uid })
    .then(function() { Router.toast("Report dismissed"); loadAdminReports(); });
}

// ========== MEMBER REPORT SYSTEM (any member can report) ==========
function reportMember(memberId) {
  if (!db || !currentUser) { Router.toast("Sign in to report"); return; }
  if (memberId === currentUser.uid) { Router.toast("You can't report yourself"); return; }

  var reasons = ["Score falsification", "Vulgar/inappropriate messages", "Unsportsmanlike conduct", "Harassment", "Other"];
  var reasonIdx = prompt("Report reason:\n1. Score falsification\n2. Vulgar/inappropriate messages\n3. Unsportsmanlike conduct\n4. Harassment\n5. Other\n\nEnter number (1-5):");
  if (!reasonIdx) return;
  var reason = reasons[parseInt(reasonIdx) - 1] || "Other";
  var details = prompt("Additional details (optional):", "");

  db.collection("reports").add({
    reportedUser: memberId,
    reportedBy: currentUser.uid,
    reason: reason,
    details: details || "",
    resolved: false,
    createdAt: fsTimestamp()
  }).then(function() {
    // Notify commissioner
    var players = PB.getPlayers();
    var commissioner = players.find(function(p) { return p.role === "commissioner"; });
    if (commissioner) {
      var reported = PB.getPlayer(memberId);
      sendNotification(commissioner.id, {
        type: "report",
        title: "Member Report",
        message: (currentProfile.name||"A member") + " reported " + (reported ? reported.name : memberId) + " for " + reason
      });
    }
    Router.toast("Report submitted to the Commissioner");
  }).catch(function() { Router.toast("Failed to submit report"); });
}

function loadAdminInviteList() {
  if (!db) return;
  db.collection("invites").orderBy("createdAt", "desc").limit(50).get().then(function(snap) {
    var invites = []; snap.forEach(function(doc) { invites.push(doc.data()); });

    var h = '';
    if (!invites.length) { h = '<div style="font-size:11px;color:var(--muted)">No invites generated yet</div>'; }
    invites.forEach(function(inv) {
      var expired = isInviteExpired(inv);
      var statusColor = inv.status === "active" && !expired ? "var(--birdie)" : inv.status === "used" ? "var(--gold)" : "var(--red)";
      var statusText = expired && inv.status === "active" ? "EXPIRED" : (inv.status || "active").toUpperCase();

      h += '<div class="card"><div class="card-body">';
      h += '<div style="display:flex;justify-content:space-between;align-items:center">';
      h += '<span style="font-family:monospace;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:1px">' + inv.code + '</span>';
      h += '<span style="font-size:9px;font-weight:600;color:' + statusColor + '">' + statusText + '</span>';
      h += '</div>';
      h += '<div style="font-size:10px;color:var(--muted);margin-top:4px">By ' + escHtml(inv.createdByName || "Unknown");
      if (inv.usedBy) h += ' · Used';
      if (inv.expiresAt) {
        var exp = inv.expiresAt.toDate ? inv.expiresAt.toDate() : new Date(inv.expiresAt);
        h += ' · Exp ' + (exp.getMonth()+1) + '/' + exp.getDate();
      }
      h += '</div>';
      // Revoke button for active invites
      if (inv.status === "active" && !expired) {
        h += '<button class="btn-sm outline" style="margin-top:6px;font-size:9px;padding:4px 10px" onclick="revokeInviteAdmin(\'' + inv.code + '\')">Revoke</button>';
      }
      h += '</div></div>';
    });

    document.getElementById("adminInviteList").innerHTML = h;
  });
}

function revokeInviteAdmin(code) {
  if (!db || !confirm("Revoke invite " + code + "?")) return;
  db.collection("invites").doc(code).update({ status: "revoked" }).then(function() {
    Router.toast("Invite revoked");
    loadAdminInviteList();
  });
}

function bulkGenerateInvites() {
  if (!db || !currentUser) return;
  var count = parseInt(document.getElementById("bulkCount").value) || 5;
  var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  var codes = [];
  var batch = db.batch();

  for (var i = 0; i < count; i++) {
    var code = "PB-";
    for (var j = 0; j < 8; j++) code += chars.charAt(Math.floor(Math.random() * chars.length));
    codes.push(code);
    batch.set(db.collection("invites").doc(code), createInviteDoc(code));
  }

  batch.commit().then(function() {
    var h = '<div style="margin-top:12px">';
    codes.forEach(function(c) {
      h += '<div class="invite-code" style="margin-bottom:6px;padding:10px"><div class="code" style="font-size:14px">' + c + '</div></div>';
    });
    h += '<div style="font-size:10px;color:var(--muted);text-align:center;margin-top:6px">All expire in ' + INVITE_EXPIRY_DAYS + ' days</div>';
    h += '</div>';
    document.getElementById("bulkResult").innerHTML = h;
    Router.toast(count + " invites generated!");
    loadAdminInviteList();
  }).catch(function() { Router.toast("Failed to generate"); });
}

// ========== FEATURE REQUEST ==========
function openFeatureRequest() {
  var name = currentProfile ? (currentProfile.name || currentProfile.username) : "Member";
  var feature = prompt("Describe the feature you'd like to see:");
  if (!feature || !feature.trim()) return;
  
  if (db && currentUser) {
    // Save to Firestore
    db.collection("feature_requests").add({
      from: currentUser.uid,
      fromName: name,
      request: feature,
      status: "new",
      createdAt: fsTimestamp()
    });
    
    // Find commissioner and send notification
    db.collection("members").where("role","==","commissioner").get().then(function(snap) {
      snap.forEach(function(doc) {
        sendNotification(doc.id, {
          type: "feature_request",
          title: "Feature Request",
          message: name + ": " + feature.substring(0, 80) + (feature.length > 80 ? "..." : ""),
          linkPage: "admin"
        });
      });
    });
    
    // Also post to activity feed so everyone can see/discuss
    db.collection("chat").add({
      id: genId(),
      text: "💡 " + name + " submitted a feature request: \"" + feature.substring(0, 100) + (feature.length > 100 ? "..." : "") + "\"",
      authorId: "system",
      authorName: "Parbaughs",
      createdAt: fsTimestamp(),
      type: "feature_request"
    }).catch(function(){});
    
    Router.toast("Request sent! The Commissioner has been notified.");
  } else {
    Router.toast("Sign in to submit requests");
  }
}
