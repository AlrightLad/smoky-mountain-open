<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../../../src/styles/base.css">
<link rel="stylesheet" href="../../../src/styles/components.css">
<style>
  body { margin: 0; background: var(--bg); }
  .frame { width: 430px; }
  .label { font-family: monospace; color: #888; font-size: 11px; padding: 8px 12px; }
  /* render the bar inline (not fixed) so the capture frames it */
  .bottom-nav { position: static !important; }
</style>
</head>
<body>
  <div class="frame">
    <div class="label">— default theme, Home active —</div>
    <div class="bottom-nav" id="navA">
      <button class="tappable a"><svg viewBox="0 0 24 24"><path d="M3 10.6 12 3.5l9 7.1"/><path d="M5.5 9.6V19a1.4 1.4 0 0 0 1.4 1.4h10.2a1.4 1.4 0 0 0 1.4-1.4V9.6"/><path d="M9.6 20.4v-5.2a1 1 0 0 1 1-1h2.8a1 1 0 0 1 1 1v5.2"/></svg><span>Home</span></button>
      <button class="tappable"><svg viewBox="0 0 24 24"><path d="M9 3.4v11.2"/><path d="M9 3.8 16.5 6 9 8.4z"/><ellipse cx="12" cy="18.4" rx="7.4" ry="2.4"/></svg><span>Play</span></button>
      <button class="tappable"><svg viewBox="0 0 24 24"><path d="M12 21.2c4.4-4.8 6.6-7.7 6.6-10.7a6.6 6.6 0 1 0-13.2 0c0 3 2.2 5.9 6.6 10.7z"/><circle cx="12" cy="10.4" r="2.5"/></svg><span>Courses</span></button>
      <button class="tappable"><svg viewBox="0 0 24 24"><path d="M7 4h10v4.4a5 5 0 0 1-10 0z"/><path d="M7 5.5H5a2 2 0 0 0 0 4h2.3"/><path d="M17 5.5h2a2 2 0 0 1 0 4h-2.3"/><path d="M12 13.4v3.3"/><path d="M8.5 20.5h7"/><path d="M9 20.5a3 3 0 0 1 6 0"/></svg><span>Events</span></button>
      <button class="tappable"><svg viewBox="0 0 24 24"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/></svg><span>More</span></button>
    </div>
    <div class="label">— Play active (heavier stroke) —</div>
    <div class="bottom-nav" id="navB">
      <button class="tappable"><svg viewBox="0 0 24 24"><path d="M3 10.6 12 3.5l9 7.1"/><path d="M5.5 9.6V19a1.4 1.4 0 0 0 1.4 1.4h10.2a1.4 1.4 0 0 0 1.4-1.4V9.6"/><path d="M9.6 20.4v-5.2a1 1 0 0 1 1-1h2.8a1 1 0 0 1 1 1v5.2"/></svg><span>Home</span></button>
      <button class="tappable a"><svg viewBox="0 0 24 24"><path d="M9 3.4v11.2"/><path d="M9 3.8 16.5 6 9 8.4z"/><ellipse cx="12" cy="18.4" rx="7.4" ry="2.4"/></svg><span>Play</span></button>
      <button class="tappable"><svg viewBox="0 0 24 24"><path d="M12 21.2c4.4-4.8 6.6-7.7 6.6-10.7a6.6 6.6 0 1 0-13.2 0c0 3 2.2 5.9 6.6 10.7z"/><circle cx="12" cy="10.4" r="2.5"/></svg><span>Courses</span></button>
      <button class="tappable"><svg viewBox="0 0 24 24"><path d="M7 4h10v4.4a5 5 0 0 1-10 0z"/><path d="M7 5.5H5a2 2 0 0 0 0 4h2.3"/><path d="M17 5.5h2a2 2 0 0 1 0 4h-2.3"/><path d="M12 13.4v3.3"/><path d="M8.5 20.5h7"/><path d="M9 20.5a3 3 0 0 1 6 0"/></svg><span>Events</span></button>
      <button class="tappable"><svg viewBox="0 0 24 24"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/></svg><span>More</span></button>
    </div>
    <div class="label">— BIG (each icon at 2x for detail) —</div>
    <div id="big" style="display:flex;gap:20px;padding:20px;background:var(--cb-paper,#fff)"></div>
  </div>
  <script>
    // mirror the five icons big for a detail read
    var svgs = Array.from(document.querySelectorAll('#navA button svg'));
    var big = document.getElementById('big');
    svgs.forEach(function(s){
      var c = s.cloneNode(true);
      c.setAttribute('width','54'); c.setAttribute('height','54');
      c.style.stroke = '#1a1a1a'; c.style.fill = 'none'; c.style.strokeWidth = '1.6';
      c.style.strokeLinecap='round'; c.style.strokeLinejoin='round';
      big.appendChild(c);
    });
  </script>
</body>
</html>
