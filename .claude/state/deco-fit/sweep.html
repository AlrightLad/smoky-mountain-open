<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body{background:#E7E0CD;font-family:system-ui,sans-serif;padding:20px;margin:0}
  h1{font-size:14px;color:#14130F;margin:0 0 12px}
  table{border-collapse:collapse}
  td{padding:14px 18px;text-align:center;vertical-align:middle}
  th{font-size:11px;color:#5A6B78;font-family:ui-monospace,monospace;padding:6px}
  .rowlbl{font-size:10px;color:#14130F;font-family:ui-monospace,monospace;text-align:right;padding-right:14px;white-space:nowrap}
  .pe{outline:1px dashed rgba(200,40,40,.45)}
</style></head>
<body>
<h1>Deco overlay %-sweep — pick the % where the frame INNER EDGE hugs the photo (red-dash) edge, frame extends just beyond (Discord). Photo 104px.</h1>
<table id="t"></table>
<script>
  var PHOTO='../../../public/img/avatars/caddy-caddy.jpg', BASE='../../../public/img/cosmetics/';
  var DECOS=[['Caddy Companion','deco-caddy-companion.png'],['Hole-in-One','deco-hole-in-one.png'],['Champion','deco-champion.png'],['Masters Azalea','deco-masters-azalea.png'],['Frost Delay','deco-frost-delay.png'],['Eagle','deco-eagle.png'],['Bramble Rose','deco-bramble-rose.png'],['Autumn Nine','deco-autumn.png']];
  var PCTS=[105,115,125,135];
  function av(src,pct){var s=104;return '<div style="width:'+s+'px;height:'+s+'px;border-radius:50%;position:relative;display:inline-block">'+
    '<div class="pe" style="width:100%;height:100%;border-radius:50%;overflow:hidden"><img src="'+PHOTO+'" style="width:100%;height:100%;object-fit:cover"></div>'+
    '<img src="'+BASE+src+'" style="position:absolute;top:50%;left:50%;width:'+pct+'%;height:'+pct+'%;transform:translate(-50%,-50%);pointer-events:none;z-index:2"></div>';}
  var t=document.getElementById('t'); var hr='<tr><th></th>'; PCTS.forEach(function(p){hr+='<th>'+p+'%</th>';}); hr+='</tr>'; t.innerHTML=hr;
  DECOS.forEach(function(d){var row='<tr><td class="rowlbl">'+d[0]+'</td>';PCTS.forEach(function(p){row+='<td>'+av(d[1],p)+'</td>';});row+='</tr>';t.innerHTML+=row;});
</script>
</body></html>
