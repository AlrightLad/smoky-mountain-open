<!doctype html>
<html><head><meta charset="utf-8">
<style>body{background:#E7E0CD;font-family:system-ui,sans-serif;padding:20px;margin:0}
h1{font-size:14px;color:#14130F;margin:0 0 12px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:26px 16px}
.cell{background:#FCFAF5;border:1px solid rgba(20,19,15,.08);border-radius:12px;padding:16px 8px 10px;text-align:center}
.w{display:flex;align-items:center;justify-content:center;gap:14px;min-height:130px}
.l{font-size:10px;color:#14130F;margin-top:8px;font-family:ui-monospace,monospace}
.pe{outline:1px dashed rgba(200,40,40,.4)}</style></head>
<body><h1>Deco-fit CONFIRM at per-deco picks — photo (red-dash) should FILL the opening, frame hug + extend just beyond.</h1>
<div class="grid" id="g"></div>
<script>
var PHOTO='../../../public/img/avatars/caddy-caddy.jpg', BASE='../../../public/img/cosmetics/';
// per-deco picks from the %-sweep (visual)
var D=[['Caddy Companion','deco-caddy-companion.png',110],['Hole-in-One','deco-hole-in-one.png',106],['Champion','deco-champion.png',110],['Masters Azalea','deco-masters-azalea.png',108],['Frost Delay','deco-frost-delay.png',112],['Eagle','deco-eagle.png',110],['Bramble Rose','deco-bramble-rose.png',112],['Autumn Nine','deco-autumn.png',120]];
function av(src,pct,s){return '<div style="width:'+s+'px;height:'+s+'px;border-radius:50%;position:relative;display:inline-block">'+
'<div class="pe" style="width:100%;height:100%;border-radius:50%;overflow:hidden"><img src="'+PHOTO+'" style="width:100%;height:100%;object-fit:cover"></div>'+
'<img src="'+BASE+src+'" style="position:absolute;top:50%;left:50%;width:'+pct+'%;height:'+pct+'%;transform:translate(-50%,-50%);pointer-events:none;z-index:2"></div>';}
var g=document.getElementById('g');
D.forEach(function(d){var c=document.createElement('div');c.className='cell';c.innerHTML='<div class="w">'+av(d[1],d[2],104)+av(d[1],d[2],44)+'</div><div class="l">'+d[0]+' @ '+d[2]+'%</div>';g.appendChild(c);});
</script></body></html>
