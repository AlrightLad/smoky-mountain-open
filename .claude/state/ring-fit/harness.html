<!doctype html>
<html><head><meta charset="utf-8">
<!-- Ring-fit diagnostic harness. Renders the EXACT renderAvatar outer/inner
     markup for every playerRingClass over a real avatar photo at profile size
     (96px) + roster size (44px), on the app's cream card surface, so we can SEE
     which rings sit flush vs leave a gap / float. No backend — file:// only. -->
<link rel="stylesheet" href="../../../src/styles/base.css">
<link rel="stylesheet" href="../../../src/styles/components.css">
<style>
  body{background:var(--cb-canvas,#E7E0CD);font-family:system-ui,sans-serif;padding:24px;margin:0}
  h1{font-size:16px;color:#14130F;margin:0 0 4px}
  p{font-size:12px;color:#5A6B78;margin:0 0 20px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:30px 22px}
  .cell{background:var(--cb-paper,#FCFAF5);border:1px solid rgba(20,19,15,.08);border-radius:14px;padding:22px 10px 12px;text-align:center;box-shadow:0 1px 3px rgba(20,19,15,.08)}
  .av-wrap{display:flex;align-items:center;justify-content:center;gap:18px;min-height:170px}
  .lbl{font-size:10px;color:#14130F;margin-top:10px;font-family:ui-monospace,monospace;word-break:break-all}
</style></head>
<body>
<h1>Ring-fit diagnostic — does each ring sit FLUSH with the photo?</h1>
<p>Each cell: 96px (profile) + 44px (roster). Watch for a gap/halo between the photo edge and the ring, or an ornament floating off the circle. Avatar = caddy-caddy.jpg.</p>
<div class="grid" id="grid"></div>
<script>
  var PHOTO = '../../../public/img/avatars/caddy-caddy.jpg';
  // Every class returned by playerRingClass (src/core/router.js), in catalog order.
  var RINGS = [
    'ring-gold-struck','ring-silver-struck','ring-bronze-struck',
    'ring-birdie-enamel','ring-rose-enamel','ring-emerald-enamel','ring-champ-enamel',
    'ring-bluebird-enamel','ring-diamond-gem','ring-platinum-struck','ring-obsidian-struck',
    'ring-gallery-rope','ring-fescue','ring-fried-egg','ring-claret',
    'ring-wax-seal','ring-hickory','ring-founders-crest','ring-green-jacket',
    'ring-iron-blade','ring-crest-pin','ring-medallion',
    'ring-pulse-gold','ring-diamond-sparkle','ring-rainbow-shift','ring-neon-green','ring-crimson-ember'
  ];
  // EXACT renderAvatar markup: outer .ring-X div (no inline border when class present)
  // + inner overflow:hidden circle + object-fit:cover photo.
  function avatar(cls, size){
    return '<div class="'+cls+'" style="width:'+size+'px;height:'+size+'px;min-width:'+size+'px;border-radius:50%;position:relative;flex-shrink:0">'+
      '<div style="width:100%;height:100%;border-radius:50%;overflow:hidden">'+
      '<img alt="" src="'+PHOTO+'" style="width:100%;height:100%;object-fit:cover;border-radius:inherit"></div></div>';
  }
  var g = document.getElementById('grid');
  RINGS.forEach(function(cls){
    var c = document.createElement('div'); c.className='cell';
    c.innerHTML = '<div class="av-wrap">'+avatar(cls,96)+avatar(cls,44)+'</div><div class="lbl">'+cls+'</div>';
    g.appendChild(c);
  });
</script>
</body></html>
