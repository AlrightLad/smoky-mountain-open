<!doctype html><html><head><meta charset=utf8><style>
body{background:#f3efe6;font-family:system-ui;margin:0;padding:24px}
h1{font-family:Georgia,serif;color:#1d3a2a;font-size:20px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:760px}
.card{background:#fff;border:1px solid #d8d2c2;border-radius:10px;padding:16px;text-align:center}
.art{height:74px;display:flex;align-items:center;justify-content:center}
.inline{font-size:15px;color:#2a2418;margin:6px 0;display:flex;align-items:center;justify-content:center;gap:0}
.lbl{font-size:11px;color:#6b6552;text-transform:uppercase;letter-spacing:1px;font-weight:600}
</style></head><body><h1>Pro Shop marker glyphs — golf-art verification</h1><div class="grid"><div class="card"><div class="art"><span id="big_pc17_brass_acorn"></span></div><div class="inline">name <span id="sm_pc17_brass_acorn"></span></div><div class="lbl">Brass Acorn (tee)</div></div><div class="card"><div class="art"><span id="big_pc18_rubber_duck"></span></div><div class="inline">name <span id="sm_pc18_rubber_duck"></span></div><div class="lbl">Rubber Duck (tee)</div></div><div class="card"><div class="art"><span id="big_pc19_persimmon"></span></div><div class="inline">name <span id="sm_pc19_persimmon"></span></div><div class="lbl">Persimmon (tee)</div></div><div class="card"><div class="art"><span id="big_pc20_parbaugh_marker"></span></div><div class="inline">name <span id="sm_pc20_parbaugh_marker"></span></div><div class="lbl">The Parbaugh (tee)</div></div><div class="card"><div class="art"><span id="big_pc25_ace_marker"></span></div><div class="inline">name <span id="sm_pc25_ace_marker"></span></div><div class="lbl">Ace Marker (tee)</div></div><div class="card"><div class="art"><span id="big_pc34_whipping"></span></div><div class="inline">name <span id="sm_pc34_whipping"></span></div><div class="lbl">Whipping & Glue (tee)</div></div><div class="card"><div class="art"><span id="big_pc26_found_coin"></span></div><div class="inline">name <span id="sm_pc26_found_coin"></span></div><div class="lbl">Found Coin (ball)</div></div><div class="card"><div class="art"><span id="big_pc27_pitch_mark"></span></div><div class="inline">name <span id="sm_pc27_pitch_mark"></span></div><div class="lbl">Pitch-Mark (ball)</div></div><div class="card"><div class="art"><span id="big_pc43_ctp_marker"></span></div><div class="inline">name <span id="sm_pc43_ctp_marker"></span></div><div class="lbl">Closest to Pin (ball)</div></div></div>
<script>function pbMarkerGlyph(id, px) {
  px = px || 11;
  var s = '';
  switch (id) {
    // ── Tee markers ──
    case 'pc17_brass_acorn': // acorn: textured cap + nut + stem
      s = '<rect x="11.2" y="3" width="1.6" height="3" rx=".8" fill="#6e561f"/>'
        + '<path d="M5.5 10c0-2.7 2.9-4.3 6.5-4.3s6.5 1.6 6.5 4.3z" fill="#9a7634"/>'
        + '<path d="M9 6.7v3M12 6.3v3.6M15 6.7v3" stroke="#6e561f" stroke-width=".8"/>'
        + '<path d="M6.4 10h11.2c0 5.3-2.6 9.6-5.6 9.6S6.4 15.3 6.4 10z" fill="#c69a4e"/>'
        + '<path d="M9.3 11.2c0 3.4 1 6.3 2.1 7.6" stroke="#e2bd78" stroke-width="1" opacity=".6" fill="none"/>';
      break;
    case 'pc18_rubber_duck': // duck: body + head + beak + eye
      s = '<path d="M3.2 14l-2.2-1.4 2.2-1z" fill="#e0a92e"/>'
        + '<ellipse cx="12.5" cy="15" rx="8" ry="5" fill="#ecc94b"/>'
        + '<path d="M16 14.5c1.6-.8 3.2-.7 4.5.2" stroke="#e0a92e" stroke-width="1.2" fill="none"/>'
        + '<circle cx="8" cy="8.6" r="4.1" fill="#ecc94b"/>'
        + '<path d="M3.9 8.4l-3 .7 3 1.1z" fill="#e07b39"/>'
        + '<circle cx="7.2" cy="7.7" r=".95" fill="#2b2b2b"/>';
      break;
    case 'pc19_persimmon': // persimmon driver head + brass sole + shaft
      s = '<rect x="9.2" y="1.8" width="1.7" height="6.4" rx=".8" fill="#5a4632" transform="rotate(-13 10 5)"/>'
        + '<path d="M3 13c0-3.5 3-5.5 7.5-5.5S21 9.5 21 13c0 2.3-2.5 3.9-6.6 3.9S3 15.3 3 13z" fill="#7a4a28"/>'
        + '<path d="M3.3 14.3h17.4c-.5 1.6-3 2.6-6.3 2.6S3.8 15.9 3.3 14.3z" fill="#caa75c"/>'
        + '<path d="M7 11.5h2M10.5 11.2h2" stroke="#5a3418" stroke-width=".7" opacity=".7"/>';
      break;
    case 'pc20_parbaugh_marker': // founding-gold crest disc
      s = '<circle cx="12" cy="12" r="9.5" fill="#b4893e"/>'
        + '<circle cx="12" cy="12" r="9.5" fill="none" stroke="#8a6526" stroke-width="1"/>'
        + '<circle cx="12" cy="12" r="7" fill="none" stroke="#d8b15f" stroke-width=".8" opacity=".7"/>'
        + '<text x="12" y="16.6" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#2a1f0c">P</text>';
      break;
    case 'pc25_ace_marker': // gold ball on a brass pedestal
      s = '<path d="M7 19.2h10l-1.4 2.4H8.4z" fill="#8a6a2e"/>'
        + '<rect x="6.4" y="18.4" width="11.2" height="1.7" rx=".85" fill="#a9853c"/>'
        + '<circle cx="12" cy="10" r="6.2" fill="#f2d89a"/>'
        + '<circle cx="9.8" cy="7.8" r="2" fill="#f8ecc6"/>'
        + '<circle cx="10.5" cy="11" r=".7" fill="#d8be84"/><circle cx="13" cy="9" r=".7" fill="#d8be84"/><circle cx="13.4" cy="12" r=".7" fill="#d8be84"/>';
      break;
    case 'pc34_whipping': // hickory shaft butt wrapped in red thread
      s = '<rect x="9.2" y="2.4" width="5.6" height="2" rx="1" fill="#caa75c"/>'
        + '<rect x="9.5" y="4" width="5" height="17" rx="2.3" fill="#7a4a28"/>'
        + '<path d="M11 5v15M13 5v15" stroke="#5a3418" stroke-width=".6" opacity=".55"/>'
        + '<path d="M9.5 13l5 1.5M9.5 15l5 1.5M9.5 17l5 1.5M9.5 19l5 1.5" stroke="#c0392b" stroke-width="1.3"/>';
      break;
    // ── Ball markers ──
    case 'pc26_found_coin': // milled-edge brass penny, worn smooth
      s = '<circle cx="12" cy="12" r="9.2" fill="#9a7430"/>'
        + '<circle cx="12" cy="12" r="9.2" fill="none" stroke="#7a5a24" stroke-width="1.8" stroke-dasharray="1.1 1.4"/>'
        + '<circle cx="12" cy="12" r="6.6" fill="#c99a45"/>'
        + '<circle cx="12" cy="12" r="6.6" fill="none" stroke="#8a6526" stroke-width=".8"/>'
        + '<path d="M7.6 8.6a6.6 6.6 0 019 0" stroke="#e2bd78" stroke-width="1" opacity=".5" fill="none"/>';
      break;
    case 'pc27_pitch_mark': // milled silver disc + crosshair
      s = '<circle cx="12" cy="12" r="9.2" fill="#cfd2d6"/>'
        + '<circle cx="12" cy="12" r="9.2" fill="none" stroke="#9aa0a8" stroke-width="1.1"/>'
        + '<path d="M12 3.4v17.2M3.4 12h17.2" stroke="#5a5f66" stroke-width="1.3"/>'
        + '<circle cx="12" cy="12" r="1.5" fill="#5a5f66"/>';
      break;
    case 'pc43_ctp_marker': // brass disc, flagstick struck clean through
      s = '<circle cx="12" cy="12" r="8.6" fill="#b58a3a"/>'
        + '<circle cx="12" cy="12" r="8.6" fill="none" stroke="#8a6526" stroke-width="1"/>'
        + '<path d="M12 2.2v19.6" stroke="#3a2a12" stroke-width="1.5"/>'
        + '<path d="M12.5 3.6l5.2 1.7-5.2 1.7z" fill="#c0392b"/>';
      break;
    default: return '';
  }
  return '<svg viewBox="0 0 24 24" width="' + px + '" height="' + px + '" fill="none">' + s + '</svg>';
}
window.addEventListener('DOMContentLoaded',function(){document.getElementById("big_pc17_brass_acorn").innerHTML=pbMarkerGlyph("pc17_brass_acorn",64);document.getElementById("sm_pc17_brass_acorn").innerHTML=pbMarkerGlyph("pc17_brass_acorn",12);document.getElementById("big_pc18_rubber_duck").innerHTML=pbMarkerGlyph("pc18_rubber_duck",64);document.getElementById("sm_pc18_rubber_duck").innerHTML=pbMarkerGlyph("pc18_rubber_duck",12);document.getElementById("big_pc19_persimmon").innerHTML=pbMarkerGlyph("pc19_persimmon",64);document.getElementById("sm_pc19_persimmon").innerHTML=pbMarkerGlyph("pc19_persimmon",12);document.getElementById("big_pc20_parbaugh_marker").innerHTML=pbMarkerGlyph("pc20_parbaugh_marker",64);document.getElementById("sm_pc20_parbaugh_marker").innerHTML=pbMarkerGlyph("pc20_parbaugh_marker",12);document.getElementById("big_pc25_ace_marker").innerHTML=pbMarkerGlyph("pc25_ace_marker",64);document.getElementById("sm_pc25_ace_marker").innerHTML=pbMarkerGlyph("pc25_ace_marker",12);document.getElementById("big_pc34_whipping").innerHTML=pbMarkerGlyph("pc34_whipping",64);document.getElementById("sm_pc34_whipping").innerHTML=pbMarkerGlyph("pc34_whipping",12);document.getElementById("big_pc26_found_coin").innerHTML=pbMarkerGlyph("pc26_found_coin",64);document.getElementById("sm_pc26_found_coin").innerHTML=pbMarkerGlyph("pc26_found_coin",12);document.getElementById("big_pc27_pitch_mark").innerHTML=pbMarkerGlyph("pc27_pitch_mark",64);document.getElementById("sm_pc27_pitch_mark").innerHTML=pbMarkerGlyph("pc27_pitch_mark",12);document.getElementById("big_pc43_ctp_marker").innerHTML=pbMarkerGlyph("pc43_ctp_marker",64);document.getElementById("sm_pc43_ctp_marker").innerHTML=pbMarkerGlyph("pc43_ctp_marker",12);});</script></body></html>
