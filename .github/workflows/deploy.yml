name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# v8.24.21 — cancel-in-progress: rapid consecutive pushes (ship + regen
# commits minutes apart) used to FAIL the superseded older run and email the
# Founder; cancelling it is silent and the newest commit always wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm run lint

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # v8.24.21 — permanent fix for the intermittent Pages 401 ("Failed to
      # create deployment ... Requires authentication", e.g. run 27287229396 on
      # c7f6204b): a known transient GitHub-side OIDC flake in deploy-pages.
      # First attempt tolerates failure; a 30s-later second attempt converts
      # the flake into a success instead of a Founder failure email.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
